acts:['Mantener un inventario actualizado de riesgos tecnológicos con probabilidad, impacto y responsable','Priorizar los riesgos según su impacto potencial en los objetivos del negocio','Definir y ejecutar planes de respuesta proporcionales a la criticidad de cada riesgo','Monitorear que los controles implementados están siendo efectivos','Reportar el perfil de riesgo tecnológico a la dirección en lenguaje de negocio'],
casc:{need:'La dirección necesita gestionar la exposición tecnológica de la organización dentro de límites que conscientemente ha aprobado',align:'TI necesita un proceso sistemático para identificar y escalar riesgos antes de que se materialicen',obj:'APO12 provee ese proceso: desde la identificación hasta la respuesta y el reporte al nivel de gobierno correspondiente'},
kw:['Gestión de riesgos tecnológicos','Evaluación de impacto','Mitigación de riesgos','Registro de riesgos','Riesgo residual']},

{code:'APO13',name:'Seguridad',
def:'Definir, operar y monitorear un sistema para la gestión de la seguridad de la información en toda la organización.',
did:'La mayor parte de los incidentes de seguridad de información no ocurren porque la tecnología falla — ocurren porque las personas hacen cosas que no deberían, o porque la organización no tiene los controles necesarios para detectarlas o prevenirlas. Eso significa que la seguridad de la información no es un tema exclusivo del área técnica: involucra a todos los empleados que crean, usan o comparten información, que hoy en día es prácticamente toda la organización.',
ex_intro:'Una gestión de seguridad efectiva produce resiliencia ante las amenazas más frecuentes:',
ex_bullets:['Toda la organización — no solo el área técnica — conoce las prácticas básicas de seguridad relevantes para su trabajo. La capacitación es anual y obligatoria.','Los accesos a sistemas y datos se revisan periódicamente. Cuando alguien cambia de rol o deja la organización, sus accesos se actualizan o revocan en el proceso estándar de gestión.','Cuando ocurre un incidente de seguridad, hay un protocolo conocido que activa una respuesta ordenada en lugar de una reacción improvisada.'],
fail_intro:'Las brechas de seguridad más costosas son frecuentemente las más prevenibles:',
fail_bullets:['Los ataques de ingeniería social — correos fraudulentos que parecen legítimos — funcionan porque nadie entrenó a los empleados para identificarlos. La tecnología de seguridad más sofisticada no previene que alguien entregue voluntariamente sus credenciales.','Los accesos no revocados de personas que ya no trabajan en la organización son una de las vulnerabilidades más frecuentes y más evitables.','Los incidentes de seguridad que se detectan meses después del evento siempre revelan que las señales de alerta existían — pero nadie estaba monitoreando activamente.'],
pracs:[
{code:'APO13.01',name:'Establecer y mantener un SGSI',desc:'Construir el sistema de gestión de seguridad de la información: el marco que integra políticas, controles, responsabilidades y procesos de mejora continua.'},
{code:'APO13.02',name:'Definir y gestionar un plan de tratamiento de riesgos de seguridad',desc:'Identificar los riesgos de seguridad específicos de la organización y diseñar los controles proporcionales para gestionarlos.'},
{code:'APO13.03',name:'Monitorear y revisar el SGSI',desc:'Evaluar regularmente que el sistema de gestión de seguridad sigue siendo efectivo ante un entorno de amenazas que evoluciona constantemente.'}],
acts:['Establecer y mantener el sistema de gestión de seguridad de la información para toda la organización','Definir políticas y controles de seguridad proporcionales a los riesgos identificados','Capacitar a toda la organización en las prácticas de seguridad relevantes para su rol','Gestionar incidentes de seguridad con protocolo formal y lecciones aprendidas documentadas','Monitorear continuamente para detectar amenazas antes de que se conviertan en incidentes'],
casc:{need:'La organización necesita proteger su información crítica ante amenazas que evolucionan y que involucran tanto tecnología como comportamiento humano',align:'TI necesita un sistema de seguridad que cubra toda la organización, no solo los sistemas que administra directamente',obj:'APO13 construye ese sistema: desde las políticas hasta el monitoreo, incluyendo la dimensión humana que es donde más frecuentemente falla la seguridad'},
kw:['Seguridad de la información','Sistema de gestión de seguridad (SGSI)','Ciberseguridad','Políticas de seguridad','Protección de datos']},

{code:'APO14',name:'Datos',
def:'Gestionar los datos como un activo clave. Asegurar que la organización maximice el valor de sus datos con controles adecuados para protegerlos y gestionar su ciclo de vida.',
did:'Las decisiones de una organización son exactamente tan buenas como los datos en que se basan. Cuando diferentes áreas tienen versiones distintas del mismo indicador, cuando nadie puede decir con certeza qué dato es el correcto, o cuando la información de clientes existe en tres sistemas con registros contradictorios, la organización no tiene un problema técnico — tiene un problema de gobierno. Los datos son el insumo de todas las decisiones: gobernarlos es gobernar la calidad del pensamiento estratégico de la organización.',
ex_intro:'El gobierno del dato se hace visible en la calidad de las decisiones y la confianza en la información:',
ex_bullets:['Cuando se presenta un informe a la junta directiva, todas las cifras provienen de fuentes oficiales conocidas y acordadas. No hay discusión sobre cuál número es el correcto.','Los datos personales de clientes y empleados se gestionan con políticas claras de privacidad, acceso y ciclo de vida — no solo por cumplimiento legal sino porque es la práctica correcta.','Las iniciativas de analítica e inteligencia de datos se construyen sobre una base de información confiable y documentada, no sobre datos cuya calidad nadie puede garantizar.'],
fail_intro:'La ausencia de gobierno del dato produce ineficiencias que se multiplican con el tiempo:',
fail_bullets:['Las reuniones directivas consumen tiempo valioso reconciliando cifras contradictorias que provienen de sistemas que deberían mostrar lo mismo.','Las iniciativas de analítica producen resultados en los que nadie confía porque todos saben que los datos de origen son inconsistentes.','El cumplimiento de regulaciones de privacidad de datos es reactivo: la organización descubre sus obligaciones cuando un regulador o un incidente las hace urgentes.'],
pracs:[
{code:'APO14.01',name:'Establecer la estrategia de gestión de datos',desc:'Definir cómo la organización gestiona sus datos como activo estratégico: qué principios aplican, qué roles son responsables y qué capacidades se necesitan desarrollar.'},
{code:'APO14.02',name:'Definir y mantener un plan de gestión de datos',desc:'Desarrollar el plan operativo que implementa la estrategia: inventario de datos, responsables por dominio, políticas de calidad y procesos de gobierno.'},
{code:'APO14.03',name:'Implementar prácticas de gestión de datos',desc:'Ejecutar las prácticas concretas de gobierno del dato: calidad, privacidad, acceso, ciclo de vida y uso ético de la información de la organización.'}],
acts:['Definir una fuente oficial para cada dato crítico de la organización y comunicarla formalmente','Establecer políticas de calidad del dato con responsables definidos por dominio de información','Implementar controles de privacidad y acceso proporcionales a la sensibilidad de cada tipo de dato','Gestionar el ciclo de vida completo del dato: desde su creación hasta su disposición final segura','Construir las capacidades de analítica sobre bases de datos confiables y documentadas'],
casc:{need:'La dirección necesita tomar decisiones sobre datos confiables que reflejan la realidad de la organización, no sobre versiones contradictorias de la misma realidad',align:'TI necesita estructuras de gobierno que hagan que los datos sean confiables, accesibles y protegidos para quienes los necesitan',obj:'APO14 establece esas estructuras: desde la fuente única de verdad hasta las políticas de privacidad y el ciclo de vida del dato'},
kw:['Gobierno del dato','Calidad de la información','Privacidad de datos','Fuente única de verdad','Ciclo de vida del dato']}
]},
{code:'BAI',es:'Construir, Adquirir e Implementar',en:'Build, Acquire & Implement',color:'#6D28D9',emoji:'🏗️',type:'GESTIÓN',
desc:'El dominio donde las decisiones estratégicas se convierten en sistemas, procesos y capacidades reales. Cubre desde la identificación de requisitos hasta la puesta en operación, pasando por la gestión del cambio organizacional, el conocimiento y los activos tecnológicos. Es donde la intención se convierte en realidad — con todos los riesgos que eso implica.',
objs:[
{code:'BAI01',name:'Programas',
def:'Gestionar todos los programas del portafolio de inversiones de TI en consonancia con la estrategia empresarial y de manera coordinada.',
did:'Un programa no es un proyecto grande: es la gestión coordinada de múltiples proyectos que solo juntos logran el objetivo estratégico. Cuando esa coordinación no existe, sucede lo que parece paradójico: proyectos individuales exitosos que en conjunto producen un resultado fallido. El CRM puede estar listo, el proceso de ventas rediseñado también, pero si la integración con el sistema de inventario llegó tres meses tarde, el beneficio completo no se materializa para nadie — y nadie puede decir exactamente en qué falló el programa.',
ex_intro:'Una gestión de programas efectiva produce coherencia entre las partes y el todo:',
ex_bullets:['Las dependencias entre proyectos están identificadas y monitoreadas. Cuando un proyecto se retrasa, el efecto en cadena se gestiona de forma proactiva, no se descubre cuando el daño ya está hecho.','El programa tiene un dueño con autoridad real para tomar decisiones sobre la secuencia, los recursos y las prioridades del conjunto.','Los beneficios del programa se miden como un todo — no como la suma de los entregables técnicos de cada proyecto individual.'],
fail_intro:'La ausencia de gestión de programa se manifiesta en patrones de fragmentación:',
fail_bullets:['Proyectos que terminaron hace meses esperan que otros proyectos del mismo programa terminen para poder entregar valor. El beneficio completo nunca llega porque las piezas no se coordinaron.','Cada proyecto gestiona sus propios riesgos y recursos sin visibilidad del conjunto. Las interdependencias críticas se descubren tarde, cuando ya generaron retrasos en cascada.','La dirección no tiene una imagen clara del estado del programa como unidad — solo tiene reportes individuales de proyectos que no dicen si el objetivo estratégico se está logrando.'],
pracs:[
{code:'BAI01.01',name:'Mantener un enfoque estándar para la gestión de programas',desc:'Establecer la metodología y los estándares con los que se gestionan los programas en la organización. Que el enfoque sea consistente, no dependiente de la preferencia de cada gerente de programa.'},
{code:'BAI01.02',name:'Iniciar un programa',desc:'Establecer la gobernanza del programa al inicio: estructura de autoridad, mecanismos de toma de decisiones y criterios de éxito para el conjunto.'},
{code:'BAI01.03',name:'Gestionar el compromiso con las partes interesadas',desc:'Mantener alineadas a todas las partes relevantes del programa: patrocinadores, usuarios del negocio y equipos técnicos. La alineación es activa, no puede asumirse.'},
{code:'BAI01.04',name:'Desarrollar e implementar el plan del programa',desc:'Construir el plan integrado que muestra cómo los proyectos se coordinan para lograr el objetivo del programa, con dependencias explícitas y hitos compartidos.'},
{code:'BAI01.05',name:'Supervisar, controlar y reportar sobre los resultados del programa',desc:'Hacer seguimiento al programa como unidad: está generando los beneficios prometidos, los proyectos se coordinan según el plan, los riesgos están siendo gestionados.'}],
acts:['Establecer la gobernanza del programa con un dueño que tenga autoridad sobre el conjunto','Mapear y monitorear las dependencias entre los proyectos del programa','Gestionar el presupuesto y los recursos del programa como una unidad integrada','Reportar el avance del programa en términos de beneficios al negocio, no solo de entregables técnicos','Gestionar el cierre formal del programa verificando que los beneficios prometidos se materializaron'],
casc:{need:'El negocio invierte en programas para lograr objetivos estratégicos, no para obtener proyectos individuales exitosos',align:'TI necesita la autoridad y los mecanismos para coordinar múltiples proyectos hacia un objetivo común',obj:'BAI01 provee esa autoridad y esos mecanismos: la gestión del programa como unidad con responsabilidad sobre el beneficio total'},
kw:['Gestión de programas','Gobernanza del programa','Interdependencias de proyectos','Oficina de proyectos (PMO)','Beneficios del programa']},

{code:'BAI02',name:'Requisitos',
def:'Identificar soluciones y analizar requisitos antes de la adquisición o desarrollo para asegurarse de que respondan a los requerimientos estratégicos de la empresa.',
did:'Corregir un malentendido de requisitos antes de empezar un proyecto cuesta una fracción de lo que cuesta corregirlo cuando el sistema ya está construido. Y sin embargo, la presión por "empezar rápido" hace que muchas organizaciones inviertan meses de desarrollo en la dirección equivocada porque nadie invirtió semanas en definir con precisión la dirección correcta. Este objetivo invierte el tiempo donde tiene más retorno: en entender exactamente qué se necesita antes de comprometerse a construirlo o comprarlo.',
ex_intro:'Una buena gestión de requisitos produce alineación desde el inicio:',
ex_bullets:['Los requisitos del negocio se documentan con la participación activa de las áreas que usarán el sistema — no son una lista técnica que TI interpreta según su criterio.','Antes de decidir si se desarrolla, compra o externaliza, hay un análisis formal de alternativas con criterios explícitos de evaluación.','Los cambios en los requisitos durante el proyecto siguen un proceso formal que evalúa el impacto antes de aprobarse — no se incorporan informalmente porque "era una cosa pequeña".'],
fail_intro:'Los requisitos mal gestionados producen el tipo de fracaso más costoso: lo que se entregó no era lo que se necesitaba:',
fail_bullets:['Meses de desarrollo producen un sistema que "técnicamente funciona" pero que no resuelve el problema real del negocio porque ese problema nunca se entendió con precisión.','Los cambios de alcance durante el proyecto se acumulan sin control. El proyecto termina siendo tres veces más grande de lo planeado sin que nadie lo hubiera aprobado explícitamente.','El área del negocio y TI tienen recuerdos distintos de lo que se acordó. Sin documentación formal de requisitos, ese conflicto no tiene resolución objetiva.'],
pracs:[
{code:'BAI02.01',name:'Definir y mantener los requerimientos de negocio',desc:'Trabajar con las áreas del negocio para entender y documentar qué necesitan realmente, no solo qué creen que necesitan técnicamente. Los requisitos de negocio preceden a los requisitos técnicos.'},
{code:'BAI02.02',name:'Realizar un estudio de viabilidad',desc:'Evaluar si la solución propuesta es factible: técnicamente posible, financieramente justificada, operativamente viable y estratégicamente alineada.'},
{code:'BAI02.03',name:'Gestionar los requerimientos',desc:'Mantener los requisitos documentados, versionados y trazables. Gestionar formalmente los cambios para que cada modificación sea una decisión consciente con impacto evaluado.'},
{code:'BAI02.04',name:'Obtener la aprobación de los requerimientos',desc:'Asegurar que las personas correctas del negocio validan y aprueban formalmente los requisitos antes de que comience cualquier trabajo de desarrollo o adquisición.'}],
acts:['Definir y documentar los requisitos del negocio con participación activa de las áreas usuarias','Analizar formalmente las alternativas de solución antes de comprometerse con una dirección','Obtener aprobación formal de los requisitos por parte de los responsables del negocio','Gestionar los cambios de requisitos con proceso formal que evalúa impacto antes de aprobar','Verificar que los requisitos siguen siendo válidos al inicio de cada fase del proyecto'],
casc:{need:'El negocio necesita que lo que construya o compre TI resuelva sus necesidades reales, no las que alguien interpretó que tenía',align:'TI necesita entender con precisión qué se espera antes de comprometer recursos de desarrollo o adquisición',obj:'BAI02 crea ese entendimiento compartido: a través de un proceso de definición, análisis y aprobación formal que reduce el riesgo del mayor desperdicio tecnológico posible'},
kw:['Análisis de requisitos del negocio','Necesidades del usuario','Evaluación de alternativas','Aprobación formal de requisitos','Gestión del alcance']},

{code:'BAI03',name:'Soluciones',
def:'Establecer y mantener soluciones en línea con los requerimientos de la empresa, incluyendo diseño, desarrollo, adquisición y configuración.',
did:'La calidad de un sistema no se improvisa en las últimas semanas antes del lanzamiento — se construye o se destruye en cada decisión de diseño y en cada atajos que se toma bajo presión. Un sistema entregado con deuda técnica significativa no es un problema técnico que "se arregla después": es un pasivo que crece con el tiempo, que hace cada mejora futura más cara y cada fallo más difícil de diagnosticar. Este objetivo aplica los estándares de construcción que aseguran que lo que se entrega al negocio sea duradero, no solo funcional el día del lanzamiento.',
ex_intro:'Una gestión sólida de soluciones produce entregables en los que el negocio puede confiar:',
ex_bullets:['Los sistemas que llegan a producción han sido probados con usuarios reales del negocio en condiciones que reflejan su uso cotidiano — no solo en escenarios técnicos ideales.','Los problemas encontrados durante las pruebas tienen un proceso formal de corrección antes del lanzamiento, no una lista de "pendientes para después" que rara vez se cierra.','La documentación de cada sistema es parte del entregable, no una deuda que se prometió completar "cuando haya tiempo".'],
fail_intro:'La gestión deficiente de la construcción y adquisición produce costos diferidos que se hacen evidentes con el tiempo:',
fail_bullets:['Los sistemas se lanzan con problemas conocidos porque "no había tiempo" para resolverlos. Esos problemas se convierten en la agenda permanente del soporte técnico y en la fuente de insatisfacción crónica del negocio.','La deuda técnica acumulada hace que cada modificación futura del sistema sea más cara y más riesgosa de lo que debería ser.','El conocimiento sobre cómo funciona el sistema existe solo en la mente de quienes lo construyeron. Cuando esas personas no están disponibles, operar o modificar el sistema se convierte en un riesgo.'],
pracs:[
{code:'BAI03.01',name:'Diseñar soluciones de alto nivel',desc:'Desarrollar el diseño de alto nivel de la solución: cómo responde a los requisitos, cómo se integra con el ecosistema existente y qué tecnologías se utilizarán.'},
{code:'BAI03.02',name:'Diseñar los componentes detallados de la solución',desc:'Especificar en detalle cada componente de la solución. El diseño detallado es el plano que guía la construcción — su calidad determina la calidad de lo que se construirá.'},
{code:'BAI03.03',name:'Desarrollar los componentes de la solución',desc:'Construir, configurar o adquirir los componentes según el diseño aprobado. Aplicar los estándares de calidad definidos en todo el proceso de construcción.'},
{code:'BAI03.04',name:'Procurar los componentes de la solución',desc:'Gestionar la adquisición de componentes externos cuando la solución los requiere. Asegurar que lo que se compra cumple los requisitos y se integra según el diseño.'},
{code:'BAI03.05',name:'Construir soluciones',desc:'Integrar los componentes en una solución funcional. Verificar que el conjunto opera como se diseñó, no solo que cada parte funciona por separado.'},
{code:'BAI03.06',name:'Realizar controles de calidad',desc:'Ejecutar el proceso de verificación de calidad antes de la entrega al negocio. Las pruebas son parte del proceso de construcción, no un trámite final.'}],
acts:['Diseñar la solución con suficiente detalle antes de empezar a construir','Aplicar estándares de calidad en todo el proceso de desarrollo o adquisición','Probar la solución con usuarios reales del negocio en condiciones de uso cotidiano','Documentar la solución como parte integral del entregable, no como tarea posterior','Gestionar la corrección de los problemas encontrados antes del lanzamiento a producción'],
casc:{need:'El negocio necesita que los sistemas que recibe sean confiables, mantenibles y que funcionen en sus procesos reales',align:'TI necesita estándares de construcción que aseguren calidad consistente independientemente de quién desarrolle o en qué condiciones de presión',obj:'BAI03 establece esos estándares: desde el diseño hasta la entrega, asegurando que la calidad se construye en el proceso'},
kw:['Diseño de soluciones','Pruebas con usuarios','Calidad de entrega','Documentación de sistemas','Validación del negocio']},

{code:'BAI04',name:'Disponibilidad y Capacidad',
def:'Equilibrar las necesidades de disponibilidad, desempeño y capacidad actuales y futuras con la provisión de servicio a un costo razonable.',
did:'Los sistemas que fallan exactamente cuando el negocio más los necesita producen un daño que va más allá de lo operativo: erosionan la confianza en la tecnología como soporte confiable para el negocio. La mayoría de esas fallas no son imprevisibles — son consecuencia de no haber anticipado la demanda que los planes del negocio generarían sobre la infraestructura tecnológica. Este objetivo conecta la planificación tecnológica con la planificación del negocio para que los sistemas estén listos cuando el negocio los necesita, no cuando TI logra escalarlos.',
ex_intro:'La anticipación de capacidad produce operación predecible en momentos de alta demanda:',
ex_bullets:['Cuando el negocio planea campañas, lanzamientos o períodos de alto volumen, TI conoce esos planes con anticipación y verifica que la infraestructura puede soportarlos.','Los indicadores de desempeño de los sistemas se monitorean proactivamente. Las tendencias de degradación se detectan antes de que sean visibles para el negocio.','Las pruebas de carga se realizan antes de los momentos de máxima demanda, no después de que el sistema ya colapsó.'],
fail_intro:'La planificación reactiva de capacidad produce crisis en los peores momentos:',
fail_bullets:['Los sistemas se degradan exactamente durante los cierres de mes, las campañas de venta o los períodos de reporte — cuando la demanda es máxima y el impacto de la falla es mayor.','Las decisiones de capacidad se toman en respuesta a problemas ya ocurridos, con los costos de emergencia que eso implica y sin la anticipación que habría permitido opciones más eficientes.','El negocio no coordina sus planes de crecimiento con TI porque "siempre se enteran después". El ciclo se perpetúa.'],
pracs:[
{code:'BAI04.01',name:'Evaluar la disponibilidad y desempeño actuales',desc:'Establecer una línea base del estado actual de disponibilidad y desempeño de los sistemas críticos. Identificar tendencias y puntos de riesgo.'},
{code:'BAI04.02',name:'Evaluar el impacto en el negocio',desc:'Entender qué significa para el negocio cada nivel de disponibilidad y desempeño. Los compromisos de disponibilidad deben reflejar el impacto real de la indisponibilidad.'},
{code:'BAI04.03',name:'Planear los requerimientos de disponibilidad y desempeño',desc:'Desarrollar el plan de capacidad que refleja los planes del negocio. Anticipar la demanda futura y planear los recursos necesarios con suficiente tiempo.'},
{code:'BAI04.04',name:'Monitorear e informar',desc:'Supervisar continuamente el desempeño y la capacidad de los sistemas. Detectar y reportar tendencias negativas antes de que impacten la operación.'},
{code:'BAI04.05',name:'Investigar y abordar problemas de disponibilidad',desc:'Cuando ocurren problemas de disponibilidad o desempeño, investigar sus causas y aplicar correcciones definitivas — no solo medidas temporales.'}],
acts:['Mantener visibilidad del desempeño y la capacidad de los sistemas críticos en tiempo real','Planear la capacidad tecnológica necesaria para soportar los planes de negocio futuros','Coordinar con el negocio para conocer con anticipación los eventos de alta demanda','Realizar pruebas de carga antes de los períodos de máxima demanda','Gestionar la capacidad tecnológica para prevenir degradación antes de que sea visible al negocio'],
casc:{need:'El negocio necesita que los sistemas tecnológicos estén disponibles y funcionen correctamente precisamente cuando más los necesita',align:'TI necesita conocer los planes del negocio con anticipación para dimensionar la capacidad tecnológica que estos requieren',obj:'BAI04 crea ese vínculo: planificación de capacidad conectada con los planes del negocio, con monitoreo proactivo para detectar riesgos antes de que se materialicen'},
kw:['Disponibilidad de sistemas','Gestión de la capacidad','Desempeño tecnológico','Planificación de capacidad','Escalabilidad']},

{code:'BAI05',name:'Cambio Organizacional',
def:'Maximizar la probabilidad de éxito de la implementación de cambios relacionados con TI mediante estrategias formales de gestión del cambio.',
did:'La estadística es consistente: entre el 60% y el 70% de los proyectos tecnológicos no alcanzan los beneficios esperados no porque la tecnología falle, sino porque las personas no cambian su forma de trabajar. Un sistema puede funcionar perfectamente y seguir siendo un fracaso si los usuarios encuentran la manera de evitarlo, si las jefaturas no refuerzan su uso o si la comunicación fue tan tardía que la resistencia ya estaba instalada antes del lanzamiento. La gestión del cambio organizacional no es un complemento de la tecnología — es una condición para que la tecnología genere valor.',
ex_intro:'Una gestión del cambio efectiva convierte implementaciones en transformaciones reales:',
ex_bullets:['La estrategia de cambio para cada implementación significativa se diseña antes de que comience el desarrollo, no como un plan de capacitación de último momento.','Se identifican los líderes informales de cada área afectada y se involucran activamente en el proceso de cambio. La adopción se construye desde adentro, no se impone desde arriba.','La resistencia se gestiona como información: entiende qué preocupaciones tiene cada grupo y responde a ellas en lugar de simplemente superarlas con autoridad.'],
fail_intro:'La gestión del cambio postergada produce adopción superficial que no genera beneficios:',
fail_bullets:['El sistema se implementa técnicamente sin problemas. Meses después, una fracción de los usuarios lo usa regularmente; el resto sigue con los procesos anteriores porque nadie gestionó activamente la transición.','La capacitación se realizó como evento único antes del lanzamiento. Cuando los usuarios tienen preguntas reales durante el uso cotidiano, no hay soporte disponible.','La dirección aprobó el proyecto pero nunca comunicó activamente su respaldo. Sin señales claras de que el cambio es esperado y evaluado, las personas optan por la comodidad de lo que ya conocen.'],
pracs:[
{code:'BAI05.01',name:'Establecer el deseo de cambiar',desc:'Crear la motivación para el cambio articulando claramente por qué es necesario y qué beneficios producirá. Las personas cambian cuando entienden la razón y la ven como legítima.'},
{code:'BAI05.02',name:'Formar un equipo de implementación efectivo',desc:'Construir el equipo que liderará el cambio incluyendo no solo perfiles técnicos sino también representantes del negocio con credibilidad y relaciones en las áreas afectadas.'},
{code:'BAI05.03',name:'Comunicar la visión deseada',desc:'Diseñar y ejecutar la estrategia de comunicación que anticipa el cambio con suficiente tiempo. Las personas no se resisten al cambio: se resisten a la incertidumbre.'},
{code:'BAI05.04',name:'Empoderar a los participantes y reconocer los logros a corto plazo',desc:'Dar a las personas las herramientas, el conocimiento y la confianza para operar en el nuevo estado. Reconocer los avances para mantener el impulso.'},
{code:'BAI05.05',name:'Hacer posibles operaciones y el uso',desc:'Asegurar que la transición al nuevo sistema sea ordenada: el soporte está disponible cuando se necesita, los problemas se resuelven rápidamente y el retorno al estado anterior es posible si fuera necesario.'},
{code:'BAI05.06',name:'Integrar los nuevos enfoques',desc:'Anclar el cambio en la cultura y los procesos de la organización. El cambio está completo cuando ya no requiere esfuerzo consciente para mantenerse.'}],
acts:['Diseñar la estrategia de gestión del cambio antes de que inicie el desarrollo o la adquisición','Identificar y activar los agentes de cambio en cada área afectada','Diseñar y ejecutar una comunicación que anticipa el cambio con suficiente tiempo','Planear y ejecutar la capacitación adaptada a cada perfil de usuario','Monitorear la adopción real y responder activamente a las barreras identificadas'],
casc:{need:'El negocio necesita que las inversiones tecnológicas produzcan los cambios de comportamiento y proceso que justificaron la inversión',align:'TI necesita que las personas del negocio adopten los sistemas que entrega para que esos sistemas generen el valor que justificó su desarrollo',obj:'BAI05 gestiona esa dimensión humana: desde la motivación para cambiar hasta el soporte durante la transición y el anclaje del nuevo estado'},
kw:['Gestión del cambio organizacional','Adopción tecnológica','Comunicación del cambio','Capacitación de usuarios','Resistencia al cambio']},

{code:'BAI06',name:'Cambios de TI',
def:'Gestionar todos los cambios en los sistemas de manera controlada —incluyendo emergencias— para minimizar el riesgo de interrupciones en la operación.',
did:'Los datos sobre interrupciones tecnológicas son consistentes en todas las industrias: la principal causa de fallas en sistemas de producción no son los ataques externos ni el hardware defectuoso — son los cambios no controlados o mal evaluados. Un ajuste de configuración que parecía menor, ejecutado sin proceso, puede derribar un sistema que funcionaba perfectamente. Este objetivo no existe para burocraticar el trabajo técnico: existe para asegurar que cada cambio sea una decisión consciente con impacto evaluado y capacidad de revertirse si algo sale mal.',
ex_intro:'Un control de cambios efectivo produce estabilidad operativa y trazabilidad:',
ex_bullets:['Cuando algo falla en un sistema, la primera pregunta — "¿qué cambió?" — tiene respuesta inmediata porque cada cambio está registrado con quién lo hizo, cuándo y por qué.','Los cambios urgentes siguen un proceso abreviado que mantiene la evaluación de riesgo y el registro, sin las demoras del proceso estándar.','Las áreas del negocio son notificadas de los cambios que pueden afectar sus operaciones con suficiente anticipación como para planear en consecuencia.'],
fail_intro:'Los cambios no controlados producen el tipo de problema más difícil de diagnosticar:',
fail_bullets:['Un sistema que funcionaba perfectamente el viernes falla el lunes. Nadie sabe qué pasó porque no hay registro de los cambios que se hicieron durante el fin de semana.','Los "pequeños ajustes" que cada técnico hace según su criterio se acumulan hasta crear un sistema que nadie entiende completamente en su estado actual.','Las ventanas de mantenimiento se convierten en momentos de alta tensión porque cualquier cambio puede tener consecuencias impredecibles en sistemas que no están documentados.'],
pracs:[
{code:'BAI06.01',name:'Evaluar, priorizar y autorizar solicitudes de cambio',desc:'Revisar cada solicitud de cambio antes de aprobarse: qué implica técnicamente, qué riesgos introduce y qué otros sistemas o procesos del negocio podrían verse afectados.'},
{code:'BAI06.02',name:'Gestionar los cambios de emergencia',desc:'Establecer el proceso para los cambios urgentes que no pueden seguir el flujo estándar. La urgencia no elimina la evaluación de riesgo ni el registro — los simplifica.'},
{code:'BAI06.03',name:'Hacer el seguimiento e informar sobre los cambios de estado',desc:'Monitorear el estado de los cambios aprobados y comunicar su avance a las partes relevantes. El negocio necesita saber qué cambios están pendientes que pueden afectar su operación.'}],
acts:['Registrar y evaluar formalmente todas las solicitudes de cambio en sistemas de producción','Mantener planes de reversión documentados para cada cambio significativo','Notificar a las áreas del negocio sobre cambios que puedan afectar sus operaciones','Verificar el resultado de cada cambio aplicado y registrar cualquier problema encontrado','Revisar regularmente el proceso de cambios para identificar mejoras en eficiencia y control'],
casc:{need:'El negocio necesita que sus sistemas operen establemente y que cualquier interrupción relacionada con cambios se pueda diagnosticar y revertir rápidamente',align:'TI necesita un proceso que permita hacer cambios con agilidad sin sacrificar la estabilidad y la trazabilidad que el negocio requiere',obj:'BAI06 crea ese equilibrio: proceso formal que evalúa el riesgo, registra la acción y mantiene la capacidad de revertir'},
kw:['Control de cambios en sistemas','Solicitud de cambio','Comité de cambios','Plan de reversión (rollback)','Trazabilidad de cambios']},

{code:'BAI07',name:'Aceptación y Transición',
def:'Aceptar formalmente y poner en operación las nuevas soluciones, incluyendo la integración con los procesos del negocio y los sistemas existentes.',
did:'Poner en operación un nuevo sistema es el momento de mayor riesgo en cualquier proyecto. La diferencia entre un lanzamiento ordenado y una crisis de implementación no está en si el sistema funciona técnicamente — está en si el negocio lo validó en sus procesos reales, si el equipo que lo operará está preparado y si hay un plan claro para gestionar los problemas que inevitablemente surgirán en los primeros días. El lanzamiento no es el final del proyecto: es el comienzo de la operación real.',
ex_intro:'Una transición bien gestionada produce confianza desde el primer día de operación:',
ex_bullets:['Las pruebas de aceptación las realizan los usuarios reales del negocio con sus procesos reales — no son un trámite técnico ejecutado por el equipo de desarrollo.','El plan de lanzamiento incluye soporte reforzado durante las primeras semanas, un proceso de resolución de problemas ágil y criterios claros para decidir si se procede, pausa o revierte.','Semanas después del lanzamiento hay una revisión formal que verifica si el sistema está siendo usado como se diseñó y si está generando los beneficios prometidos.'],
fail_intro:'Una transición apresurada produce los problemas más visibles y más costosos en términos de confianza:',
fail_bullets:['El sistema llega a producción sin haber sido probado con los procesos reales del negocio. Los usuarios descubren en el primer día de operación real flujos que el sistema no contempló.','El equipo que operará el sistema no fue preparado suficientemente. Las primeras semanas de operación se pasan resolviendo dudas básicas que debieron haberse cubierto en la capacitación.','No hay revisión post-implementación. El proyecto se declara cerrado el día del lanzamiento y los beneficios prometidos quedan sin verificar.'],
pracs:[
{code:'BAI07.01',name:'Establecer un plan de implementación',desc:'Desarrollar el plan detallado para el lanzamiento: actividades, responsables, cronograma, plan de contingencia y criterios para tomar la decisión de proceder o revertir.'},
{code:'BAI07.02',name:'Planear los procesos de negocio, los roles y las responsabilidades de TI',desc:'Preparar a las personas del negocio y de TI para operar en el nuevo estado. La preparación incluye no solo capacitación técnica sino también claridad sobre los nuevos roles y responsabilidades.'},
{code:'BAI07.03',name:'Planear las pruebas de aceptación',desc:'Diseñar las pruebas que el negocio realizará para validar que el sistema cumple sus necesidades. Los criterios de aceptación se definen con el negocio, no unilateralmente por TI.'},
{code:'BAI07.04',name:'Establecer un entorno de pruebas',desc:'Crear el entorno donde el negocio puede probar el sistema con datos reales sin riesgo para la operación actual. Las pruebas efectivas requieren condiciones que reflejen la realidad.'},
{code:'BAI07.05',name:'Realizar las pruebas de aceptación',desc:'Ejecutar las pruebas planificadas con la participación activa del negocio. Los hallazgos generan correcciones formales antes del lanzamiento.'},
{code:'BAI07.06',name:'Pasar a producción y gestionar el lanzamiento',desc:'Ejecutar el lanzamiento según el plan, con soporte reforzado activo, monitoreo intensivo y capacidad de revertir si algo crítico falla.'},
{code:'BAI07.07',name:'Proporcionar soporte de producción en los primeros tiempos',desc:'Mantener soporte especializado durante el período inicial de operación. Los problemas que surgen en las primeras semanas se resuelven con mayor agilidad que los problemas estándar.'},
{code:'BAI07.08',name:'Realizar una revisión posterior a la implementación',desc:'Evaluar formalmente, semanas después del lanzamiento, si el sistema está siendo usado como se diseñó y si está generando los beneficios que justificaron la inversión.'}],
acts:['Desarrollar el plan de lanzamiento con criterios explícitos para proceder, pausar o revertir','Realizar pruebas de aceptación con usuarios reales del negocio en condiciones reales','Preparar al equipo operativo para el nuevo sistema antes del lanzamiento','Mantener soporte reforzado y monitoreo intensivo durante las primeras semanas de operación','Realizar revisión post-implementación verificando adopción y beneficios materializados'],
casc:{need:'El negocio necesita que los sistemas lleguen a su operación de forma ordenada, con validación previa y soporte disponible cuando surjan los problemas inevitables del inicio',align:'TI necesita que el negocio valide los sistemas antes del lanzamiento para no asumir sola la responsabilidad de que funciona bien en los procesos reales',obj:'BAI07 estructura ese proceso compartido: desde las pruebas de aceptación hasta la revisión post-implementación'},
kw:['Pruebas de aceptación del usuario (UAT)','Puesta en producción (Go-live)','Transición controlada','Validación del negocio','Revisión post-implementación']},

{code:'BAI08',name:'Conocimiento',
def:'Mantener la disponibilidad de conocimiento relevante y actualizado para apoyar todas las actividades y facilitar la toma de decisiones.',
did:'El conocimiento sobre cómo funcionan los sistemas críticos de una organización es un activo tan estratégico como los sistemas mismos — pero mucho más frágil. Cuando ese conocimiento vive principalmente en la memoria de personas específicas, la organización es vulnerable de una forma que no aparece en ningún balance: cada vez que una de esas personas deja de estar disponible, una parte de la capacidad operativa se va con ella. Este objetivo convierte ese saber individual en activo institucional que permanece independientemente de quién esté.',
ex_intro:'Una gestión efectiva del conocimiento produce resiliencia operativa:',
ex_bullets:['Cuando alguien con conocimiento crítico cambia de rol o deja la organización, hay un proceso de transferencia que asegura que ese conocimiento queda documentado antes de que la persona se vaya.','La documentación de los sistemas críticos se actualiza como parte estándar de cualquier cambio — no es una deuda que se pospone indefinidamente.','El conocimiento disponible permite que alguien nuevo en un rol pueda entender cómo funciona lo que opera sin depender de que un colega específico esté disponible para explicárselo.'],
fail_intro:'La concentración de conocimiento crea vulnerabilidades que solo se descubren cuando ya generaron un problema:',
fail_bullets:['La salida de una persona con conocimiento crítico produce semanas o meses de incertidumbre operativa mientras el equipo reconstruye lo que esa persona sabía.','Los proyectos de modernización de sistemas son más costosos y más riesgosos de lo necesario porque nadie documentó las decisiones de diseño del sistema original.','La dependencia de personas específicas para operar componentes críticos es un riesgo operativo que no está en el registro de riesgos porque nadie lo identificó formalmente.'],
pracs:[
{code:'BAI08.01',name:'Cultivar y facilitar el intercambio de conocimiento',desc:'Crear las condiciones para que el conocimiento fluya naturalmente en la organización: espacios de intercambio, incentivos para documentar y cultura que valora compartir.'},
{code:'BAI08.02',name:'Identificar y clasificar las fuentes de información',desc:'Mapear dónde vive el conocimiento crítico de la organización: quién sabe qué, qué está documentado y qué existe solo en la memoria de personas específicas.'},
{code:'BAI08.03',name:'Organizar y contextualizar la información en conocimiento',desc:'Convertir la información disponible en conocimiento estructurado y accesible. No es solo guardar documentos — es organizarlos para que sean útiles cuando se necesiten.'},
{code:'BAI08.04',name:'Usar y compartir el conocimiento',desc:'Asegurar que el conocimiento disponible se usa activamente en la toma de decisiones y en la operación. El conocimiento que nadie usa no tiene valor estratégico.'},
{code:'BAI08.05',name:'Evaluar y actualizar o retirar la información',desc:'Mantener el conocimiento relevante y actualizado. El conocimiento desactualizado puede ser tan peligroso como la falta de conocimiento.'}],
acts:['Identificar el conocimiento crítico de la organización y evaluar su nivel de documentación','Establecer el proceso de transferencia de conocimiento como requisito ante cambios de personal','Mantener repositorios de conocimiento accesibles y actualizados para los sistemas críticos','Incorporar la documentación como entregable estándar en todos los proyectos y cambios','Revisar periódicamente la relevancia y actualidad del conocimiento documentado'],
casc:{need:'El negocio necesita que la capacidad operativa tecnológica no dependa de la disponibilidad de personas específicas',align:'TI necesita convertir el conocimiento individual de sus equipos en activos institucionales que soporten la continuidad operativa',obj:'BAI08 crea esa conversión: los procesos, incentivos y repositorios que hacen que el saber individual se convierta en patrimonio de la organización'},
kw:['Gestión del conocimiento','Documentación de sistemas','Transferencia de conocimiento','Repositorio institucional','Continuidad del conocimiento']},

{code:'BAI09',name:'Activos de TI',
def:'Gestionar los activos de TI a través de su ciclo de vida completo para asegurar que su contribución sea óptima al menor costo posible.',
did:'Las organizaciones descubren con frecuencia — en auditorías o por accidente — que pagan por tecnología que nadie usa, que operan equipos sin soporte del fabricante o que tienen licencias de software cuya validez no han verificado en años. Ninguna de esas situaciones es necesariamente intencional: son el resultado de no gestionar los activos tecnológicos como lo que son, inversiones que deben justificar su costo a lo largo de toda su vida útil, no solo en el momento de la compra.',
ex_intro:'Una gestión efectiva de activos produce control financiero y operativo real:',
ex_bullets:['El inventario de activos tecnológicos está actualizado y refleja la realidad de lo que opera, no lo que se compró hace cinco años. Cualquier auditoría encuentra el mismo escenario que el inventario describe.','Las licencias de software se revisan periódicamente contra el uso real. Cuando hay exceso, se reducen; cuando hay déficit, se ajustan antes de que se convierta en un riesgo de cumplimiento.','Los activos que llegan al final de su vida útil se retiran de forma ordenada, asegurando que los datos sensibles que contienen se eliminan de forma irreversible.'],
fail_intro:'La gestión deficiente de activos genera simultáneamente desperdicio y riesgo:',
fail_bullets:['La organización paga por licencias, servicios o hardware que ya no genera valor porque nadie verificó si seguían siendo necesarios.','Los equipos que operan sin soporte del fabricante representan vulnerabilidades de seguridad activas que el equipo técnico conoce pero que nadie escaló formalmente para que se decidiera qué hacer con ellas.','Los activos retirados no siempre se disponen de forma segura, creando el riesgo de que datos sensibles de la organización queden expuestos en equipos que salieron de su control.'],
pracs:[
{code:'BAI09.01',name:'Identificar y registrar activos actuales',desc:'Mantener un inventario completo y actualizado de todos los activos tecnológicos de la organización: hardware, software, licencias y servicios externos.'},
{code:'BAI09.02',name:'Gestionar activos críticos',desc:'Dar atención especial a los activos que son críticos para la operación del negocio: asegurar su disponibilidad, su soporte activo y su planificación de reemplazo.'},
{code:'BAI09.03',name:'Gestionar el ciclo de vida de los activos',desc:'Gestionar cada activo desde la adquisición hasta el retiro, asegurando que genera valor proporcional a su costo en cada etapa de su vida útil.'},
{code:'BAI09.04',name:'Optimizar el costo de los activos',desc:'Revisar regularmente si los activos tecnológicos se están usando de forma eficiente y si el costo que representan es proporcional al valor que generan.'},
{code:'BAI09.05',name:'Gestionar las licencias',desc:'Asegurar que el uso de software sea siempre consistente con las licencias vigentes. Gestionar proactivamente las renovaciones y los ajustes de cantidad.'}],
acts:['Mantener un inventario completo y actualizado de todos los activos tecnológicos','Revisar periódicamente el uso real de licencias de software frente a lo contratado','Gestionar el ciclo de vida de cada activo incluyendo su planificación de reemplazo oportuno','Retirar los activos de forma segura garantizando la eliminación irreversible de datos sensibles','Optimizar el costo de los activos eliminando lo que no genera valor'],
casc:{need:'La dirección financiera necesita que los activos tecnológicos generen valor proporcional a su costo y que el riesgo de cumplimiento en licencias esté controlado',align:'TI necesita visibilidad completa de su inventario para gestionar costos, riesgos y continuidad operativa con eficiencia',obj:'BAI09 provee esa visibilidad y los procesos para mantenerla actualizada durante todo el ciclo de vida de cada activo'},
kw:['Inventario de activos tecnológicos','Gestión de licencias','Ciclo de vida del activo','Optimización de costos tecnológicos','Retiro seguro de activos']},

{code:'BAI10',name:'Configuración',
def:'Definir y mantener las descripciones y relaciones entre los recursos de TI clave y las capacidades requeridas para entregar los servicios tecnológicos.',
did:'Cuando algo falla en los sistemas, hay dos preguntas que determinan la velocidad de la respuesta: "¿qué cambió?" y "¿qué más depende de esto?". Sin un mapa actualizado de los componentes tecnológicos y sus relaciones, responder esas preguntas puede tomar horas de investigación. Con ese mapa, pueden responderse en minutos. La gestión de configuración no es administración de inventario técnico: es la infraestructura de conocimiento que hace posible gestionar incidentes y cambios con eficiencia real.',
ex_intro:'Un mapa de configuración actualizado produce diagnósticos rápidos y cambios seguros:',
ex_bullets:['Cuando se presenta un incidente, el equipo puede identificar rápidamente qué componentes están involucrados y qué otras partes del negocio podrían verse afectadas — sin necesidad de investigar desde cero.','Antes de aplicar un cambio en producción, es posible evaluar su impacto potencial sobre otros sistemas que dependen del componente que se va a modificar.','Las auditorías de la configuración real del entorno tecnológico coinciden con lo que el inventario describe.'],
fail_intro:'Un mapa desactualizado o inexistente convierte cada incidente en una investigación de mayor escala:',
fail_bullets:['Un componente falla y nadie sabe con certeza qué otros sistemas dependen de él. El equipo va descubriendo el alcance real del problema mientras el negocio lo experimenta.','Los cambios producen consecuencias inesperadas en sistemas que "nadie sabía" que estaban relacionados con el componente modificado.','La deuda de documentación técnica hace que cada nuevo integrante del equipo tarde meses en tener suficiente contexto para operar con confianza.'],
pracs:[
{code:'BAI10.01',name:'Establecer y mantener un modelo de configuración',desc:'Definir cómo se documenta y gestiona la configuración del entorno tecnológico: qué se registra, con qué nivel de detalle y cómo se mantiene actualizado.'},
{code:'BAI10.02',name:'Establecer y mantener un repositorio de configuración',desc:'Implementar y mantener el repositorio donde vive el mapa de componentes tecnológicos y sus relaciones. Que sea la fuente de verdad sobre el estado real del entorno.'},
{code:'BAI10.03',name:'Mantener y controlar los elementos de configuración',desc:'Asegurar que cada cambio en el entorno tecnológico se refleja en el repositorio de configuración. El mapa solo tiene valor si está actualizado.'},
{code:'BAI10.04',name:'Producir informes de estado y configuración',desc:'Generar información sobre el estado de la configuración que sea útil para la gestión de incidentes, cambios y planificación de capacidad.'}],
acts:['Construir y mantener el inventario de componentes tecnológicos con sus relaciones','Actualizar el mapa de configuración como parte estándar de cada cambio en producción','Auditar periódicamente que el mapa refleja la realidad del entorno actual','Integrar el repositorio de configuración con los procesos de gestión de incidentes y cambios','Gestionar el acceso al repositorio asegurando que la información es confiable y no se modifica sin control'],
casc:{need:'El negocio necesita que los incidentes tecnológicos se diagnostiquen y resuelvan rápidamente, minimizando el tiempo de impacto operativo',align:'TI necesita visibilidad del ecosistema tecnológico que haga posible diagnosticar, cambiar y planear con eficiencia real',obj:'BAI10 construye esa visibilidad: el mapa de componentes y relaciones que hace posible la gestión informada del entorno tecnológico'},
kw:['Mapa de componentes tecnológicos','Dependencias de sistemas','Inventario de infraestructura','Gestión de configuración','Trazabilidad tecnológica']},

{code:'BAI11',name:'Proyectos',
def:'Gestionar los proyectos de TI en alineación con el portafolio de inversiones, desde la iniciación hasta el cierre formal.',
did:'Los proyectos tecnológicos no fracasan porque la tecnología sea difícil. Fracasan porque el alcance no se definió con precisión y creció sin control, porque nadie identificó los riesgos hasta que ya se materializaron, porque el patrocinador del negocio perdió visibilidad del estado real durante meses, o porque las decisiones difíciles se postergaron hasta que ya no quedaban buenas opciones. La gestión formal de proyectos no agrega burocracia — reemplaza la incertidumbre y la improvisación con procesos que producen resultados predecibles.',
ex_intro:'Una gestión disciplinada de proyectos produce resultados predecibles:',
ex_bullets:['El alcance, el cronograma, el presupuesto y los criterios de calidad están definidos y acordados formalmente antes de que comience la ejecución.','El patrocinador del negocio recibe reportes regulares sobre el estado real del proyecto — incluyendo los problemas — con suficiente tiempo para tomar decisiones antes de que los problemas escalen.','Cuando el proyecto termina, hay una revisión de lecciones aprendidas que documenta qué funcionó bien y qué se haría diferente. Ese conocimiento queda disponible para los proyectos siguientes.'],
fail_intro:'La gestión informal de proyectos produce los patrones de fracaso más reconocibles:',
fail_bullets:['El alcance crece gradualmente sin proceso formal de aprobación. Cada "pequeña adición" es razonable en sí misma; la suma produce un proyecto que cuesta el triple y dura el doble de lo planeado.','El patrocinador del negocio se entera del estado real del proyecto en reuniones de crisis, no en reportes regulares. Las decisiones difíciles llegan demasiado tarde.','El proyecto se "termina" el día del lanzamiento sin revisión de lecciones aprendidas. Los mismos problemas de gestión se repiten en el proyecto siguiente.'],
pracs:[
{code:'BAI11.01',name:'Mantener un enfoque estándar para la gestión de proyectos',desc:'Establecer la metodología y los estándares con los que se gestionan todos los proyectos. La consistencia en el enfoque permite comparar proyectos y mejorar con el tiempo.'},
{code:'BAI11.02',name:'Iniciar un proyecto',desc:'Establecer las bases del proyecto correctamente: alcance, objetivos, recursos, cronograma, riesgos y criterios de éxito acordados con el patrocinador antes de empezar.'},
{code:'BAI11.03',name:'Gestionar la calidad del proyecto',desc:'Asegurar que el proyecto produce entregables que cumplen los estándares de calidad acordados. La calidad se gestiona durante el proyecto, no solo se verifica al final.'},
{code:'BAI11.04',name:'Gestionar el riesgo del proyecto',desc:'Identificar, evaluar y gestionar los riesgos específicos del proyecto desde el inicio. Los riesgos que se gestionan temprano son significativamente más baratos que los que se enfrentan tarde.'},
{code:'BAI11.05',name:'Gestionar el cambio del proyecto',desc:'Gestionar formalmente los cambios en el alcance, cronograma o presupuesto del proyecto. Cada cambio es una decisión que debe tomarse con información sobre su impacto.'},
{code:'BAI11.06',name:'Gestionar las comunicaciones del proyecto',desc:'Mantener informadas a las partes relevantes del estado real del proyecto con la frecuencia y el formato que cada una necesita para cumplir su rol.'},
{code:'BAI11.07',name:'Cerrar un proyecto',desc:'Formalizar el cierre del proyecto: verificar que los entregables fueron aceptados, liberar los recursos asignados y documentar las lecciones aprendidas para proyectos futuros.'}],
acts:['Definir y acordar formalmente el alcance, cronograma, presupuesto y criterios de calidad antes de iniciar','Identificar y gestionar los riesgos del proyecto desde el inicio, no cuando ya se materializaron','Comunicar el estado real del proyecto al patrocinador con regularidad y sin filtros','Gestionar formalmente los cambios de alcance evaluando su impacto antes de aprobarlos','Cerrar el proyecto con revisión formal de lecciones aprendidas disponible para proyectos futuros'],
casc:{need:'El negocio necesita que las inversiones en proyectos tecnológicos produzcan los resultados prometidos, en los plazos y presupuestos acordados',align:'TI necesita la disciplina de gestión de proyectos para comprometer resultados con confianza y cumplirlos consistentemente',obj:'BAI11 provee esa disciplina: desde la definición clara del alcance hasta el cierre formal con lecciones aprendidas'},
kw:['Gestión de proyectos','Alcance del proyecto','Control de presupuesto de proyectos','Gestión de riesgos del proyecto','Lecciones aprendidas']}
]},
{code:'DSS',es:'Entregar, Dar Servicio y Soporte',en:'Deliver, Service & Support',color:'#047857',emoji:'🚀',type:'GESTIÓN',
desc:'El dominio de la operación cotidiana. Aquí vive la experiencia que todos los empleados tienen con la tecnología cada día: si los sistemas están disponibles, si los problemas se resuelven con rapidez y si la organización puede recuperarse cuando ocurre algo grave. La excelencia en este dominio es invisible cuando funciona — y muy visible cuando falla.',
objs:[
{code:'DSS01',name:'Operaciones',
def:'Coordinar y ejecutar las actividades operativas necesarias para entregar servicios de TI con la calidad requerida, incluyendo la ejecución de procedimientos operativos estándar.',
did:'La operación tecnológica de excelencia se reconoce por su invisibilidad: los sistemas están disponibles, las copias de seguridad se ejecutaron, el monitoreo detectó el problema antes de que afectara al negocio. Esa invisibilidad no ocurre por azar — ocurre porque hay procedimientos definidos, rutinas verificadas y monitoreo activo que previenen los problemas antes de que sean visibles. Cuando la operación no tiene ese nivel de disciplina, lo que parece imprevisible es en realidad la consecuencia acumulada de rutinas que nadie ejecutaba.',
ex_intro:'Una operación tecnológica madura produce continuidad sin sobresaltos:',
ex_bullets:['Cada mañana hay una verificación sistemática del estado de los sistemas críticos: que las copias de seguridad se ejecutaron correctamente, que no hay alertas activas, que los indicadores de desempeño están dentro de los parámetros normales.','Los problemas potenciales se detectan por monitoreo automatizado antes de que los usuarios del negocio los experimenten.','Los procedimientos para las tareas operativas críticas están documentados, actualizados y cualquier miembro del equipo puede ejecutarlos sin depender de que un colega específico esté disponible.'],
fail_intro:'La operación reactiva produce interrupciones que son prevenibles con disciplina básica:',
fail_bullets:['Las fallas se descubren cuando los usuarios las reportan, no cuando los sistemas las señalan. El negocio es el sistema de detección de problemas porque no hay monitoreo activo.','Las copias de seguridad existen pero nadie verifica regularmente que se ejecutan correctamente o que los datos se pueden restaurar. La organización descubre el problema cuando necesita la restauración.','Los procedimientos operativos dependen de personas específicas que "saben cómo hacerlo". La operación es frágil ante ausencias o rotación del equipo.'],
pracs:[
{code:'DSS01.01',name:'Ejecutar procedimientos operativos',desc:'Ejecutar los procedimientos documentados para las tareas operativas cotidianas. La consistencia en la ejecución es la base de la confiabilidad operativa.'},
{code:'DSS01.02',name:'Gestionar servicios de TI externalizados',desc:'Asegurar que los proveedores de servicios operativos cumplen sus compromisos y que su desempeño se monitorea con la misma rigurosidad que los servicios internos.'},
{code:'DSS01.03',name:'Monitorear la infraestructura de TI',desc:'Supervisar continuamente el estado y el desempeño de la infraestructura tecnológica. Detectar tendencias negativas antes de que se conviertan en interrupciones.'},
{code:'DSS01.04',name:'Gestionar el entorno',desc:'Mantener las condiciones físicas y de seguridad de las instalaciones donde opera la tecnología crítica de la organización.'},
{code:'DSS01.05',name:'Gestionar las instalaciones',desc:'Asegurar que las instalaciones que albergan la tecnología tienen los controles físicos, ambientales y de acceso necesarios para proteger los activos críticos.'}],
acts:['Ejecutar y verificar las rutinas operativas diarias incluyendo copias de seguridad y verificaciones de estado','Monitorear proactivamente el desempeño de los sistemas críticos con alertas configuradas','Mantener procedimientos operativos documentados y accesibles para todos los miembros del equipo','Gestionar el mantenimiento preventivo de la infraestructura tecnológica','Verificar periódicamente que los procedimientos de recuperación funcionan correctamente'],
casc:{need:'El negocio necesita que los sistemas tecnológicos operen con confiabilidad predecible, no que cada interrupción sea una sorpresa',align:'TI necesita procedimientos, herramientas y rutinas que produzcan confiabilidad operativa sistemáticamente',obj:'DSS01 establece esas rutinas y los mecanismos de monitoreo que convierten la confiabilidad en resultado sistemático en lugar de coincidencia'},
kw:['Operaciones tecnológicas','Procedimientos operativos (SOP)','Copias de seguridad (Backup & Recovery)','Monitoreo de sistemas','Mantenimiento preventivo']},

{code:'DSS02',name:'Solicitudes e Incidentes',
def:'Proveer una respuesta oportuna y efectiva a las solicitudes de usuarios e incidentes para restaurar el servicio normal y satisfacer las necesidades del negocio.',
did:'La percepción que toda la organización tiene del área tecnológica se forma principalmente en estos momentos cotidianos: cuando algo deja de funcionar y alguien necesita ayuda. No importa cuán avanzados sean los sistemas ni cuán bien ejecutados los proyectos — si la experiencia de pedir ayuda es frustrante, si la comunicación sobre el estado de los problemas no existe, y si los tiempos de respuesta son impredecibles, la reputación de la función tecnológica será negativa. Este objetivo gestiona esa experiencia con la misma seriedad con que se gestionan los aspectos más técnicos de la función.',
ex_intro:'Una gestión efectiva de incidentes produce una experiencia que refuerza la confianza:',
ex_bullets:['Cuando algo falla, el usuario recibe una confirmación de que el problema fue registrado y una estimación de cuándo será resuelto — sin necesidad de perseguir a nadie.','Los incidentes se priorizan según su impacto real en el negocio. Los problemas que afectan a más personas o a procesos más críticos se atienden primero, con criterios conocidos.','Al cierre de un incidente, el usuario recibe confirmación de que fue resuelto y tiene la oportunidad de confirmar que efectivamente es así desde su perspectiva.'],
fail_intro:'Una gestión deficiente de incidentes produce una experiencia que erosiona la confianza de toda la organización:',
fail_bullets:['Los usuarios no saben si su problema fue registrado, quién lo está atendiendo ni cuándo será resuelto. La única forma de obtener información es llamar o escribir directamente a alguien en TI.','La respuesta depende de qué técnico esté disponible o de qué relación tenga el solicitante con el equipo de TI. La atención es inconsistente y percibida como arbitraria.','Los mismos incidentes se resuelven repetidamente sin que nadie investigue por qué siguen ocurriendo. El equipo de soporte está permanentemente ocupado resolviendo los mismos problemas.'],
pracs:[
{code:'DSS02.01',name:'Definir esquemas de clasificación de incidentes y solicitudes de servicio',desc:'Establecer los criterios con los que se clasifican y priorizan los incidentes según su impacto al negocio. Que todos sepan qué significa urgente, alto, medio y bajo.'},
{code:'DSS02.02',name:'Registrar, clasificar y priorizar solicitudes e incidentes',desc:'Registrar formalmente cada incidente o solicitud en el momento en que se reporta. La clasificación determina la prioridad de atención y los tiempos de respuesta comprometidos.'},
{code:'DSS02.03',name:'Verificar, aprobar y tramitar las solicitudes de servicio',desc:'Gestionar las solicitudes de servicio de forma ordenada: verificar que son válidas, aprobarlas según las políticas correspondientes y ejecutarlas en los tiempos comprometidos.'},
{code:'DSS02.04',name:'Investigar, diagnosticar y distribuir los incidentes',desc:'Analizar el incidente para identificar su causa técnica inmediata y asignarlo al equipo o persona con las capacidades para resolverlo.'},
{code:'DSS02.05',name:'Resolver y recuperar los incidentes',desc:'Aplicar la solución que restaura el servicio al estado normal. Si no existe una solución definitiva, aplicar un procedimiento temporal documentado mientras se trabaja en la solución permanente.'},
{code:'DSS02.06',name:'Cerrar solicitudes de servicio e incidentes',desc:'Confirmar con el usuario que el servicio fue restaurado satisfactoriamente. Documentar la resolución para que quede disponible si el mismo problema ocurre en el futuro.'},
{code:'DSS02.07',name:'Hacer el seguimiento del estado y producir informes',desc:'Monitorear el desempeño del proceso de gestión de incidentes: tiempos de respuesta, tasas de resolución, satisfacción del usuario. Usar esos datos para mejorar continuamente.'}],
acts:['Registrar y priorizar todos los incidentes y solicitudes según criterios de impacto al negocio','Comunicar proactivamente el estado de los incidentes a los usuarios afectados','Resolver los incidentes en los tiempos comprometidos escalando cuando sea necesario','Monitorear los indicadores de desempeño del servicio de soporte y gestionar las desviaciones','Cerrar formalmente los incidentes confirmando la resolución con el usuario'],
casc:{need:'El negocio necesita que cuando algo falla tecnológicamente, la respuesta sea rápida, organizada y comunicada — no improvisada y opaca',align:'TI necesita un proceso que produzca respuestas predecibles y confiables independientemente de quién esté de turno',obj:'DSS02 estructura ese proceso: desde el registro hasta el cierre, con tiempos comprometidos y comunicación activa'},
kw:['Mesa de ayuda (Service Desk)','Gestión de incidentes','Tiempo de respuesta','Priorización de incidentes','Comunicación al usuario']},

{code:'DSS03',name:'Problemas',
def:'Identificar y clasificar los problemas, investigar su causa raíz y presentar resoluciones para prevenir la recurrencia de incidentes.',
did:'Hay una diferencia crucial entre un incidente y un problema: el incidente es el síntoma que afecta hoy a alguien; el problema es la causa que seguirá produciendo ese síntoma indefinidamente si nadie la investiga. Resolver incidentes sin investigar los problemas que los generan es efectivo a corto plazo y costoso a largo plazo: el equipo de soporte vive perpetuamente apagando el mismo incendio, sin tiempo para investigar por qué ese incendio sigue apareciendo. Este objetivo libera al equipo de ese ciclo.',
ex_intro:'Una gestión de problemas efectiva produce reducción visible de incidentes recurrentes:',
ex_bullets:['Cuando un tipo de incidente ocurre con frecuencia inusual, se abre automáticamente una investigación de problema para identificar la causa raíz.','Los problemas identificados tienen responsable, plan de solución definitiva y fecha de resolución comprometida. No son simplemente registros de algo que "sigue pasando".','La frecuencia de los incidentes más comunes disminuye con el tiempo porque las causas raíz se van eliminando de forma sistemática.'],
fail_intro:'La gestión solo de incidentes sin gestión de problemas produce agotamiento operativo y frustración institucional:',
fail_bullets:['El mismo problema afecta al mismo proceso del negocio semana tras semana. Los usuarios han dejado de reportarlo porque "de todas formas siempre pasa lo mismo".','El equipo de soporte dedica la mayoría de su tiempo a resolver los mismos incidentes repetidamente, sin tiempo ni energía para investigar las causas.','El negocio tiene la percepción de que la tecnología es intrínsecamente inestable, cuando en realidad lo que falta es el proceso para eliminar los problemas de base.'],
pracs:[
{code:'DSS03.01',name:'Identificar y clasificar problemas',desc:'Detectar y registrar los problemas a partir de incidentes recurrentes, alertas de monitoreo o análisis proactivo. Clasificarlos según su impacto potencial para priorizar la investigación.'},
{code:'DSS03.02',name:'Investigar y diagnosticar problemas',desc:'Analizar el problema en profundidad para identificar su causa raíz. La causa raíz es la condición fundamental que, si se elimina, previene que el incidente vuelva a ocurrir.'},
{code:'DSS03.03',name:'Registrar los errores conocidos',desc:'Documentar los problemas identificados y las soluciones temporales disponibles mientras se desarrolla la solución definitiva. Que el equipo de soporte tenga acceso inmediato a este conocimiento.'},
{code:'DSS03.04',name:'Resolver y cerrar problemas',desc:'Implementar la solución definitiva que elimina la causa raíz. Verificar que el incidente asociado deja de ocurrir y cerrar el problema formalmente con la evidencia correspondiente.'},
{code:'DSS03.05',name:'Realizar revisiones post-problemas',desc:'Revisar los problemas más significativos después de resolverse para identificar si hay patrones o lecciones más amplias que aplicar en el sistema de gestión.'}],
acts:['Identificar problemas a partir de incidentes recurrentes o de alto impacto y registrarlos formalmente','Investigar la causa raíz con rigor metodológico hasta encontrar la condición fundamental','Documentar soluciones temporales para reducir el impacto mientras se trabaja la solución definitiva','Implementar y verificar la solución definitiva que elimina la causa raíz','Monitorear que los incidentes asociados al problema no vuelven a ocurrir tras la resolución'],
casc:{need:'El negocio necesita que los problemas tecnológicos recurrentes se eliminen definitivamente, no que se traten repetidamente como si fueran nuevos cada vez',align:'TI necesita el proceso y el tiempo para investigar causas raíz en lugar de estar perpetuamente resolviendo síntomas',obj:'DSS03 provee ese proceso: la investigación sistemática que convierte patrones de incidentes en problemas resueltos definitivamente'},
kw:['Gestión de problemas','Análisis de causa raíz (RCA)','Incidentes recurrentes','Solución definitiva','Solución temporal (workaround)']},

{code:'DSS04',name:'Continuidad',
def:'Mantener la disponibilidad de los servicios de información de acuerdo con los requisitos mínimos del negocio en caso de una interrupción significativa.',
did:'La continuidad operativa no es un tema de TI — es un tema de supervivencia del negocio. La pregunta relevante no es si los sistemas pueden fallar sino cuánto puede sobrevivir el negocio sin ellos y qué capacidad real tiene la organización para recuperarse cuando ocurra lo inevitable. Un plan de continuidad que nunca se ha probado no es una garantía: es una intención documentada. La diferencia entre una organización que sobrevive una crisis tecnológica grave y una que no lo hace es si tenía la preparación real antes de necesitarla.',
ex_intro:'Una continuidad bien gestionada produce capacidad real de respuesta ante crisis:',
ex_bullets:['Los procesos críticos del negocio tienen un tiempo máximo de recuperación definido y los recursos necesarios para cumplirlo están preparados y probados — no solo documentados.','La organización realiza simulacros periódicos que prueban el plan en condiciones lo más reales posible. Los problemas que revela el simulacro se corrigen antes de que los revele una crisis real.','Las decisiones sobre qué sistemas recuperar primero están tomadas de antemano, basadas en el impacto al negocio de cada proceso, no en el orden en que alguien los recuerde durante el caos de una crisis.'],
fail_intro:'La preparación nominal sin capacidad real produce consecuencias graves en el peor momento:',
fail_bullets:['El plan de continuidad existe en un documento que nadie ha leído completamente en los últimos dos años y que no refleja los cambios tecnológicos y operativos que ocurrieron en ese período.','Los procedimientos de recuperación nunca se han probado. La organización descubre en el momento de la crisis que algunos pasos del plan tienen supuestos incorrectos o que los responsables designados ya no están en esos roles.','Los presupuestos para capacidades de recuperación se recortan sistemáticamente porque "nunca pasa nada". Hasta que pasa.'],
pracs:[
{code:'DSS04.01',name:'Definir la política de continuidad del negocio',desc:'Establecer el marco de la continuidad: qué servicios deben recuperarse, en qué tiempo máximo y con qué nivel mínimo de funcionalidad para que el negocio pueda operar.'},
{code:'DSS04.02',name:'Mantener una estrategia de continuidad',desc:'Definir las estrategias técnicas y organizacionales que harán posible la recuperación dentro de los tiempos y niveles comprometidos.'},
{code:'DSS04.03',name:'Desarrollar e implementar una respuesta a continuidad del negocio',desc:'Construir los planes detallados, los procedimientos y las capacidades técnicas necesarias para ejecutar la estrategia de continuidad cuando se necesite.'},
{code:'DSS04.04',name:'Ejercer, probar y revisar el plan BCP',desc:'Probar regularmente el plan con simulacros que revelen sus debilidades antes de que lo haga una crisis real. Actualizar el plan con los hallazgos de cada prueba.'},
{code:'DSS04.05',name:'Revisar, mantener y mejorar el plan de continuidad',desc:'Actualizar el plan cuando cambian los sistemas, los procesos o la estrategia del negocio. Un plan desactualizado puede ser peor que ningún plan.'},
{code:'DSS04.06',name:'Proveer entrenamiento en el plan de continuidad',desc:'Asegurar que las personas que deben ejecutar el plan lo conocen, lo han practicado y pueden actuar con confianza en condiciones de alta presión.'},
{code:'DSS04.07',name:'Gestionar acuerdos de respaldo',desc:'Mantener los acuerdos con proveedores, sitios de recuperación y recursos externos que el plan de continuidad requiere para funcionar.'},
{code:'DSS04.08',name:'Ejecutar revisiones post-reanudación',desc:'Después de activar el plan en una situación real, revisar lo que funcionó y lo que no para mejorar el plan antes de la siguiente eventualidad.'}],
acts:['Identificar qué procesos del negocio son críticos y cuánto tiempo máximo pueden estar sin sistemas','Desarrollar planes de continuidad que reflejen los sistemas y procesos actuales','Probar los planes con simulacros periódicos en condiciones lo más reales posible','Mantener las capacidades técnicas de recuperación operativas y actualizadas','Capacitar a los responsables de ejecutar el plan antes de que necesiten hacerlo'],
casc:{need:'El negocio necesita saber que puede recuperarse de interrupciones tecnológicas graves dentro de tiempos que no comprometan su operación o su reputación',align:'TI necesita los recursos, los planes y la práctica para hacer posible esa recuperación en condiciones reales de crisis',obj:'DSS04 construye esa capacidad real: desde la estrategia de continuidad hasta los simulacros que convierten el plan en músculo organizacional'},
kw:['Plan de continuidad del negocio (BCP)','Plan de recuperación ante desastres (DRP)','Tiempo máximo de recuperación (RTO)','Pérdida máxima de datos aceptable (RPO)','Análisis de impacto al negocio (BIA)']},

{code:'DSS05',name:'Servicios de Seguridad',
def:'Proteger la información de la empresa para mantener el riesgo de seguridad en niveles aceptables según la política organizacional.',
did:'La mayor parte de los incidentes de seguridad de información no son el resultado de ataques técnicos sofisticados — son el resultado de comportamientos humanos predecibles y controlables: un empleado que entrega sus credenciales a alguien que no debería tenerlas, un acceso que nunca se revocó, una configuración que nadie verificó en meses. Eso significa que la seguridad operativa es un problema de personas y procesos tanto como de tecnología, y que gestionar solo la parte técnica deja expuesta la parte que más frecuentemente falla.',
ex_intro:'Una seguridad operativa efectiva produce detección temprana y respuesta ordenada:',
ex_bullets:['Los accesos a sistemas y datos se revisan periódicamente. Cuando alguien deja la organización o cambia de rol, sus accesos se actualizan en el proceso estándar — no se descubren meses después en una auditoría.','El monitoreo de seguridad detecta comportamientos inusuales antes de que se conviertan en incidentes. La organización actúa sobre señales de alerta, no solo sobre daños consumados.','Cuando ocurre un incidente de seguridad, hay un protocolo conocido que guía la respuesta de forma ordenada: contención, investigación, comunicación y corrección.'],
fail_intro:'Las brechas de seguridad más frecuentes son también las más prevenibles:',
fail_bullets:['Los accesos no revocados de personas que ya no trabajan en la organización representan una de las vulnerabilidades más comunes y más evitables. Se crean por omisión, no por decisión.','La capacitación en seguridad es ocasional o solo para el área técnica. Los empleados de otras áreas no saben identificar los ataques de ingeniería social que son el vector de entrada más frecuente.','Los incidentes de seguridad se detectan semanas o meses después de ocurridos porque el monitoreo no es activo o las señales de alerta no tienen quién las revise regularmente.'],
pracs:[
{code:'DSS05.01',name:'Proteger contra software malicioso',desc:'Implementar y mantener los controles técnicos que previenen y detectan la presencia de software malicioso en los sistemas de la organización.'},
{code:'DSS05.02',name:'Gestionar la seguridad de la red y las conexiones',desc:'Controlar el acceso a la red de la organización y las conexiones desde y hacia sistemas externos. Proteger el perímetro sin sacrificar la funcionalidad operativa.'},
{code:'DSS05.03',name:'Gestionar la seguridad de los puntos finales',desc:'Asegurar los dispositivos que se conectan a los sistemas de la organización: computadoras, dispositivos móviles y cualquier otro punto de acceso.'},
{code:'DSS05.04',name:'Gestionar la identidad del usuario y el acceso lógico',desc:'Controlar quién tiene acceso a qué sistemas y datos. Revisar regularmente que los accesos otorgados siguen siendo apropiados para el rol actual de cada persona.'},
{code:'DSS05.05',name:'Gestionar el acceso físico a los activos de TI',desc:'Controlar quién puede acceder físicamente a los sistemas y las instalaciones donde opera la tecnología crítica.'},
{code:'DSS05.06',name:'Gestionar documentos sensitivos y dispositivos de salida',desc:'Controlar la creación, distribución y eliminación de información sensible en formatos físicos y digitales.'},
{code:'DSS05.07',name:'Monitorear la infraestructura para detectar eventos relacionados con la seguridad',desc:'Supervisar continuamente los sistemas para detectar comportamientos inusuales que puedan indicar un intento de ataque o una brecha activa.'}],
acts:['Revisar y actualizar los accesos a sistemas cuando cambia el rol o la situación laboral de cada persona','Capacitar a toda la organización en seguridad de información con periodicidad y relevancia para cada rol','Monitorear activamente los sistemas para detectar comportamientos anómalos o indicadores de compromiso','Responder a los incidentes de seguridad con protocolo formal que incluye contención, investigación y comunicación','Verificar periódicamente la efectividad de los controles de seguridad implementados'],
casc:{need:'El negocio necesita que su información crítica esté protegida de accesos no autorizados, tanto internos como externos',align:'TI necesita controles operativos activos que protejan la información no solo con herramientas técnicas sino también con procesos y comportamientos de toda la organización',obj:'DSS05 implementa esos controles: desde la gestión de accesos hasta el monitoreo activo y la respuesta a incidentes'},
kw:['Control de acceso a sistemas','Gestión de identidades (IAM)','Monitoreo de seguridad','Vulnerabilidades de seguridad','Respuesta a incidentes de seguridad']},

{code:'DSS06',name:'Controles de Proceso',
def:'Definir y mantener controles apropiados en los procesos del negocio soportados por TI, para asegurar que la información procesada sea completa, precisa y válida.',
did:'Cuando la tecnología automatiza procesos críticos del negocio — pagos, nómina, facturación, contratos — los controles integrados en esos sistemas se convierten en la primera línea de defensa contra fraudes y errores a escala. La diferencia fundamental con los controles manuales es que los controles en los sistemas funcionan consistentemente, independientemente de quién ejecute el proceso, de qué turno sea o de qué presión exista para "hacer excepciones". Un control diseñado en la estructura del sistema no depende de la buena voluntad de ninguna persona.',
