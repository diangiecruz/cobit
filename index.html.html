ex_intro:'Los controles de proceso bien diseñados producen confianza en la integridad de la información:',
ex_bullets:['En los procesos de alto riesgo financiero, ninguna persona puede completar el ciclo completo de forma unilateral. La separación de roles está configurada en el sistema, no en el manual de procedimientos.','Las auditorías internas y externas encuentran que los controles configurados en los sistemas coinciden con los controles descritos en las políticas. No hay brechas entre lo que dice el papel y lo que hace el sistema.','Los errores en la información procesada se detectan automáticamente por los propios controles del sistema antes de que lleguen a producir consecuencias para el negocio.'],
fail_intro:'La ausencia de controles en los sistemas produce exposiciones que frecuentemente solo se descubren cuando el daño ya es significativo:',
fail_bullets:['Los controles que existen en el manual de procedimientos no están configurados en los sistemas que ejecutan esos procedimientos. El control depende de que alguien lo ejecute manualmente, lo que significa que puede omitirse sin que nadie lo note de inmediato.','Una sola persona puede completar ciclos de transacción críticos de principio a fin — crear el proveedor, aprobar la factura, ejecutar el pago — sin que ningún control sistémico lo detecte o lo prevenga.','La organización descubre las inconsistencias en los datos procesados mucho después de que ocurrieron, cuando rastrear la causa ya requiere una investigación costosa.'],
pracs:[
{code:'DSS06.01',name:'Alinear las actividades de control embebido en los procesos de negocio con los objetivos empresariales',desc:'Asegurar que los controles configurados en los sistemas de negocio responden a los riesgos reales del proceso que soportan, no a requisitos genéricos desconectados del contexto.'},
{code:'DSS06.02',name:'Controlar el procesamiento de la información',desc:'Implementar los controles técnicos que garantizan que la información procesada por los sistemas es completa, precisa y válida. Los controles se verifican, no se asumen.'},
{code:'DSS06.03',name:'Gestionar roles, responsabilidades, privilegios de acceso y niveles de autorización',desc:'Configurar en los sistemas la separación de funciones para los procesos críticos. Que los roles y los límites de autorización estén en la estructura del sistema.'},
{code:'DSS06.04',name:'Gestionar los errores y las excepciones',desc:'Establecer los procesos para gestionar formalmente las excepciones y los errores que los controles del sistema identifican. Las excepciones que nadie gestiona son vacíos de control.'},
{code:'DSS06.05',name:'Asegurar la trazabilidad e integridad de la información',desc:'Garantizar que existe un registro completo y auditable de qué se procesó, cuándo, quién lo hizo y cuáles fueron los resultados. La trazabilidad es la base de la rendición de cuentas.'}],
acts:['Identificar los procesos de negocio donde los sistemas deben tener controles de integridad','Configurar la separación de roles en sistemas que soportan procesos de alto riesgo','Verificar regularmente que los controles configurados funcionan correctamente y no han sido eludidos','Gestionar formalmente las excepciones que los controles identifican','Auditar periódicamente que los registros de transacciones son completos y auditables'],
casc:{need:'El negocio necesita que la información que procesan sus sistemas sea confiable y que los procesos críticos tengan controles que prevengan fraudes y errores',align:'TI necesita configurar en los sistemas los controles que las políticas del negocio definen, asegurando que operan consistentemente',obj:'DSS06 hace esa configuración sistemática: controles embebidos en los sistemas que protegen la integridad de la información y los procesos críticos del negocio'},
kw:['Controles internos en sistemas','Integridad de la información','Separación de roles y funciones (SoD)','Controles de proceso de negocio','Prevención de fraudes tecnológicos']}
]},
{code:'MEA',es:'Monitorear, Evaluar y Valorar',en:'Monitor, Evaluate & Assess',color:'#B91C1C',emoji:'📊',type:'GESTIÓN',
desc:'El dominio que cierra el ciclo. Verifica que lo que se diseñó, planeó y ejecutó en los otros dominios realmente produce los resultados esperados. Monitorea el desempeño, evalúa los controles internos, verifica el cumplimiento legal y obtiene aseguramiento independiente. Sin MEA, el sistema de gobierno opera sobre supuestos — con MEA, opera sobre evidencia.',
objs:[
{code:'MEA01',name:'Desempeño y Conformidad',
def:'Recopilar, validar y evaluar los objetivos empresariales y de TI. Monitorear que los procesos estén funcionando de acuerdo con los objetivos y compromisos acordados.',
did:'La diferencia entre una función tecnológica que se gestiona y una que simplemente existe está en si alguien mide objetivamente lo que produce. Las percepciones son insuficientes: TI puede creer que entrega bien porque no recibe quejas, mientras el negocio está frustrado pero ha dejado de reportar porque "nunca cambia nada". Este objetivo construye el sistema de medición que reemplaza las percepciones con evidencia, y permite detectar tendencias negativas antes de que se conviertan en problemas visibles.',
ex_intro:'Un sistema de monitoreo efectivo produce gestión basada en evidencia:',
ex_bullets:['La dirección recibe periódicamente un reporte comprensible sobre el desempeño de la tecnología — en lenguaje de negocio, no en métricas técnicas que requieren interpretación especializada.','Las desviaciones negativas en los indicadores se detectan como tendencias antes de convertirse en problemas. La gestión es anticipatoria, no reactiva.','Los compromisos de nivel de servicio con las áreas del negocio se miden y reportan regularmente. Ambas partes tienen acceso a los mismos datos sobre el cumplimiento.'],
fail_intro:'La gestión sin medición sistemática produce sorpresas que siempre llegan tarde:',
fail_bullets:['El deterioro del desempeño tecnológico se descubre cuando el negocio ya lo experimenta como problema, no como tendencia gestionable. El margen de reacción es mínimo.','Los reportes de desempeño de TI que llegan a la dirección están llenos de indicadores técnicos que no permiten evaluar si la tecnología está cumpliendo su función estratégica.','No hay manera de saber si un área está menos satisfecha que otra con los servicios tecnológicos hasta que la insatisfacción escala a un conflicto que requiere intervención directiva.'],
pracs:[
{code:'MEA01.01',name:'Establecer un enfoque de monitoreo',desc:'Definir qué se va a medir, con qué frecuencia, quién lo medirá y cómo se reportarán los resultados. El enfoque de monitoreo debe responder a las necesidades de información de cada grupo de interés.'},
{code:'MEA01.02',name:'Establecer objetivos de desempeño y conformidad',desc:'Definir los indicadores que reflejan qué significa "bien" para la función tecnológica en el contexto de los objetivos del negocio.'},
{code:'MEA01.03',name:'Recopilar y procesar datos de desempeño y conformidad',desc:'Recolectar los datos necesarios para los indicadores definidos de forma sistemática y confiable. Que los datos reflejen la realidad operativa, no solo lo que es fácil de medir.'},
{code:'MEA01.04',name:'Analizar e informar sobre el desempeño',desc:'Procesar los datos recolectados para producir información útil: identificar tendencias, desviaciones y áreas de mejora. Reportar los hallazgos de forma comprensible para cada audiencia.'},
{code:'MEA01.05',name:'Asegurar la implementación de acciones correctivas',desc:'Cuando el monitoreo revela desviaciones, asegurar que se toman acciones correctivas formales y verificar que producen el efecto esperado.'}],
acts:['Establecer los indicadores clave que reflejan el desempeño de TI frente a los objetivos del negocio','Recopilar y consolidar datos de desempeño de forma sistemática y confiable','Analizar tendencias y desviaciones para anticipar problemas antes de que sean visibles','Reportar el desempeño a la dirección en lenguaje de negocio con periodicidad establecida','Asegurar que las desviaciones identificadas generan planes de acción formales y verificados'],
casc:{need:'La dirección necesita evidencia objetiva y regular de que la tecnología está funcionando bien, no solo la ausencia de quejas',align:'TI necesita indicadores que le permitan gestionar su propio desempeño y demostrar su contribución al negocio',obj:'MEA01 construye ese sistema de evidencia: los indicadores, el proceso de recolección y los reportes que convierten la gestión de TI de intuitiva en objetiva'},
kw:['Indicadores de desempeño de TI (KPI)','Indicadores de logro de metas (KGI)','Tablero de gestión (Dashboard)','Cuadro de mando integral (Balanced Scorecard)','Reporte ejecutivo de TI']},

{code:'MEA02',name:'Control Interno',
def:'Mantener el monitoreo continuo del sistema de control interno para asegurar la operación efectiva y eficiente de los controles.',
did:'Los controles internos no son estáticos: se degradan. Las personas encuentran formas de evitarlos, los sistemas cambian con actualizaciones que alteran su funcionamiento, los procesos evolucionan y los controles diseñados para un estado anterior dejan de ser efectivos para el estado actual. Una organización que diseña buenos controles pero no los monitorea descubre sus deficiencias en auditorías externas o en incidentes, no en revisiones internas donde el costo de corregirlas es significativamente menor.',
ex_intro:'Un monitoreo continuo de controles produce seguridad sobre la integridad del sistema:',
ex_bullets:['Las deficiencias en los controles se identifican internamente y se corrigen antes de que las descubra un auditor externo o un incidente. El sistema de control se mejora de forma proactiva.','Los controles más críticos tienen verificaciones automáticas que alertan cuando algo se desvía de lo esperado — no se asume que funcionan porque nadie ha reportado que fallan.','La dirección recibe regularmente una evaluación honesta del estado del sistema de control interno, incluyendo las deficiencias identificadas y su estado de corrección.'],
fail_intro:'El monitoreo deficiente de controles produce brechas que crecen silenciosamente:',
fail_bullets:['Los controles que funcionaban hace dos años pueden no funcionar hoy porque los sistemas cambiaron, los procesos evolucionaron o las personas encontraron formas de evitarlos. Sin monitoreo, esas brechas no se conocen.','Las autoevaluaciones de control producen resultados optimistas porque quienes diseñaron los controles tienden a asumir que funcionan. La mirada externa revela lo que la mirada interna no puede ver sobre sí misma.','Las deficiencias identificadas se documentan pero no se corrigen de forma sistemática porque no hay seguimiento formal a los planes de remediación.'],
pracs:[
{code:'MEA02.01',name:'Monitorear los controles internos',desc:'Supervisar continuamente el funcionamiento de los controles más críticos. Detectar desviaciones antes de que generen exposición significativa.'},
{code:'MEA02.02',name:'Revisar la efectividad del control del negocio',desc:'Evaluar periódicamente si los controles están produciendo el efecto esperado: prevenir errores y fraudes, no solo documentarlos después de que ocurren.'},
{code:'MEA02.03',name:'Realizar autoevaluaciones de control',desc:'Ejecutar revisiones estructuradas del sistema de control interno, incluyendo pruebas que verifiquen el funcionamiento real de los controles, no solo su existencia formal.'},
{code:'MEA02.04',name:'Identificar y reportar deficiencias de control',desc:'Documentar las deficiencias encontradas con claridad: qué control falla, cuál es la exposición, qué plan de corrección existe y cuándo se resolverá.'},
{code:'MEA02.05',name:'Asegurar que los proveedores de aseguramiento son independientes y calificados',desc:'Verificar que quienes evalúan los controles tienen la independencia y las competencias para hacerlo con objetividad. La efectividad del aseguramiento depende de quién lo hace.'},
{code:'MEA02.06',name:'Planear iniciativas de aseguramiento',desc:'Planear las actividades de evaluación de control de forma sistemática, priorizando los controles más críticos y asegurando cobertura adecuada del sistema de control.'},
{code:'MEA02.07',name:'Alcanzar los objetivos de aseguramiento',desc:'Ejecutar el plan de aseguramiento y asegurarse de que sus hallazgos generan mejoras reales en el sistema de control, no solo informes que se archivan.'},
{code:'MEA02.08',name:'Reportar sobre los resultados del aseguramiento',desc:'Comunicar los resultados de las evaluaciones de control a la dirección y al gobierno con claridad sobre las implicaciones y las acciones requeridas.'}],
acts:['Monitorear continuamente el funcionamiento de los controles más críticos de la organización','Realizar autoevaluaciones periódicas que verifiquen el funcionamiento real de los controles','Identificar y documentar deficiencias con planes de corrección formales y fechas comprometidas','Hacer seguimiento al estado de las correcciones hasta su cierre efectivo','Reportar el estado del sistema de control interno a la dirección con honestidad sobre las brechas existentes'],
casc:{need:'La dirección necesita saber que los controles que diseñó para proteger la organización siguen funcionando efectivamente y no se han degradado con el tiempo',align:'TI necesita verificar que sus controles operativos funcionan en la realidad, no solo en la documentación',obj:'MEA02 establece ese ciclo de verificación: monitoreo continuo, autoevaluación periódica y seguimiento a las correcciones hasta su cierre'},
kw:['Control interno','Evaluación de controles','Marco COSO','Deficiencias de control','Monitoreo continuo de controles']},

{code:'MEA03',name:'Cumplimiento Externo',
def:'Evaluar que los procesos de TI y los procesos del negocio apoyados por TI cumplan con las leyes, los reglamentos y los requisitos contractuales aplicables.',
did:'El incumplimiento normativo tecnológico raramente es intencional — es casi siempre el resultado de no haber mapeado con precisión qué obligaciones legales aplican a los sistemas y los datos de la organización. Las consecuencias, sin embargo, son independientes de la intención: las multas, las sanciones regulatorias y el daño reputacional ocurren de la misma manera si la organización decidió no cumplir que si simplemente no sabía que debía cumplir. Este objetivo convierte las obligaciones legales de abstractas a concretas, antes de que un regulador haga ese trabajo por la organización.',
ex_intro:'Una gestión proactiva del cumplimiento produce tranquilidad ante cualquier revisión externa:',
ex_bullets:['La organización tiene un inventario actualizado de todas las regulaciones que aplican a sus sistemas y datos, con el estado de cumplimiento de cada obligación identificada.','Cuando entra en vigencia una nueva regulación, la organización evalúa su impacto sobre los sistemas actuales con suficiente tiempo para adaptar lo que sea necesario antes de la fecha de cumplimiento.','Si un regulador solicitara evidencia de cumplimiento mañana, la organización puede producirla sin una movilización de emergencia.'],
fail_intro:'La gestión reactiva del cumplimiento produce las sorpresas más costosas:',
fail_bullets:['La organización descubre sus obligaciones regulatorias cuando un regulador las señala en una auditoría o cuando un incidente las hace urgentes. El margen para actuar es mínimo y el costo, máximo.','El cumplimiento se trata como un proyecto de respuesta a requisitos específicos en lugar de como una capacidad permanente. Cada nueva regulación produce una nueva crisis.','Diferentes áreas de la organización interpretan las mismas obligaciones regulatorias de formas distintas porque no hay un proceso centralizado de gestión del cumplimiento.'],
pracs:[
{code:'MEA03.01',name:'Identificar los requisitos de cumplimiento externo',desc:'Mapear todas las leyes, regulaciones y contratos que aplican a los sistemas y los datos de la organización. El punto de partida del cumplimiento es saber exactamente qué hay que cumplir.'},
{code:'MEA03.02',name:'Optimizar la respuesta a los requerimientos externos',desc:'Diseñar los controles y procesos que hacen posible el cumplimiento de forma eficiente. El cumplimiento que requiere esfuerzo heroico en cada ciclo no es sostenible.'},
{code:'MEA03.03',name:'Confirmar el cumplimiento externo',desc:'Verificar periódicamente que los controles implementados efectivamente producen cumplimiento en la práctica, no solo en el diseño.'},
{code:'MEA03.04',name:'Obtener garantías del cumplimiento externo',desc:'Obtener evidencia verificable del cumplimiento que pueda presentarse a reguladores, auditores y otras partes interesadas que requieran esa garantía.'}],
acts:['Mantener un inventario actualizado de todas las obligaciones regulatorias aplicables a los sistemas de la organización','Evaluar el impacto de nuevas regulaciones con suficiente anticipación a su fecha de vigencia','Implementar y verificar los controles necesarios para cumplir cada obligación identificada','Producir evidencia de cumplimiento que pueda presentarse ante reguladores y auditores','Monitorear cambios en el entorno regulatorio para anticipar nuevas obligaciones'],
casc:{need:'El negocio necesita operar dentro del marco legal aplicable a sus sistemas y datos para evitar sanciones, multas y daño reputacional',align:'TI necesita entender las obligaciones regulatorias que aplican a los sistemas que opera y gestionar su cumplimiento de forma proactiva',obj:'MEA03 crea esa capacidad: el inventario de obligaciones, los controles de cumplimiento y la evidencia que demuestra su efectividad'},
kw:['Cumplimiento normativo (Compliance)','Obligaciones regulatorias de TI','Riesgo legal tecnológico','Auditoría de cumplimiento','Protección de datos personales']},

{code:'MEA04',name:'Aseguramiento',
def:'Obtener garantías independientes de que los servicios e informes de TI son adecuados para contribuir al logro de los objetivos de la empresa.',
did:'Una organización que solo se evalúa a sí misma tiene puntos ciegos que son difíciles de ver desde adentro — no necesariamente por falta de honestidad, sino porque quien diseñó el sistema tiende a asumir que funciona como lo diseñó. La perspectiva independiente no es una amenaza para una función tecnológica bien gestionada: es su validación objetiva y la forma más confiable de identificar lo que es invisible desde adentro. Los problemas que encuentra un auditor externo con tiempo para corregirlos son una oportunidad de mejora; los mismos problemas encontrados por un regulador o en una crisis son una emergencia.',
ex_intro:'El aseguramiento independiente produce confianza objetiva en el sistema de gobierno:',
ex_bullets:['La dirección y la junta directiva reciben regularmente una evaluación independiente del estado del gobierno y la gestión tecnológica — no solo el reporte que TI produce sobre sí misma.','Las recomendaciones de las revisiones independientes se implementan formalmente, con responsables y plazos. El ciclo entre hallazgo y corrección es visible y verificable.','La organización utiliza los hallazgos de auditorías anteriores para mejorar su sistema de gobierno antes de la siguiente revisión — no solo para responder a los auditores.'],
fail_intro:'La ausencia de aseguramiento independiente crea puntos ciegos que solo el tiempo — o una crisis — revela:',
fail_bullets:['Las autoevaluaciones de la función tecnológica tienden a producir resultados favorables porque quienes participan tienen interés en los resultados. La mirada externa ve lo que la mirada interna no puede.','Las recomendaciones de auditorías anteriores se documentan pero no se implementan sistemáticamente. El siguiente auditor encuentra los mismos problemas que el anterior.','La junta directiva no tiene forma objetiva de saber si el gobierno tecnológico que se les reporta refleja la realidad operativa o una versión optimista de ella.'],
pracs:[
{code:'MEA04.01',name:'Gestionar el programa de aseguramiento',desc:'Planear y coordinar las actividades de aseguramiento independiente para que cubran los aspectos más críticos del gobierno y la gestión tecnológica con la frecuencia apropiada.'},
{code:'MEA04.02',name:'Determinar el alcance del aseguramiento',desc:'Definir qué aspectos del gobierno y la gestión tecnológica serán evaluados, con qué profundidad y con qué criterios de evaluación.'},
{code:'MEA04.03',name:'Planear iniciativas de aseguramiento',desc:'Desarrollar los planes detallados de cada actividad de aseguramiento: qué se evaluará, cómo, quién participará y cuándo se producirán los resultados.'},
{code:'MEA04.04',name:'Gestionar el aseguramiento',desc:'Ejecutar las actividades de aseguramiento de forma rigurosa e independiente. La calidad del aseguramiento depende de la independencia real de quienes lo realizan.'},
{code:'MEA04.05',name:'Reportar los resultados del aseguramiento',desc:'Comunicar los hallazgos del aseguramiento a la dirección y la junta con claridad sobre las implicaciones y las acciones requeridas. El reporte que no produce acción no tiene valor.'}],
acts:['Planear actividades de aseguramiento independiente con cobertura de los aspectos más críticos del gobierno','Asegurar la independencia real de quienes realizan las evaluaciones de aseguramiento','Gestionar formalmente el seguimiento a las recomendaciones hasta su implementación verificada','Reportar los resultados del aseguramiento directamente a la junta directiva o al comité de auditoría','Usar los hallazgos de aseguramiento como insumo para mejorar el sistema de gobierno y gestión'],
casc:{need:'La junta directiva necesita garantías objetivas e independientes de que el gobierno tecnológico está funcionando como se espera',align:'TI necesita la validación externa que confirma que su gestión es efectiva o que identifica lo que debe mejorar antes de que lo descubra una crisis',obj:'MEA04 provee esa validación: el aseguramiento independiente que cierra el ciclo de gobierno con evidencia objetiva de su efectividad'},
kw:['Auditoría de TI','Aseguramiento independiente','Auditoría interna','Recomendaciones de auditoría','Revisión de gobierno de TI']}
]}
];
const KD={
'Marco de gobierno':{d:'El sistema formal de reglas, principios y estructuras que define cómo se toman las decisiones sobre tecnología y quién responde por sus resultados.',ex:'<strong>Ejemplo:</strong> Que exista un comité que aprueba inversiones tecnológicas con criterios explícitos — y no que cada área negocie directamente con TI según su acceso al gerente.'},
'Principios de TI':{d:'Declaraciones cortas y formales que guían cómo la organización usa y gestiona la tecnología. Actúan como filtro para decisiones cotidianas sin consultar a alguien cada vez.',ex:'<strong>Ejemplo:</strong> "La seguridad no se sacrifica por velocidad de entrega" o "Los datos de clientes solo se comparten con terceros bajo contrato firmado".'},
'Rendición de cuentas':{d:'La obligación formal de responder ante la organización por las decisiones y resultados de la tecnología. Hay alguien específico que puede decir "yo decidí esto" y asumir las consecuencias.',ex:'<strong>Ejemplo:</strong> Si un proyecto se retrasa, hay un nombre responsable en la estructura — no una difusión de responsabilidad donde todos señalan a otro.'},
'Alineación estratégica':{d:'Estado en que las prioridades de la tecnología reflejan directamente los objetivos del negocio. TI trabaja para la estrategia corporativa, no para objetivos técnicos propios.',ex:'<strong>Ejemplo:</strong> Si la estrategia es expandirse a nuevos mercados, el plan de TI ya tiene contemplado qué sistemas requiere esa expansión — no se entera el día del anuncio.'},
'Política corporativa de TI':{d:'Documento formal que establece las reglas sobre uso, adquisición y protección de la tecnología. Aplica a toda la organización, no solo al área técnica.',ex:'<strong>Ejemplo:</strong> La política que define qué datos pueden almacenarse en servicios de nube externos, o cómo se usan dispositivos personales para acceder a sistemas corporativos.'},
'Valor de negocio':{d:'El beneficio concreto y medible que una inversión tecnológica genera: económico (reducción de costos, nuevos ingresos), operativo (eficiencia, velocidad) o estratégico (nuevas capacidades).',ex:'<strong>Ejemplo:</strong> Un sistema que reduce el tiempo de procesamiento de facturas de 3 días a 4 horas genera un valor operativo concreto que debe cuantificarse antes de aprobar la inversión.'},
'Portafolio de inversiones':{d:'El conjunto organizado y priorizado de todos los proyectos y servicios tecnológicos activos. Se gestiona como un todo — los recursos son compartidos y las decisiones son interdependientes.',ex:'<strong>Ejemplo:</strong> Tres proyectos simultáneos que compiten por el mismo equipo son parte del mismo portafolio y deben priorizarse explícitamente, no sobrevivir según quién presione más.'},
'ROI — Retorno sobre la Inversión':{d:'Indicador que mide cuánto valor generó una inversión en relación con lo que costó. Permite saber objetivamente si una inversión valió la pena.',ex:'<strong>Ejemplo:</strong> Invertir $100.000 en un sistema que produce $180.000 en eficiencias anuales tiene ROI positivo verificable. Sin medirlo, la organización no sabe si fue buena decisión.'},
'Caso de negocio (Business case)':{d:'Documento formal que justifica una inversión respondiendo: ¿qué beneficios genera?, ¿cuánto cuesta realmente?, ¿qué riesgos implica actuar y no actuar?, ¿cómo se alinea con la estrategia?',ex:'<strong>Ejemplo:</strong> Antes de aprobar el nuevo CRM, el caso de negocio muestra qué indicadores mejorarán, cuál es el costo en cinco años y qué riesgo tiene no hacer el proyecto.'},
'Beneficios realizados':{d:'Los beneficios que efectivamente se materializaron después de una implementación, verificados con datos. Se contrasta con los beneficios prometidos al momento de pedir la aprobación.',ex:'<strong>Ejemplo:</strong> Se prometió 30% de reducción en tiempo de procesamiento. A los seis meses se verifica si ese 30% ocurrió. Ese resultado medido es el beneficio realizado.'},
'Apetito al riesgo':{d:'El nivel de riesgo tecnológico que la organización decide conscientemente asumir en la búsqueda de sus objetivos. Debe ser una decisión explícita de la dirección, no algo que simplemente ocurre.',ex:'<strong>Ejemplo:</strong> Decidir no invertir en un sistema de respaldo en otra ciudad porque cuesta demasiado es una decisión de apetito al riesgo — válida si se toma conscientemente y se documenta.'},
'Tolerancia al riesgo':{d:'El margen de variación aceptable alrededor del apetito al riesgo. Define hasta dónde puede alejarse la realidad del límite establecido antes de que se active una acción correctiva.',ex:'<strong>Ejemplo:</strong> Si el apetito es 99% de disponibilidad, la tolerancia podría ser 98.5%. Bajo ese umbral se activa un proceso formal de corrección — no se espera al mes siguiente.'},
'Perfil de riesgo':{d:'El inventario consolidado de todos los riesgos tecnológicos activos, con probabilidad e impacto estimados. Es la imagen del estado de exposición tecnológica en un momento dado.',ex:'<strong>Ejemplo:</strong> Un perfil de riesgo muestra que el mayor riesgo es la dependencia de un único proveedor de infraestructura, seguido por la obsolescencia de un sistema regulatorio clave.'},
'Riesgo tecnológico':{d:'Cualquier posibilidad de que algo relacionado con la tecnología cause pérdidas, interrupciones o daño. Incluye fallas técnicas, amenazas de seguridad, proyectos fallidos y dependencias no gestionadas.',ex:'<strong>Ejemplo:</strong> El conocimiento de un sistema crítico concentrado en una sola persona es un riesgo tecnológico tan real como un servidor sin respaldo.'},
'Riesgo residual':{d:'El nivel de riesgo que queda después de aplicar todas las medidas de mitigación disponibles. Siempre existe algo que se asume — la clave es que se asuma conscientemente y con aprobación.',ex:'<strong>Ejemplo:</strong> Después de implementar controles de seguridad, aún existe probabilidad de ataque exitoso. Ese riesgo remanente es el residual — alguien debe haberlo aprobado explícitamente.'},
'Gestión de recursos':{d:'El proceso de asignar y optimizar recursos tecnológicos — personas, presupuesto, infraestructura — para maximizar el valor generado con los medios disponibles.',ex:'<strong>Ejemplo:</strong> Decidir que el 60% del equipo se dedica a operación, 30% a proyectos estratégicos y 10% a innovación es una decisión de gestión de recursos con implicaciones estratégicas.'},
'Capacidad tecnológica':{d:'La habilidad real del área tecnológica para entregar servicios con la calidad y escala que el negocio necesita. No es el tamaño del equipo — es lo que efectivamente puede producir.',ex:'<strong>Ejemplo:</strong> Si TI tiene 10 personas pero 8 están en soporte correctivo, su capacidad para proyectos estratégicos es mínima, independientemente del tamaño del área.'},
'Optimización':{d:'Encontrar la mejor combinación de calidad, costo y velocidad en el uso de los recursos tecnológicos, eliminando lo que no genera valor y reforzando lo que sí.',ex:'<strong>Ejemplo:</strong> Identificar que se pagan 380 licencias de un software pero solo se usan 90 activamente es una oportunidad de optimización que libera presupuesto sin reducir capacidad.'},
'Sostenibilidad operativa':{d:'La capacidad de mantener el nivel de servicio tecnológico a largo plazo sin agotar recursos, acumular deuda técnica o deteriorar al equipo.',ex:'<strong>Ejemplo:</strong> Un área que resuelve todo con horas extra permanentes puede funcionar bien a corto plazo, pero no es sostenible. Eventualmente el equipo rota y la calidad cae.'},
'Recursos estratégicos':{d:'Los activos tecnológicos cuya pérdida o degradación afectaría directamente la capacidad estratégica de la organización: personas con conocimiento crítico, sistemas no reemplazables, datos esenciales.',ex:'<strong>Ejemplo:</strong> El experto que lleva 10 años administrando el sistema de producción, que nadie más entiende completamente, es un recurso estratégico que merece un plan de contingencia.'},
'Transparencia':{d:'La práctica de compartir de forma abierta, honesta y oportuna la información sobre el estado de la tecnología con quienes la necesitan para tomar decisiones.',ex:'<strong>Ejemplo:</strong> Informar a la dirección que un proyecto lleva dos semanas de retraso cuando ocurre — no esperar a que sea visible e irreversible.'},
'Partes interesadas (Stakeholders)':{d:'Todas las personas, grupos o entidades que tienen interés en cómo se usa y gestiona la tecnología: directivos, empleados, clientes, reguladores, accionistas.',ex:'<strong>Ejemplo:</strong> Cuando se implementa un nuevo sistema de nómina, las partes interesadas incluyen RRHH (usuaria), finanzas (dueña del proceso), empleados (afectados) y el área legal (obligaciones laborales).'},
'Reporte de desempeño de TI':{d:'Informe periódico que muestra objetivamente cómo funciona la tecnología frente a compromisos y metas. Diseñado para que la dirección lo entienda sin conocimiento técnico.',ex:'<strong>Ejemplo:</strong> Un reporte mensual con: disponibilidad de sistemas (98.5%), tiempo promedio de resolución de incidentes (2.1h), proyectos en tiempo (7 de 9) y cumplimiento de SLAs (94%).'},
'Comunicación ejecutiva':{d:'Comunicación diseñada para la alta dirección: concisa, sin tecnicismos, orientada a decisiones y expresada en lenguaje de negocio.',ex:'<strong>Ejemplo:</strong> No "el servidor tiene latencia de 300ms" sino "el sistema de facturación responde lento — cada transacción tarda el doble y los vendedores pierden tiempo esperando".'},
'Estructura organizativa':{d:'El diseño formal de cómo está organizada el área tecnológica: equipos, jerarquías, responsabilidades y cómo se relaciona con el resto de la organización.',ex:'<strong>Ejemplo:</strong> Saber que existe un equipo de infraestructura, uno de desarrollo y uno de soporte, con responsables identificados para cada servicio — eso es la estructura organizativa.'},
'Políticas de TI':{d:'Reglas formales sobre cómo se usa, adquiere y protege la tecnología en toda la organización. Aplican a todos los empleados que usan tecnología.',ex:'<strong>Ejemplo:</strong> La política que prohíbe usar contraseñas corporativas en servicios personales, o que establece que todo software nuevo debe aprobarse antes de instalarse.'},
'Roles y responsabilidades':{d:'La definición explícita de quién hace qué en la función tecnológica y quién responde por qué resultados. Que cualquiera pueda saber a quién acudir sin depender de relaciones personales.',ex:'<strong>Ejemplo:</strong> Que haya un responsable nombrado de seguridad, otro de infraestructura y otro de proyectos — con descripciones claras de lo que cubre cada rol.'},
'Marco de gestión':{d:'El sistema de procesos, políticas y herramientas que organiza cómo opera el área tecnológica en el día a día, de forma consistente independientemente de quién esté.',ex:'<strong>Ejemplo:</strong> Que los proyectos se gestionen con la misma metodología, los incidentes sigan el mismo proceso y los cambios pasen por el mismo control — eso es el marco de gestión en acción.'},
'Procedimientos operativos':{d:'Instrucciones documentadas paso a paso para ejecutar tareas tecnológicas de forma consistente y repetible por cualquier persona del equipo.',ex:'<strong>Ejemplo:</strong> El procedimiento para restaurar una copia de seguridad debe estar documentado con suficiente detalle para que alguien que nunca lo ha hecho pueda ejecutarlo correctamente.'},
'Plan estratégico de TI':{d:'El documento que define hacia dónde va la tecnología en los próximos años, qué iniciativas se ejecutarán y con qué recursos, alineado con la estrategia del negocio.',ex:'<strong>Ejemplo:</strong> Si la empresa planea doblar ventas en tres años, el plan de TI describe qué sistemas e infraestructura se necesitan para soportar ese crecimiento.'},
'Alineación negocio-TI':{d:'La condición en que las prioridades tecnológicas reflejan directamente las necesidades del negocio. TI trabaja para la agenda del negocio, no para la suya propia.',ex:'<strong>Ejemplo:</strong> Cuando el área comercial lanza un nuevo producto, TI ya tiene preparado el soporte tecnológico porque participó en la planificación — no se enteró en el lanzamiento.'},
'Hoja de ruta tecnológica':{d:'El plan visual y temporal que muestra qué tecnologías y capacidades se construirán en los próximos ciclos, en qué secuencia y con qué dependencias.',ex:'<strong>Ejemplo:</strong> Una hoja de ruta que muestra que en Q1 se migra facturación, en Q2 se integra con el CRM y en Q3 se activan las capacidades de análisis.'},
'Análisis situacional':{d:'La evaluación honesta de la situación actual del área tecnológica: qué funciona bien, qué está rezagado, qué riesgos existen y qué brechas hay con el estado que el negocio necesita.',ex:'<strong>Ejemplo:</strong> Un análisis situacional podría revelar que la infraestructura es sólida pero el talento en ciberseguridad es insuficiente y la gestión de proyectos produce resultados inconsistentes.'},
'Planificación estratégica':{d:'El proceso de definir la dirección de la función tecnológica para los próximos años, coordinado con la planeación corporativa para que ambos apunten en la misma dirección.',ex:'<strong>Ejemplo:</strong> TI participa en el proceso de planeación anual del negocio, aporta perspectivas sobre oportunidades tecnológicas y sale con un plan alineado con la estrategia corporativa aprobada.'},
'Arquitectura tecnológica':{d:'El diseño de conjunto que describe cómo se relacionan los sistemas, aplicaciones, datos e infraestructura para funcionar como un ecosistema coherente.',ex:'<strong>Ejemplo:</strong> Que el sistema de ventas, el de inventario y el de contabilidad compartan la misma base de datos de clientes — en lugar de que cada uno tenga la suya propia incompatible.'},
'Integración de sistemas':{d:'La capacidad de hacer que sistemas distintos se comuniquen e intercambien información automáticamente, sin intervención manual.',ex:'<strong>Ejemplo:</strong> Que cuando se aprueba un pedido en ventas, el inventario se actualice automáticamente y facturación genere el documento — sin que alguien copie datos entre sistemas.'},
'Estándares tecnológicos':{d:'Las normas que definen cómo se selecciona, construye y opera la tecnología para garantizar compatibilidad, seguridad y mantenibilidad en toda la organización.',ex:'<strong>Ejemplo:</strong> Un estándar que establece que todos los sistemas nuevos deben autenticarse con el directorio corporativo existente, evitando que cada sistema gestione sus propios usuarios.'},
'Plano tecnológico':{d:'La representación visual del ecosistema tecnológico: qué sistemas existen, cómo se conectan y cómo evolucionarán hacia el estado objetivo.',ex:'<strong>Ejemplo:</strong> Como el plano de un edificio: muestra qué hay, cómo se conecta y cómo se puede modificar sin colapsar lo que ya existe.'},
'Interoperabilidad de sistemas':{d:'La capacidad de sistemas diferentes — potencialmente de distintos proveedores o épocas — de intercambiar información y trabajar juntos sin intermediarios manuales.',ex:'<strong>Ejemplo:</strong> Que el sistema de RRHH comparta automáticamente la estructura organizacional con el sistema de seguridad, sin exportar e importar archivos manualmente.'},
'Vigilancia tecnológica':{d:'El proceso sistemático de monitorear el horizonte tecnológico para identificar tendencias e innovaciones relevantes para el negocio con suficiente anticipación para actuar.',ex:'<strong>Ejemplo:</strong> Identificar 18 meses antes que la inteligencia artificial generativa transformará el servicio al cliente en el sector — y empezar a pilotar antes que la competencia.'},
'Innovación digital':{d:'El proceso de crear valor nuevo para la organización mediante tecnología, en productos, servicios, procesos o modelos de negocio. No es adoptar tecnología nueva — es usarla para generar valor diferencial.',ex:'<strong>Ejemplo:</strong> Usar datos de comportamiento de clientes para personalizar ofertas en tiempo real no es solo un proyecto tecnológico — es innovación digital que crea ventaja competitiva.'},
'Experimentación controlada':{d:'La práctica de probar nuevas tecnologías a pequeña escala, con hipótesis y criterios de éxito definidos de antemano, antes de comprometer recursos a implementaciones completas.',ex:'<strong>Ejemplo:</strong> Probar el nuevo sistema de atención automatizada con 50 clientes durante 60 días, con métricas claras, antes de decidir si se escala a todos los clientes.'},
'Piloto tecnológico':{d:'Una implementación limitada y controlada de una nueva tecnología para evaluar su funcionamiento en condiciones reales antes de una decisión de escala.',ex:'<strong>Ejemplo:</strong> Implementar el nuevo sistema de gestión de proyectos en una sola área de 15 personas durante tres meses antes de desplegarlo en toda la organización.'},
'Tendencias del sector':{d:'Los patrones de evolución tecnológica que están transformando el sector en que opera la organización, generando oportunidades para quienes las adoptan temprano y amenazas para quienes las ignoran.',ex:'<strong>Ejemplo:</strong> En el sector financiero, los pagos digitales instantáneos pasaron de tendencia a expectativa estándar de los clientes en menos de tres años.'},
'Portafolio de proyectos':{d:'El conjunto de todos los proyectos tecnológicos activos o aprobados, gestionados de forma integrada considerando recursos compartidos, dependencias y prioridades.',ex:'<strong>Ejemplo:</strong> Si hay 12 proyectos activos que requieren el mismo equipo de infraestructura, gestionar el portafolio significa decidir la secuencia — no solo aprobar cada uno por separado.'},
'Priorización estratégica':{d:'El proceso de ordenar iniciativas tecnológicas según criterios explícitos de valor, riesgo y disponibilidad de recursos, para que las más importantes se ejecuten primero con los mejores recursos.',ex:'<strong>Ejemplo:</strong> Decidir que el proyecto de seguridad tiene prioridad sobre el de experiencia del cliente no porque sea más urgente sino porque el riesgo de no hacerlo primero es mayor.'},
'Gestión de inversiones':{d:'El proceso de evaluar, aprobar, monitorear y optimizar las decisiones de gasto en tecnología para maximizar el retorno y mantener el riesgo en niveles aceptables.',ex:'<strong>Ejemplo:</strong> Revisar trimestralmente si los proyectos activos siguen justificando su inversión — y tener la disciplina de cancelar los que ya no la justifican, aunque se haya gastado dinero en ellos.'},
'Criterios de aprobación':{d:'Los estándares explícitos y conocidos que determinan qué inversiones tecnológicas se aprueban, bajo qué condiciones y por quién.',ex:'<strong>Ejemplo:</strong> "Toda inversión que supera $30.000 requiere un caso de negocio formal aprobado por el comité de tecnología" — eso hace el proceso transparente y consistente para todas las áreas.'},
'Optimización del portafolio':{d:'El proceso continuo de ajustar la combinación de proyectos y servicios tecnológicos para maximizar el valor total generado con los recursos disponibles.',ex:'<strong>Ejemplo:</strong> Identificar que tres proyectos requieren las mismas competencias y reorganizarlos en secuencia para que el equipo termine uno antes de empezar el siguiente.'},
'Presupuesto de TI':{d:'La asignación formal de recursos financieros para la operación, mantenimiento e innovación tecnológica. Refleja las prioridades reales de la organización.',ex:'<strong>Ejemplo:</strong> Una organización que declara la transformación digital como prioridad pero destina el 90% del presupuesto de TI a mantener sistemas existentes tiene una contradicción entre discurso y asignación.'},
'Gestión financiera de tecnología':{d:'Los procesos para planear, controlar y optimizar los recursos financieros de TI con la misma transparencia y rigor que cualquier otra área del negocio.',ex:'<strong>Ejemplo:</strong> Poder responder al director financiero: "por cada $100 en TI, $45 van a operación, $40 a proyectos estratégicos y $15 a innovación — y este es el valor que genera cada categoría".'},
'Costo por servicio':{d:'Cuánto le cuesta a la organización cada servicio tecnológico, desagregado de forma comprensible y comparable con alternativas del mercado.',ex:'<strong>Ejemplo:</strong> Saber que el costo de cada puesto de trabajo digital es $180 mensuales por empleado permite comparar con opciones de externalización y decidir con información.'},
'Transparencia financiera':{d:'La capacidad de demostrar con datos claros en qué se gasta el presupuesto tecnológico y qué valor genera cada parte de ese gasto.',ex:'<strong>Ejemplo:</strong> Un área de TI con transparencia financiera puede responder "el 40% del presupuesto mantiene el ERP, que soporta los procesos financieros y de operaciones de toda la empresa".'},
'Costo total de propiedad (TCO)':{d:'La suma de todos los costos reales de una tecnología durante toda su vida útil: compra inicial, implementación, capacitación, operación, mantenimiento, actualizaciones y retiro.',ex:'<strong>Ejemplo:</strong> Un sistema que cuesta $200.000 de licencia puede tener un TCO de $800.000 en cinco años al incluir implementación, soporte y actualizaciones. Decidir solo por el precio inicial produce sorpresas costosas.'},
'Talento tecnológico':{d:'Las personas con las habilidades técnicas, analíticas y de negocio necesarias para diseñar, construir, operar y gobernar la tecnología de la organización.',ex:'<strong>Ejemplo:</strong> Un experto en ciberseguridad, un arquitecto de datos y un gerente de proyectos son tan estratégicos como cualquier otro talento clave del negocio.'},
'Gestión de competencias':{d:'El proceso de identificar qué habilidades necesita el área tecnológica, evaluar cuáles tiene actualmente y desarrollar planes para cerrar las brechas antes de que sean limitantes.',ex:'<strong>Ejemplo:</strong> Identificar que en dos años se necesitarán capacidades de análisis de datos que hoy no existen — y empezar a desarrollarlas con suficiente anticipación.'},
'Retención de talento':{d:'Las estrategias para mantener en la organización a las personas con habilidades tecnológicas críticas cuya salida representaría un impacto operativo o estratégico significativo.',ex:'<strong>Ejemplo:</strong> Identificar a los tres técnicos más críticos del equipo, entender sus motivaciones y desarrollar planes personalizados antes de que llegue una oferta mejor.'},
'Planes de desarrollo':{d:'Los itinerarios personalizados de crecimiento profesional que combinan formación, proyectos y mentorías para preparar a las personas para las necesidades futuras.',ex:'<strong>Ejemplo:</strong> Un plan que en dos años prepare a un analista de soporte para roles de arquitectura, con cursos, proyectos de complejidad creciente y mentoring de un arquitecto senior.'},
'Riesgo de rotación de personal':{d:'La probabilidad de que personas con conocimiento crítico abandonen la organización, y el impacto operativo que esa pérdida causaría.',ex:'<strong>Ejemplo:</strong> Si el único experto en el sistema de producción recibiera una oferta mañana y se fuera, ¿cuánto tiempo tardaría la organización en recuperar esa capacidad? Esa magnitud es el riesgo de rotación.'},
'Socio de negocio tecnológico':{d:'Un rol dentro de TI cuya función principal es entender los objetivos de un área del negocio y ser el puente entre sus necesidades y las capacidades tecnológicas disponibles.',ex:'<strong>Ejemplo:</strong> El socio tecnológico del área comercial asiste a sus reuniones de planificación, entiende sus metas del año y lleva esas necesidades a TI con contexto correcto — no como tickets técnicos.'},
'Relación TI-negocio':{d:'La calidad de la interacción entre el área tecnológica y las demás áreas, medida en confianza, efectividad de la comunicación y percepción de colaboración hacia objetivos comunes.',ex:'<strong>Ejemplo:</strong> Señal de relación sana: las áreas traen sus desafíos a TI antes de tener solución en mente. Señal de deterioro: contratan externamente sin avisar.'},
'Alineación':{d:'El estado en que TI y el negocio trabajan hacia los mismos objetivos con criterios coherentes y comprensión compartida de las prioridades.',ex:'<strong>Ejemplo:</strong> TI y el área comercial están alineados cuando ambos pueden decir, sin consultarse, cuáles son los dos proyectos tecnológicos más importantes del año.'},
'Comunicación estratégica':{d:'La comunicación diseñada para informar y alinear a los actores clave sobre la dirección y resultados de la función tecnológica, con el lenguaje apropiado para cada audiencia.',ex:'<strong>Ejemplo:</strong> Un CIO que habla a la junta de impacto al negocio y riesgos estratégicos, y al equipo técnico de soluciones y procesos. Mismo tema, comunicación diferenciada.'},
'Confianza institucional':{d:'El nivel de credibilidad que tiene la función tecnológica ante la organización, construida progresivamente a través de compromisos cumplidos y comunicación honesta.',ex:'<strong>Ejemplo:</strong> La confianza en TI se acumula cuando los proyectos terminan cuando prometieron, los sistemas están disponibles como comprometieron, y los problemas se comunican antes de ser crisis.'},
'Acuerdo de Nivel de Servicio (ANS/SLA)':{d:'El compromiso formal entre el área tecnológica y un área del negocio que define qué servicio se entregará, con qué disponibilidad, en qué tiempos y qué ocurre cuando no se cumple.',ex:'<strong>Ejemplo:</strong> "El sistema de nómina tendrá disponibilidad del 99.9% en días de pago, y los incidentes críticos serán atendidos en máximo 30 minutos" — eso es un SLA concreto y verificable.'},
'Catálogo de servicios de TI':{d:'La lista documentada y accesible de todos los servicios tecnológicos disponibles para las áreas del negocio, con descripción y forma de solicitarlos.',ex:'<strong>Ejemplo:</strong> Que cualquier empleado nuevo pueda saber, sin preguntarle a nadie, qué servicios puede solicitar, cómo pedirlos y en qué tiempo los recibirá.'},
'Compromiso de servicio':{d:'La obligación formal que el área tecnológica asume con un área del negocio sobre la disponibilidad y calidad de un servicio específico.',ex:'<strong>Ejemplo:</strong> El compromiso de que el sistema de facturación estará disponible 24/7 durante el período de cierre mensual, con prioridad máxima ante cualquier incidente.'},
'Indicadores de servicio':{d:'Las métricas que miden objetivamente si los compromisos de servicio se cumplen: disponibilidad, tiempo promedio de respuesta, tiempo promedio de resolución.',ex:'<strong>Ejemplo:</strong> "La disponibilidad del sistema de facturación fue del 99.3% este mes, frente al compromiso del 99.9%". Eso permite conversaciones informadas basadas en datos.'},
'Gestión de expectativas':{d:'El proceso activo de asegurar que las áreas del negocio tienen expectativas realistas y claras sobre lo que la tecnología puede hacer, cuándo y bajo qué condiciones.',ex:'<strong>Ejemplo:</strong> Cuando ventas pide un sistema en "dos semanas", gestionar las expectativas significa explicar por qué tomaría dos meses, qué implica eso y qué alternativas existen.'},
'Gestión de proveedores tecnológicos':{d:'El proceso de seleccionar, contratar, supervisar y desarrollar las relaciones con proveedores externos para asegurar valor y controlar los riesgos de dependencia.',ex:'<strong>Ejemplo:</strong> Evaluar formalmente cada año si el proveedor de la plataforma de RRHH cumple sus compromisos, qué alternativas existen y si las condiciones del contrato siguen siendo favorables.'},
'Contratos de TI':{d:'Los acuerdos legales que formalizan las condiciones de los servicios de proveedores: qué entregan, con qué calidad, a qué precio, qué pasa si incumplen y cómo se puede salir.',ex:'<strong>Ejemplo:</strong> Un contrato de servicios en la nube sin cláusulas de salida ni penalidades por incumplimiento de SLA deja a la organización sin mecanismos de protección si el proveedor falla.'},
'Riesgo de terceros':{d:'La exposición de la organización a pérdidas o interrupciones causadas por problemas en proveedores tecnológicos externos de los que depende para operaciones críticas.',ex:'<strong>Ejemplo:</strong> Si el 70% de los sistemas críticos dependen de un solo proveedor de nube, una caída de ese proveedor paraliza el 70% de las operaciones. Eso es concentración de riesgo de terceros.'},
'Evaluación de proveedores':{d:'El proceso formal de analizar las capacidades, desempeño pasado, solidez financiera y riesgos de un proveedor antes de contratarlo o renovar su contrato.',ex:'<strong>Ejemplo:</strong> Antes de renovar el contrato de soporte del sistema de producción, evaluar el cumplimiento del período anterior, las alternativas existentes y las condiciones de salida disponibles.'},
'Dependencia tecnológica':{d:'El grado en que la organización no puede operar normalmente sin un proveedor, tecnología o persona específica. A mayor dependencia, mayor vulnerabilidad.',ex:'<strong>Ejemplo:</strong> Una organización que no puede cambiar de proveedor de ERP porque nadie documentó las personalizaciones tiene una dependencia que el proveedor puede explotar en la próxima negociación.'},
'Gestión de calidad':{d:'El sistema de procesos y estándares que asegura que los entregables tecnológicos cumplen consistentemente los niveles de calidad acordados con el negocio.',ex:'<strong>Ejemplo:</strong> Un proceso de revisión que todo sistema debe pasar antes de producción — incluyendo pruebas técnicas y validación de usuarios del negocio — es parte del sistema de gestión de calidad.'},
'Estándares de calidad':{d:'Los criterios formales y medibles que definen qué significa "bien hecho" para cada tipo de entregable tecnológico, acordados con las áreas que los recibirán.',ex:'<strong>Ejemplo:</strong> Un estándar que establece que todo sistema nuevo debe procesar correctamente el 100% de los escenarios definidos por el área usuaria antes de su lanzamiento.'},
'Criterios de aceptación':{d:'Las condiciones específicas que un sistema debe cumplir para ser aprobado por el negocio como listo para operar en producción.',ex:'<strong>Ejemplo:</strong> "El sistema de nómina debe calcular correctamente 100 escenarios definidos por RRHH, incluyendo horas extra, descuentos y retenciones" — esos son criterios de aceptación concretos.'},
'Mejora continua':{d:'La práctica sistemática de buscar constantemente formas de hacer mejor lo que ya se hace, usando datos de desempeño, retroalimentación y análisis de causas.',ex:'<strong>Ejemplo:</strong> Reducir el tiempo promedio de resolución de incidentes de 4 horas a 2.5 horas en dos trimestres, basándose en el análisis de los incidentes pasados.'},
'Indicadores de calidad':{d:'Las métricas que miden objetivamente el nivel de calidad alcanzado en procesos, sistemas o servicios tecnológicos.',ex:'<strong>Ejemplo:</strong> Tasa de defectos en sistemas recién lanzados (problemas en las primeras 4 semanas), satisfacción del usuario, y porcentaje de proyectos que pasan aceptación en el primer intento.'},
'Gestión de riesgos tecnológicos':{d:'El proceso sistemático de identificar, evaluar, priorizar y responder a los riesgos tecnológicos, manteniendo la exposición dentro de los límites aprobados.',ex:'<strong>Ejemplo:</strong> Identificar que un sistema regulatorio crítico tiene versión obsoleta, evaluar el riesgo de sanción, y aprobar un plan de actualización con presupuesto y plazo definidos.'},
'Evaluación de impacto':{d:'El análisis de las consecuencias reales que tendría la materialización de un riesgo tecnológico sobre los procesos, las finanzas y la reputación del negocio.',ex:'<strong>Ejemplo:</strong> Evaluar que si el sistema de pagos cae 24 horas, el impacto incluye $150.000 en transacciones no procesadas, penalidades contractuales y daño reputacional con clientes.'},
'Mitigación de riesgos':{d:'Las acciones concretas que reducen la probabilidad de que un riesgo ocurra o disminuyen el daño que causaría si llegara a ocurrir.',ex:'<strong>Ejemplo:</strong> Implementar copias de seguridad automáticas en una segunda ubicación reduce tanto la probabilidad de pérdida de datos como el impacto si ocurre un fallo en el sitio principal.'},
'Registro de riesgos':{d:'El inventario documentado y actualizado de todos los riesgos tecnológicos identificados, con probabilidad, impacto, responsable y plan de acción.',ex:'<strong>Ejemplo:</strong> Un registro de riesgos muestra que el riesgo de obsolescencia del sistema de facturación tiene probabilidad alta, impacto crítico, responsable asignado y fecha de revisión comprometida.'},
'Seguridad de la información':{d:'El conjunto de prácticas y controles que protegen la información de la organización de accesos no autorizados, modificaciones indebidas o pérdida.',ex:'<strong>Ejemplo:</strong> Las contraseñas fuertes, los accesos por rol, el cifrado de datos sensibles y la capacitación del personal son todos parte de la seguridad de la información — no solo las herramientas técnicas.'},
'Sistema de gestión de seguridad (SGSI)':{d:'El marco formal de políticas, procesos y controles que protege toda la información de la organización de forma sistemática y continua.',ex:'<strong>Ejemplo:</strong> Un SGSI no es solo instalar un antivirus — es el conjunto de políticas, procedimientos, controles técnicos y capacitación que trabajan juntos para proteger la información.'},
'Ciberseguridad':{d:'La protección de los sistemas, redes y datos de la organización frente a ataques digitales, accesos no autorizados y daño intencional.',ex:'<strong>Ejemplo:</strong> Un ataque de ransomware que cifra los archivos de la empresa y pide un rescate es un incidente de ciberseguridad con consecuencias operativas, financieras y reputacionales simultáneas.'},
'Políticas de seguridad':{d:'Las reglas que establecen cómo deben comportarse todos los empleados en relación con la seguridad de la información: contraseñas, uso de dispositivos, manejo de datos sensibles.',ex:'<strong>Ejemplo:</strong> La política que prohíbe abrir archivos adjuntos de remitentes desconocidos protege a toda la organización — no depende de que el área técnica detecte el ataque.'},
'Protección de datos':{d:'Las medidas técnicas, organizacionales y legales para garantizar que los datos personales y confidenciales están seguros y se usan apropiadamente.',ex:'<strong>Ejemplo:</strong> Que los datos de salud de los empleados solo sean accesibles para RRHH y medicina laboral, con registro de quién accede y cuándo, es protección de datos en práctica.'},
'Gobierno del dato':{d:'El marco de políticas y responsabilidades que asegura que los datos de la organización son precisos, seguros, privados y usados apropiadamente por quienes los necesitan.',ex:'<strong>Ejemplo:</strong> Designar a finanzas como responsable oficial de los datos financieros — incluyendo su calidad, acceso y ciclo de vida — es gobierno del dato en acción.'},
'Calidad de la información':{d:'El grado en que los datos son precisos, completos, actualizados y confiables para los fines para los que se usan.',ex:'<strong>Ejemplo:</strong> Si el sistema de ventas y el de contabilidad muestran cifras diferentes para el mismo período, hay un problema de calidad de la información que afecta la capacidad de decidir con confianza.'},
'Privacidad de datos':{d:'El derecho y la obligación de usar los datos personales de empleados, clientes y terceros únicamente para los fines para los que fueron recopilados, con consentimiento y conforme a la ley.',ex:'<strong>Ejemplo:</strong> Usar los datos de localización de los empleados recopilados para control de asistencia con fines de monitoreo de productividad es una violación de privacidad, aunque los datos sean de la empresa.'},
'Fuente única de verdad':{d:'El sistema o proceso que establece cuál es el dato oficial de la organización para cada información crítica, eliminando la coexistencia de versiones contradictorias.',ex:'<strong>Ejemplo:</strong> Definir que el sistema de CRM es la fuente oficial de los datos de clientes, y que cualquier otra aplicación debe leerlos desde ahí — en lugar de mantener su propia copia local.'},
'Ciclo de vida del dato':{d:'Las etapas por las que pasa un dato desde que se crea hasta que se elimina: creación, almacenamiento, uso, compartición y disposición final segura.',ex:'<strong>Ejemplo:</strong> Los contratos firmados con clientes tienen un ciclo de vida: se crean, se almacenan, se consultan, eventualmente vencen y finalmente se eliminan de forma segura — cada etapa con reglas definidas.'},
'Gestión de programas':{d:'La coordinación de múltiples proyectos interrelacionados que juntos persiguen un objetivo estratégico que ningún proyecto individual alcanzaría.',ex:'<strong>Ejemplo:</strong> La transformación del proceso de compras requiere un proyecto de sistema, uno de capacitación, uno de integración y uno de gestión del cambio — todos coordinados como un programa.'},
'Gobernanza del programa':{d:'La estructura formal de supervisión que asegura que un programa se ejecuta según la estrategia y genera los beneficios comprometidos.',ex:'<strong>Ejemplo:</strong> Un comité de programa que se reúne mensualmente para revisar el avance, resolver interdependencias y tomar decisiones que ningún gerente de proyecto individual tiene autoridad para tomar.'},
'Interdependencias de proyectos':{d:'Las relaciones entre proyectos donde el resultado de uno afecta la ejecución o el éxito de otros dentro del mismo programa.',ex:'<strong>Ejemplo:</strong> Si el proyecto de base de datos se retrasa, el proyecto de integración y el de reportes no pueden completarse. Gestionar esa dependencia es parte del trabajo del programa.'},
'Oficina de proyectos (PMO)':{d:'La unidad organizacional que establece los estándares, métodos y herramientas para la gestión de proyectos en toda la organización, garantizando consistencia.',ex:'<strong>Ejemplo:</strong> Gracias a la PMO, todos los proyectos usan el mismo formato de reporte, los mismos criterios de semáforo y el mismo proceso de escalamiento — sin importar quién sea el gerente de proyecto.'},
'Beneficios del programa':{d:'Los resultados concretos y medibles que el programa debe entregar al negocio, más allá de los entregables técnicos de cada proyecto individual.',ex:'<strong>Ejemplo:</strong> Un programa de modernización puede entregar cinco sistemas exitosos y aun así fracasar si el beneficio prometido — reducir 40% los tiempos de cierre financiero — no se materializa.'},
'Análisis de requisitos del negocio':{d:'El proceso de entender, documentar y validar qué necesita realmente cada área del negocio de la solución tecnológica, antes de diseñar o comprar nada.',ex:'<strong>Ejemplo:</strong> En lugar de que TI interprete que necesitan "un sistema de reportes", trabajar con el área para definir exactamente qué reportes, con qué datos, para qué decisiones y en qué formato.'},
'Necesidades del usuario':{d:'Lo que los usuarios finales necesitan que haga el sistema para cumplir su trabajo, expresado en su propio lenguaje y no en términos técnicos.',ex:'<strong>Ejemplo:</strong> "Necesito ver en una sola pantalla el estado de todos mis pedidos pendientes con su fecha estimada de entrega" — eso es una necesidad de usuario, no un requisito técnico.'},
'Evaluación de alternativas':{d:'El proceso formal de analizar si es mejor desarrollar internamente, comprar un sistema o usar un servicio externo, considerando costo, tiempo, flexibilidad y riesgo.',ex:'<strong>Ejemplo:</strong> Antes de decidir desarrollar un sistema de gestión documental, evaluar tres productos del mercado con criterios explícitos para saber si la opción de "construir" realmente justifica el costo y el tiempo.'},
'Aprobación formal de requisitos':{d:'El proceso por el cual los líderes del negocio validan y firman que los requisitos de un proyecto reflejan correctamente sus necesidades reales.',ex:'<strong>Ejemplo:</strong> La directora de logística firma el documento de requisitos del nuevo sistema de despachos — ese acto convierte la interpretación de TI en un acuerdo formal que ambas partes comparten.'},
'Gestión del alcance':{d:'El control continuo de qué está incluido y qué no en un proyecto, previniendo que crezca sin aprobación formal más allá de lo acordado originalmente.',ex:'<strong>Ejemplo:</strong> Cuando el área de ventas pide "agregar una función pequeña" al sistema en desarrollo, gestionar el alcance significa evaluar su impacto antes de incluirla — no agregarla informalmente.'},
'Diseño de soluciones':{d:'El proceso de definir cómo se construirá o configurará la solución tecnológica para cumplir los requisitos, antes de empezar a desarrollarla.',ex:'<strong>Ejemplo:</strong> Antes de escribir la primera línea de código, el equipo define la arquitectura del sistema, cómo se integra con los existentes y qué tecnologías se usarán — eso es el diseño de la solución.'},
'Pruebas con usuarios':{d:'El proceso en que los usuarios reales del negocio verifican que el sistema funciona como necesitan, en condiciones de uso cotidiano, antes de que toda la organización dependa de él.',ex:'<strong>Ejemplo:</strong> El equipo de contabilidad prueba el nuevo módulo de cierres con datos reales de un mes anterior — no para demostrar que funciona técnicamente sino para confirmar que resuelve su proceso real.'},
'Calidad de entrega':{d:'El nivel de cumplimiento de los estándares de calidad en lo que TI entrega al negocio: funcionalidad correcta, sin errores conocidos, con documentación apropiada.',ex:'<strong>Ejemplo:</strong> Un sistema que llega a producción con 30 errores conocidos y sin documentación de usuario no es una entrega de calidad, aunque técnicamente "funcione".'},
'Documentación de sistemas':{d:'El registro actualizado de cómo funcionan los sistemas tecnológicos: configuraciones, procesos, decisiones de diseño y manuales de usuario comprensibles.',ex:'<strong>Ejemplo:</strong> Un manual que cualquier persona del área de contabilidad puede consultar para resolver sus dudas sobre el sistema de cierres — sin necesitar llamar a TI para cada pregunta.'},
'Validación del negocio':{d:'El proceso formal por el que las áreas del negocio confirman que un sistema cumple sus necesidades y está listo para operar en el ambiente real.',ex:'<strong>Ejemplo:</strong> El director de logística dice formalmente "sí, este sistema resuelve lo que necesitamos y estamos listos para usarlo" — ese momento es la validación del negocio.'},
'Disponibilidad de sistemas':{d:'La proporción del tiempo en que un sistema está operativo y accesible cuando los usuarios lo necesitan, usualmente expresada como porcentaje anual.',ex:'<strong>Ejemplo:</strong> Una disponibilidad del 99.5% significa que el sistema puede estar fuera de servicio máximo 43.8 horas al año. Para un sistema de facturación, eso puede ser inaceptable en ciertas épocas.'},
'Gestión de la capacidad':{d:'El proceso de asegurar que la infraestructura tecnológica tiene los recursos suficientes para soportar la demanda actual y la que generará el crecimiento del negocio.',ex:'<strong>Ejemplo:</strong> Anticipar que la campaña de Black Friday multiplicará por cinco el tráfico al sitio web y ampliar la capacidad con dos semanas de anticipación — no después de que el sitio colapse.'},
'Desempeño tecnológico':{d:'El nivel de respuesta, velocidad y eficiencia con que los sistemas operan, comparado con los estándares acordados con el negocio.',ex:'<strong>Ejemplo:</strong> Un sistema que en tiempos normales responde en 2 segundos pero en el cierre de mes tarda 45 segundos tiene un problema de desempeño que afecta la productividad del negocio de forma real.'},
'Planificación de capacidad':{d:'El proceso de proyectar cuánta infraestructura tecnológica necesitará la organización en el futuro, basándose en los planes de crecimiento y cambio del negocio.',ex:'<strong>Ejemplo:</strong> Si la empresa planea abrir tres nuevas sedes el próximo año, la planificación de capacidad determina qué infraestructura adicional se necesita y cuándo debe estar lista.'},
'Escalabilidad':{d:'La capacidad de un sistema para crecer y manejar mayor volumen de trabajo cuando el negocio lo necesita, sin degradarse ni colapsar.',ex:'<strong>Ejemplo:</strong> Un sistema de e-commerce escalable puede manejar 100 usuarios en un día normal y 50.000 durante una campaña de descuentos, sin cambiar la experiencia del usuario.'},
'Gestión del cambio organizacional':{d:'El proceso estructurado para guiar a las personas a través de la transición de una forma de trabajar a otra, minimizando la resistencia y maximizando la adopción real.',ex:'<strong>Ejemplo:</strong> Involucrar a los líderes informales del área contable como "campeones" del nuevo sistema dos meses antes del lanzamiento — para que la adopción se construya desde adentro.'},
'Adopción tecnológica':{d:'El grado en que los usuarios realmente incorporan una nueva tecnología a su trabajo cotidiano y la usan para los fines para los que fue diseñada.',ex:'<strong>Ejemplo:</strong> Un sistema de gestión de proyectos tiene una adopción real del 40% si solo 4 de cada 10 usuarios lo usan regularmente — aunque el 100% recibió capacitación.'},
'Comunicación del cambio':{d:'El plan y proceso para informar a todos los afectados por un cambio tecnológico sobre qué cambia, por qué, cuándo y cómo les afecta específicamente.',ex:'<strong>Ejemplo:</strong> Una comunicación efectiva del cambio no es un correo del lunes anunciando que el martes hay un nuevo sistema — es un proceso de meses que prepara a las personas para el cambio.'},
'Capacitación de usuarios':{d:'El proceso de enseñar a los usuarios del negocio cómo usar un nuevo sistema de forma efectiva, adaptado a sus necesidades y nivel de conocimiento.',ex:'<strong>Ejemplo:</strong> Capacitar al área de contabilidad en el nuevo sistema de cierres no es una clase técnica sobre la arquitectura — es práctica guiada de los flujos que el área ejecuta todos los días.'},
'Resistencia al cambio':{d:'La reacción natural de las personas ante cambios que perciben como amenazas a su forma de trabajar, su estatus o su seguridad. Es predecible y gestionable, no un obstáculo irracional.',ex:'<strong>Ejemplo:</strong> Un analista que sigue usando Excel después del lanzamiento del nuevo sistema no está siendo obstinado — probablemente no tuvo suficiente capacitación o no entiende por qué el nuevo sistema es mejor para él.'},
'Control de cambios en sistemas':{d:'El proceso formal que asegura que ningún cambio en sistemas de producción se realiza sin evaluación, aprobación y documentación previas.',ex:'<strong>Ejemplo:</strong> Que el técnico que va a modificar la configuración del servidor de producción abra una solicitud formal, la apruebe su jefe, y registre qué cambió — antes de hacerlo, no después.'},
'Solicitud de cambio':{d:'La petición formal y documentada para modificar un sistema en producción, que inicia el proceso de evaluación y aprobación del cambio.',ex:'<strong>Ejemplo:</strong> "Necesito actualizar el módulo de impuestos por el cambio regulatorio del 1 de enero" — eso se formaliza como solicitud de cambio con impacto evaluado y aprobación documentada.'},
'Comité de cambios':{d:'El grupo multidisciplinar que revisa, evalúa y aprueba o rechaza los cambios propuestos en los sistemas, asegurando evaluación de impacto y representación del negocio.',ex:'<strong>Ejemplo:</strong> Un comité de cambios efectivo incluye no solo a técnicos sino también a representantes del negocio que pueden evaluar el impacto operativo de cada cambio propuesto.'},
'Plan de reversión (rollback)':{d:'El procedimiento documentado para deshacer un cambio y volver al estado anterior si el cambio genera problemas en producción.',ex:'<strong>Ejemplo:</strong> Antes de aplicar la actualización del sistema de facturación, el equipo prepara el procedimiento exacto para revertirlo si algo sale mal — incluyendo cuánto tiempo tomará y quién lo ejecuta.'},
'Trazabilidad de cambios':{d:'La capacidad de saber exactamente qué se cambió en un sistema, cuándo, quién lo hizo y por qué, mediante registros completos y auditables.',ex:'<strong>Ejemplo:</strong> Cuando el sistema de inventario falla el lunes, la trazabilidad permite ver que el viernes se hizo un cambio de configuración — y ese es el punto de partida del diagnóstico.'},
'Pruebas de aceptación del usuario (UAT)':{d:'El proceso formal en que los usuarios reales del negocio verifican que un nuevo sistema cumple sus necesidades antes de que toda la organización dependa de él.',ex:'<strong>Ejemplo:</strong> Tres semanas antes del lanzamiento del nuevo sistema de nómina, el equipo de RRHH procesa con él las planillas del mes anterior — para verificar que los resultados coinciden con lo esperado.'},
'Puesta en producción (Go-live)':{d:'El momento en que un nuevo sistema comienza a operar en el ambiente real de la organización, reemplazando el proceso o sistema anterior.',ex:'<strong>Ejemplo:</strong> El día del go-live del nuevo sistema de compras, todos los pedidos se procesan por el nuevo sistema. Es el punto de no retorno — por eso requiere tanta preparación previa.'},
'Transición controlada':{d:'El proceso de pasar de un sistema a otro de manera planificada, con capacitación completada, soporte disponible y mecanismos de contingencia preparados.',ex:'<strong>Ejemplo:</strong> Durante las primeras tres semanas del nuevo sistema, hay un equipo de soporte reforzado disponible en cada área, con tiempos de respuesta más cortos que los estándar.'},
'Revisión post-implementación':{d:'La evaluación formal realizada semanas después del go-live para verificar si el sistema está siendo usado como se diseñó y si está generando los beneficios prometidos.',ex:'<strong>Ejemplo:</strong> Seis semanas después del lanzamiento del nuevo sistema de despachos, se revisa si el tiempo de procesamiento bajó como se prometía y si los usuarios lo están usando correctamente.'},
'Gestión del conocimiento':{d:'El proceso de identificar, capturar, organizar y compartir el conocimiento crítico para que esté disponible para quienes lo necesitan, independientemente de quién lo generó.',ex:'<strong>Ejemplo:</strong> La wiki interna donde cada procedimiento crítico está documentado, actualizado y organizado por área — de modo que cualquiera puede encontrar lo que necesita sin preguntarle a alguien.'},
'Documentación de sistemas':{d:'El registro actualizado de cómo funcionan los sistemas: configuraciones, lógica de negocio, decisiones de diseño y manuales comprensibles para los usuarios.',ex:'<strong>Ejemplo:</strong> Un documento que explica por qué el sistema de comisiones tiene una excepción para las ventas de exportación — incluyendo quién tomó esa decisión y por qué.'},
'Transferencia de conocimiento':{d:'El proceso formal de pasar el conocimiento crítico de una persona a otras antes de que esa persona deje su cargo o cambie de rol.',ex:'<strong>Ejemplo:</strong> Las últimas cuatro semanas del experto en el sistema de producción se dedican a trabajar en paralelo con su sucesor, documentando todo lo que sabe y verificando que la transferencia fue completa.'},
'Repositorio institucional':{d:'El sistema centralizado donde se almacena y organiza el conocimiento crítico de la organización, accesible para quienes lo necesitan.',ex:'<strong>Ejemplo:</strong> Una intranet con secciones por área donde viven los procedimientos, las políticas y las guías de uso de los sistemas — actualizada y mantenida como parte del trabajo regular.'},
'Continuidad del conocimiento':{d:'La capacidad de la organización de mantener sus operaciones tecnológicas aunque las personas con conocimiento crítico no estén disponibles.',ex:'<strong>Ejemplo:</strong> Que el sistema de producción pueda ser operado y modificado por cualquier miembro del equipo técnico — no solo por el experto que lo diseñó originalmente.'},
'Inventario de activos tecnológicos':{d:'El registro completo y actualizado de todos los recursos tecnológicos de la organización: hardware, software, licencias y servicios, con su estado y responsable.',ex:'<strong>Ejemplo:</strong> Un inventario que muestra que la organización tiene 280 equipos de cómputo, 15 servidores, 12 aplicaciones activas y 340 licencias de software — con fecha de vencimiento y responsable de cada uno.'},
'Gestión de licencias':{d:'El control y optimización de los derechos de uso de software para cumplir los contratos con fabricantes y no pagar por lo que no se usa.',ex:'<strong>Ejemplo:</strong> Descubrir que se pagan 380 licencias de una herramienta de diseño pero solo se usan activamente 90 — y ajustar el contrato para eliminar las 290 innecesarias.'},
'Ciclo de vida del activo':{d:'Las etapas de un activo tecnológico desde que se adquiere hasta que se retira: compra, implementación, operación, mantenimiento y disposición final segura.',ex:'<strong>Ejemplo:</strong> Un servidor tiene un ciclo de vida típico de 5-7 años. Planear su reemplazo dos años antes de que llegue al final evita operar con equipos obsoletos y sin soporte del fabricante.'},
'Optimización de costos tecnológicos':{d:'El proceso de identificar y eliminar gastos tecnológicos innecesarios sin afectar la capacidad de servicio al negocio.',ex:'<strong>Ejemplo:</strong> Migrar a servicios en la nube solo los sistemas que realmente se benefician de esa arquitectura — en lugar de migrar todo por seguir una tendencia — es optimización basada en valor.'},
'Retiro seguro de activos':{d:'El proceso controlado de retirar sistemas o equipos garantizando que los datos sensibles se eliminan de forma irreversible antes de la disposición final.',ex:'<strong>Ejemplo:</strong> Un disco duro de un servidor retirado que no fue borrado de forma segura puede revelar años de información confidencial si alguien lo recupera de la basura o lo compra en un mercado de segunda mano.'},
'Mapa de componentes tecnológicos':{d:'La representación actualizada de todos los componentes tecnológicos y las relaciones entre ellos: qué depende de qué y cómo se conectan.',ex:'<strong>Ejemplo:</strong> Saber que el sistema de facturación depende del servidor de base de datos A, que a su vez depende del switch de red B, permite diagnosticar en minutos qué falló cuando la facturación deja de responder.'},
'Dependencias de sistemas':{d:'Las relaciones entre sistemas donde el funcionamiento de uno depende del correcto funcionamiento de otro.',ex:'<strong>Ejemplo:</strong> Si el sistema de logística depende del sistema de inventario para conocer el stock disponible, una falla en inventario detiene también la operación de logística — aunque el sistema de logística esté técnicamente bien.'},
'Inventario de infraestructura':{d:'El registro de todos los componentes de infraestructura tecnológica: servidores, redes, almacenamiento y servicios en la nube, con su estado y configuración actual.',ex:'<strong>Ejemplo:</strong> Durante el diagnóstico de un incidente, el inventario de infraestructura permite identificar en segundos qué componentes están involucrados — sin necesitar llamar al especialista que "sabe de memoria" cómo está todo.'},
'Gestión de configuración':{d:'El proceso de documentar y controlar la configuración exacta de los componentes tecnológicos para que los cambios sean trazables y los problemas sean diagnosticables.',ex:'<strong>Ejemplo:</strong> Registrar que el lunes se cambió el parámetro X del servidor de aplicaciones de 100 a 200 permite, cuando algo falla el martes, empezar el diagnóstico desde ese cambio documentado.'},
'Trazabilidad tecnológica':{d:'La capacidad de seguir el rastro de cualquier cambio, incidente o decisión tecnológica a través de registros completos y auditables.',ex:'<strong>Ejemplo:</strong> Cuando ocurre un fraude en el sistema de pagos, la trazabilidad permite reconstruir exactamente qué transacciones se realizaron, desde qué cuenta, a qué hora y con qué credenciales.'},
'Gestión de proyectos':{d:'La disciplina de aplicar métodos y herramientas para planear, ejecutar y controlar proyectos, asegurando que entreguen sus resultados dentro del alcance, tiempo y costo acordados.',ex:'<strong>Ejemplo:</strong> Un proyecto bien gestionado termina cuando prometió, cuesta lo que presupuestó y entrega lo que acordó — no porque no tuvo problemas, sino porque los problemas se detectaron y resolvieron a tiempo.'},
'Alcance del proyecto':{d:'La definición explícita y acordada de qué está incluido y qué no en un proyecto, funcionando como el contrato entre quien solicita y quien entrega.',ex:'<strong>Ejemplo:</strong> El contrato de alcance dice que el nuevo sistema incluye módulos de facturación y cobro, pero no integración con el sistema bancario. Cuando ventas pide la integración, eso es un cambio de alcance, no un olvido.'},
'Control de presupuesto de proyectos':{d:'El proceso de monitorear y gestionar activamente el gasto de un proyecto frente al presupuesto aprobado, actuando cuando las desviaciones superan los límites aceptables.',ex:'<strong>Ejemplo:</strong> Detectar en el tercer mes que el proyecto ha gastado el 60% del presupuesto pero solo avanzó el 35% del trabajo — eso es control de presupuesto que permite actuar antes de que sea tarde.'},
'Gestión de riesgos del proyecto':{d:'El proceso de identificar, analizar y responder a los riesgos específicos que amenazan el éxito de un proyecto, desde el inicio.',ex:'<strong>Ejemplo:</strong> Identificar al inicio del proyecto que la disponibilidad del equipo técnico es el riesgo más crítico y definir desde el principio un plan de contingencia si ese recurso no está disponible.'},
