<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COBIT 2019 — Referencia Didáctica</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600;9..144,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
:root{
  --bg:#F4F6FA;--surface:#FFFFFF;--surface2:#F0F3F9;--border:#E0E6F0;
  --text:#18243A;--muted:#56688A;--muted2:#8EA2C0;
  --sh:0 1px 3px rgba(0,0,0,.05),0 4px 14px rgba(0,0,0,.04);
  --sh2:0 4px 24px rgba(0,0,0,.1);
  --r:12px;--r2:8px;--r3:6px;
  --fd:'Fraunces',serif;--fs:'DM Sans',sans-serif;
}
body{font-family:var(--fs);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}

/* ── HEADER ── */
.app-hd{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px 10px;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.app-hd-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.app-hd h1{font-family:var(--fd);font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.2px;flex:1}
.app-hd-sub{font-size:10.5px;color:var(--muted2)}

/* ── BUSCADOR ── */
.search-wrap{position:relative;margin-bottom:8px}
.search-input{width:100%;padding:8px 12px 8px 34px;border:1.5px solid var(--border);border-radius:100px;font-family:var(--fs);font-size:12.5px;color:var(--text);background:var(--surface2);outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--muted);background:var(--surface)}
.search-input::placeholder{color:var(--muted2)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted2);pointer-events:none}
.search-results{display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh2);z-index:300;max-height:320px;overflow-y:auto}
.search-results.open{display:block}
.sr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--surface2)}
.sr-code{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);margin-bottom:2px}
.sr-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.sr-snippet{font-size:11.5px;color:var(--muted);line-height:1.4}
.sr-empty{padding:14px;text-align:center;font-size:13px;color:var(--muted2)}

/* ── PILLS ── */
.domain-pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.domain-pills::-webkit-scrollbar{display:none}
.dpill{flex-shrink:0;padding:4px 11px;border-radius:100px;font-size:10.5px;font-weight:700;border:1.5px solid;cursor:pointer;transition:all .18s;font-family:var(--fs);background:transparent}
.dpill.active{color:#fff!important;border-color:transparent!important}

/* ── LAYOUT ── */
.main{max-width:820px;margin:0 auto;padding:16px 14px}
.dom-section{display:none;animation:fi .22s ease}
.dom-section.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ── DOMAIN HERO ── */
.dom-hero{border-radius:14px;padding:20px 18px;margin-bottom:16px;position:relative;overflow:hidden;color:#fff}
.dom-hero::after{content:attr(data-code);position:absolute;right:-6px;bottom:-18px;font-family:var(--fd);font-size:110px;font-weight:700;opacity:.09;line-height:1;pointer-events:none;letter-spacing:-4px}
.dh-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:100px;margin-bottom:10px}
.dh-title{font-family:var(--fd);font-size:clamp(17px,3.5vw,22px);font-weight:700;line-height:1.2;margin-bottom:5px}
.dh-en{font-size:12px;opacity:.75;font-style:italic;margin-bottom:8px}
.dh-desc{font-size:13px;opacity:.88;line-height:1.65;max-width:580px}

/* ── OBJECTIVE CARD ── */
.obj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--sh);overflow:hidden}
.obj-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
.obj-head:hover,.obj-head.open{background:var(--surface2)}
.obj-code{font-family:var(--fd);font-size:11px;font-weight:700;min-width:48px;letter-spacing:.3px;color:var(--dc,#1D4ED8)}
.obj-title{flex:1;font-size:13.5px;font-weight:500;color:var(--text);line-height:1.3}
.obj-chev{font-size:9px;color:var(--muted2);transition:transform .22s;flex-shrink:0}
.obj-head.open .obj-chev{transform:rotate(180deg)}
.obj-body{display:none;border-top:1px solid var(--border)}
.obj-body.open{display:block}
.obj-inner{padding:16px 16px 18px}

/* ── DEFINICIÓN OFICIAL ── */
.def-oficial{font-size:13.5px;font-weight:600;color:var(--text);line-height:1.7;margin-bottom:6px;font-family:var(--fd)}

/* ── DECODER (decodificación de términos en la definición) ── */
.decoder{background:var(--surface2);border-radius:var(--r3);padding:8px 11px;margin-bottom:12px;font-size:12px;color:var(--muted);line-height:1.6;border-left:2px solid var(--muted2)}
.decoder strong{color:var(--text);font-weight:600}

/* ── BLOQUE DIDÁCTICO ── */
.did-block{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--dc,#1D4ED8);border-radius:var(--r2);padding:12px 14px;margin-bottom:12px}
.did-label{font-size:9.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--dc,#1D4ED8);margin-bottom:6px;font-family:var(--fs)}
.did-text{font-size:13px;color:var(--muted);line-height:1.75}
.did-text strong{color:var(--text);font-weight:600}
.did-bullets{list-style:none;margin-top:8px;display:flex;flex-direction:column;gap:5px}
.did-bullets li{font-size:12.5px;color:var(--muted);line-height:1.55;padding-left:14px;position:relative}
.did-bullets li::before{content:'·';position:absolute;left:4px;color:var(--dc,#1D4ED8);font-size:16px;line-height:1.2}

/* ── EJEMPLO ── */
.ex-block{background:#F0FDF4;border:1px solid #BBF7D0;border-left:3px solid #16A34A;border-radius:var(--r2);padding:12px 14px;margin-bottom:10px}
.ex-label{font-size:9.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:#15803D;margin-bottom:6px;font-family:var(--fs)}
.ex-text{font-size:12.5px;color:#166534;line-height:1.7}
.ex-bullets{list-style:none;margin-top:7px;display:flex;flex-direction:column;gap:4px}
.ex-bullets li{font-size:12px;color:#166534;line-height:1.5;padding-left:16px;position:relative}
.ex-bullets li::before{content:'✓';position:absolute;left:2px;font-size:10px;color:#16A34A}

/* ── FALLO ── */
.fail-block{background:#FFF7ED;border:1px solid #FED7AA;border-left:3px solid #EA580C;border-radius:var(--r2);padding:12px 14px;margin-bottom:14px}
.fail-label{font-size:9.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:#C2410C;margin-bottom:6px;font-family:var(--fs)}
.fail-text{font-size:12.5px;color:#9A3412;line-height:1.7}
.fail-bullets{list-style:none;margin-top:7px;display:flex;flex-direction:column;gap:4px}
.fail-bullets li{font-size:12px;color:#9A3412;line-height:1.5;padding-left:16px;position:relative}
.fail-bullets li::before{content:'⚠';position:absolute;left:0;font-size:9px;top:2px}

/* ── PRÁCTICAS ── */
.pracs-label{font-size:9.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted2);margin-bottom:8px;font-family:var(--fs)}
.pracs{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.prac-item{border:1px solid var(--border);border-radius:var(--r3);overflow:hidden;background:var(--surface)}
.prac-head{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;transition:background .15s}
.prac-head:hover{background:var(--surface2)}
.prac-code{font-family:var(--fd);font-size:10px;font-weight:700;color:var(--dc,#1D4ED8);min-width:52px;letter-spacing:.3px}
.prac-name{font-size:12px;font-weight:600;color:var(--text);flex:1;line-height:1.3}
.prac-chev{font-size:8px;color:var(--muted2);transition:transform .2s;flex-shrink:0}
.prac-head.open .prac-chev{transform:rotate(180deg)}
.prac-body{display:none;padding:8px 10px 10px;border-top:1px solid var(--border);background:var(--surface2)}
.prac-body.open{display:block}
.prac-desc{font-size:12px;color:var(--muted);line-height:1.6}

/* ── ACTIVIDADES ── */
.acts-label{font-size:9.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted2);margin-bottom:7px;font-family:var(--fs)}
.acts{list-style:none;display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.acts li{font-size:12.5px;color:var(--muted);line-height:1.55;padding:6px 10px;background:var(--surface2);border-radius:var(--r3);display:flex;gap:8px;align-items:flex-start}
.acts li::before{content:'●';font-size:5px;color:var(--dc,#1D4ED8);margin-top:5px;flex-shrink:0}

/* ── CASCADA DE METAS ── */
.casc-label{font-size:9.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted2);margin-bottom:8px;font-family:var(--fs)}
.casc-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r2);padding:12px;margin-bottom:14px;overflow-x:auto}
.casc-row{display:flex;align-items:stretch;gap:0;min-width:max-content}
.casc-box{flex:1;min-width:120px;max-width:180px;padding:9px 11px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);display:flex;flex-direction:column;gap:3px}
.casc-box-l{font-size:8.5px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted2)}
.casc-box-t{font-size:11.5px;font-weight:600;color:var(--text);line-height:1.35}
.casc-box-s{font-size:10.5px;color:var(--muted);line-height:1.4}
.casc-box.highlight{border-color:var(--dc,#1D4ED8);background:rgba(29,78,216,.04)}
.casc-box.highlight .casc-box-l{color:var(--dc,#1D4ED8)}
.casc-arr{display:flex;align-items:center;padding:0 6px;color:var(--muted2);font-size:14px;flex-shrink:0}

/* ── KEYWORDS ── */
.kws-label{font-size:9.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted2);margin-bottom:7px;font-family:var(--fs)}
.kws{display:flex;flex-wrap:wrap;gap:5px}
.kw{display:inline-block;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:600;background:var(--kbg);color:var(--kc);border:1px solid var(--kb);cursor:pointer;transition:opacity .15s;user-select:none}
.kw:hover{opacity:.7}

/* ── TOOLTIP ── */
.tip{position:fixed;z-index:9999;max-width:300px;width:88vw;background:var(--text);color:#fff;border-radius:10px;padding:13px 15px;font-size:12.5px;line-height:1.65;box-shadow:0 8px 32px rgba(0,0,0,.28);opacity:0;pointer-events:none;transition:opacity .16s;font-family:var(--fs)}
.tip.on{opacity:1}
.tip-term{font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:5px}
.tip-def{color:#fff;margin-bottom:8px}
.tip-ex{font-size:11.5px;color:rgba(255,255,255,.75);border-top:1px solid rgba(255,255,255,.15);padding-top:7px}
.tip-ex strong{color:rgba(255,255,255,.9)}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:var(--surface);border-top:1px solid var(--border);display:flex;box-shadow:0 -2px 10px rgba(0,0,0,.06)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 7px;cursor:pointer;border:none;background:transparent;font-family:var(--fs);-webkit-tap-highlight-color:transparent;transition:all .15s;position:relative}
.nb .ni{font-size:18px;margin-bottom:2px;transition:transform .2s}
.nb .nl{font-size:8.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--muted2)}
.nb.active .nl{color:var(--nc)}
.nb.active .ni{transform:translateY(-2px)}
.nb.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--nc);border-radius:0 0 2px 2px}

.st{position:fixed;bottom:84px;right:13px;width:34px;height:34px;border-radius:50%;background:var(--surface);border:1px solid var(--border);box-shadow:var(--sh2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);opacity:0;pointer-events:none;transition:all .2s;z-index:100}
.st.on{opacity:1;pointer-events:all}
.st:hover{background:var(--text);color:#fff}

@media(min-width:600px){.obj-inner{padding:18px 20px 20px}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<header class="app-hd">
  <div class="app-hd-top">
    <h1>COBIT 2019</h1>
    <span class="app-hd-sub">Referencia didáctica · 5 dominios · 40 objetivos</span>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="Buscar objetivo o término clave..." autocomplete="off" oninput="doSearch(this.value)" onfocus="openSearch()" />
    <div class="search-results" id="searchResults"></div>
  </div>
  <div class="domain-pills" id="domPills"></div>
</header>
<div class="main"><div id="domSections"></div></div>
<div class="tip" id="tip"><div class="tip-term" id="tipT"></div><div class="tip-def" id="tipD"></div><div class="tip-ex" id="tipX"></div></div>
<button class="st" id="st" onclick="scrollTo({top:0,behavior:'smooth'})">↑</button>
<nav class="bnav" id="bnav"></nav>
<script>
const DOMAINS=[
{code:'EDM',es:'Evaluar, Dirigir y Monitorear',en:'Evaluate, Direct & Monitor',color:'#1D4ED8',emoji:'🏛️',type:'GOBIERNO',
desc:'El dominio de gobierno es responsabilidad de la junta directiva y la alta dirección. No se trata de operar la tecnología sino de asegurarse de que la tecnología trabaja para los objetivos de la organización: que las inversiones generan valor, que los riesgos están dentro de límites conocidos y que existe rendición de cuentas clara sobre los resultados.',
objs:[
{code:'EDM01',name:'Marco de Gobierno',
def:'Analizar y articular los requisitos para el gobierno de TI empresarial. Establecer y mantener estructuras, principios y procesos efectivos de gobierno con responsabilidades claras.',
did:'Toda organización toma decisiones sobre tecnología. La pregunta no es si se gobiernan esas decisiones, sino si se hace de manera consciente o por inercia. Este objetivo construye el sistema que convierte las intenciones de gobierno en estructuras reales: quién aprueba qué, con qué criterios, y ante quién responde cada decisión. Sin ese sistema, el gobierno tecnológico existe en los discursos pero no en la práctica institucional.',
ex_intro:'Cuando este objetivo funciona bien, se nota en tres cosas concretas:',
ex_bullets:['Cualquier directivo puede decir sin dudar quién aprueba cada tipo de decisión tecnológica y con qué criterios — no depende de recordar nombres sino de un proceso conocido.','Cuando algo sale mal con un proyecto o sistema, hay claridad sobre quién era responsable de qué, lo que permite aprender en lugar de solo asignar culpas.','Las políticas sobre uso, adquisición y protección de la tecnología son conocidas por toda la organización, no solo por el área técnica.'],
fail_intro:'La ausencia de este objetivo suele manifestarse de formas reconocibles:',
fail_bullets:['Las inversiones tecnológicas se aprueban por urgencia o por acceso al tomador de decisiones, no por criterios estratégicos explícitos.','Cuando ocurre un problema grave, nadie puede decir con claridad quién debía haberlo previsto — y la organización pierde la oportunidad de mejorar.','Diferentes áreas operan con reglas distintas sobre cómo usan y protegen la tecnología, generando inconsistencias que solo se descubren en auditorías o incidentes.'],
pracs:[
{code:'EDM01.01',name:'Evaluar el sistema de gobierno',desc:'Examinar y juzgar continuamente si el sistema de gobierno responde a las necesidades y el contexto actuales de la organización. Identificar brechas entre lo que el sistema produce y lo que el negocio necesita.'},
{code:'EDM01.02',name:'Dirigir el sistema de gobierno',desc:'Orientar la implementación del sistema de gobierno definiendo los principios que guiarán el diseño de políticas, estructuras y procesos. Establecer la responsabilidad y autoridad para el toma de decisiones tecnológicas.'},
{code:'EDM01.03',name:'Monitorear el sistema de gobierno',desc:'Supervisar la efectividad del sistema de gobierno. Evaluar si los mecanismos establecidos están funcionando como se diseñaron y si los resultados reflejan los objetivos de gobierno.'}],
acts:['Definir y comunicar los principios que guían todas las decisiones tecnológicas de la organización','Establecer estructuras formales de gobierno con roles y responsabilidades explícitos','Diseñar y operar los comités y mecanismos de toma de decisiones sobre TI','Asegurar que el sistema de gobierno sea conocido y aplicado en toda la organización','Revisar periódicamente que el sistema de gobierno siga respondiendo al contexto actual'],
casc:{need:'La junta directiva necesita saber que la tecnología opera con reglas claras y rendición de cuentas',align:'TI necesita un marco que le diga qué puede decidir sola y qué requiere aprobación de la dirección',obj:'EDM01 construye ese sistema de reglas y autoridades'},
kw:['Marco de gobierno','Principios de TI','Rendición de cuentas','Alineación estratégica','Política corporativa de TI']},

{code:'EDM02',name:'Entrega de Beneficios',
def:'Asegurar que las inversiones y el portafolio de servicios de TI de la empresa aporten el máximo valor al negocio.',
did:'Invertir en tecnología es relativamente fácil. Lo difícil — y lo que distingue a las organizaciones que gobiernan bien su tecnología — es verificar que esa inversión generó lo que prometía. Este objetivo cierra el ciclo que en muchas organizaciones queda abierto: exige que cada inversión tecnológica defina con claridad qué beneficios producirá y luego compruebe, con evidencia, si eso ocurrió. Es la diferencia entre tecnología que rinde cuentas y tecnología que simplemente existe.',
ex_intro:'Cuando este objetivo funciona, el ciclo de valor es visible y verificable:',
ex_bullets:['Cada inversión tecnológica importante tiene indicadores de éxito definidos antes de que se apruebe, no después de que se entregue.','Existe una revisión formal después de cada implementación que compara lo prometido con lo logrado — y esa revisión llega a la dirección.','El portafolio de inversiones se ajusta regularmente eliminando lo que no genera valor y reforzando lo que sí lo hace.'],
fail_intro:'Cuando el ciclo de valor no se cierra, la organización pierde capacidad de decisión:',
fail_bullets:['Las inversiones tecnológicas se acumulan sin que nadie pueda demostrar su retorno. El presupuesto de TI se vuelve difícil de justificar y fácil de cuestionar.','Los proyectos se evalúan por si "se entregaron", no por si generaron el cambio que motivó la inversión. Técnicamente exitosos, estratégicamente vacíos.','La dirección pierde confianza progresivamente en las propuestas de inversión tecnológica porque no hay historial de beneficios verificados.'],
pracs:[
{code:'EDM02.01',name:'Evaluar la optimización del valor',desc:'Examinar continuamente las estrategias de inversión y los portafolios de servicios. Evaluar si las inversiones en TI están generando el valor óptimo para el negocio y si están alineadas con la estrategia empresarial.'},
{code:'EDM02.02',name:'Dirigir la optimización del valor',desc:'Orientar los principios de gestión de valor para asegurar que las inversiones en TI contribuyan al máximo valor posible al menor costo y riesgo aceptable. Definir cómo se medirán y reportarán los beneficios.'},
{code:'EDM02.03',name:'Monitorear la optimización del valor',desc:'Supervisar que los mecanismos de entrega de valor estén funcionando. Evaluar si los beneficios comprometidos se están materializando durante y después de cada iniciativa.'}],
acts:['Establecer los criterios con los que se evalúa el valor de una inversión tecnológica antes de aprobarla','Asegurar que cada iniciativa tenga indicadores de beneficio definidos y verificables','Supervisar que los beneficios comprometidos se vayan materializando durante la ejecución','Revisar formalmente el valor generado al cierre de cada programa o proyecto','Optimizar el portafolio de inversiones basándose en evidencia de resultados reales'],
casc:{need:'Los accionistas y la dirección necesitan evidencia de que el gasto en tecnología genera retorno medible',align:'TI necesita mecanismos para demostrar su contribución al negocio con datos, no con métricas técnicas',obj:'EDM02 establece ese ciclo de evidencia desde la aprobación hasta la verificación de resultados'},
kw:['Valor de negocio','Portafolio de inversiones','ROI — Retorno sobre la Inversión','Caso de negocio (Business case)','Beneficios realizados']},

{code:'EDM03',name:'Optimización del Riesgo',
def:'Garantizar que el apetito y la tolerancia al riesgo de TI estén comprendidos, articulados y comunicados, y que los riesgos relacionados con TI sean identificados y gestionados.',
decoder:'Dos términos de esta definición vale la pena precisar antes de continuar. El <strong>apetito al riesgo</strong> es el nivel de riesgo que la organización decide asumir conscientemente en la búsqueda de sus objetivos — es una decisión estratégica que debe tomar la dirección. La <strong>tolerancia al riesgo</strong> es el margen de variación aceptable alrededor de ese apetito: hasta dónde puede alejarse la realidad del límite establecido antes de que se requiera acción correctiva.',
did:'El riesgo tecnológico no gestionado no desaparece: se acumula silenciosamente. Lo que distingue a una organización con gobierno maduro no es que no tenga riesgos tecnológicos — todas los tienen — sino que sus decisiones sobre esos riesgos son conscientes, formales y documentadas. Este objetivo garantiza que la dirección no descubra los riesgos cuando ya se materializaron, sino que los conozca, los evalúe y decida explícitamente qué hacer con cada uno.',
ex_intro:'Una organización con este objetivo funcionando bien:',
ex_bullets:['La dirección recibe periódicamente un reporte claro de los principales riesgos tecnológicos activos — redactado en lenguaje de negocio, no en lenguaje técnico.','Cuando se decide aceptar un riesgo porque mitigarlo costaría demasiado, esa decisión queda documentada con los criterios que la sustentaron. Nadie puede decir después que no lo sabía.','Cada riesgo significativo tiene un responsable, un plan activo y una fecha de revisión. No está en una lista: está siendo gestionado.'],
fail_intro:'Cuando el riesgo no se gobierna formalmente, las consecuencias son predecibles:',
fail_bullets:['Los problemas graves sorprenden a la dirección aunque el equipo técnico los conocía. La información existía pero nunca se convirtió en decisión.','Los recursos se destinan a riesgos visibles o urgentes, no necesariamente a los más críticos. Sin priorización formal, gestiona mejor quien más presiona.','La organización asume riesgos sin haberlos aprobado conscientemente. Cuando el daño ocurre, no hay claridad sobre si fue una decisión o un descuido.'],
pracs:[
{code:'EDM03.01',name:'Evaluar la gestión del riesgo',desc:'Examinar y juzgar el perfil de riesgo actual de la organización. Evaluar si el apetito y la tolerancia al riesgo tecnológico son apropiados para el contexto y la estrategia.'},
{code:'EDM03.02',name:'Dirigir la gestión del riesgo',desc:'Orientar el establecimiento de prácticas de gestión del riesgo que aseguren que el riesgo tecnológico no exceda el apetito definido. Establecer los umbrales de escalamiento a la dirección.'},
{code:'EDM03.03',name:'Monitorear la gestión del riesgo',desc:'Supervisar que los riesgos clave sean identificados y gestionados dentro de los límites aprobados. Evaluar si las estrategias de respuesta al riesgo son efectivas.'}],
acts:['Definir formalmente el apetito y la tolerancia al riesgo tecnológico en concertación con la dirección','Asegurar que los riesgos críticos sean identificados, evaluados y escalados oportunamente','Revisar que las estrategias de respuesta al riesgo sean proporcionales al impacto potencial','Supervisar que el riesgo residual se mantenga dentro de los límites aprobados','Comunicar el perfil de riesgo tecnológico a la junta directiva con evidencia y claridad'],
casc:{need:'La dirección necesita tomar decisiones sobre riesgo tecnológico de forma consciente, no descubrirlo en crisis',align:'TI necesita límites claros sobre qué nivel de riesgo puede asumir sin escalar a la dirección',obj:'EDM03 formaliza esas decisiones y asegura que el riesgo se gestione dentro de límites aprobados'},
kw:['Apetito al riesgo','Tolerancia al riesgo','Perfil de riesgo','Riesgo tecnológico','Riesgo residual']},

{code:'EDM04',name:'Optimización de Recursos',
def:'Garantizar que se dispongan capacidades de recursos de TI adecuadas —personas, procesos e infraestructura— para apoyar los objetivos de la empresa de manera efectiva y a un costo razonable.',
did:'Dos organizaciones pueden invertir el mismo presupuesto en tecnología y obtener resultados radicalmente distintos. La diferencia casi siempre está en cómo se asignan los recursos: si siguen la estrategia o si siguen la urgencia del momento. Este objetivo garantiza que la dirección tenga visibilidad y control sobre cómo se distribuye la capacidad tecnológica — evitando tanto el desperdicio por exceso como los cuellos de botella por escasez en momentos críticos.',
ex_intro:'Los indicadores de que este objetivo funciona bien son concretos:',
ex_bullets:['Cuando el negocio lanza una iniciativa estratégica, los recursos tecnológicos necesarios ya están identificados o hay un proceso claro para conseguirlos — no hay improvisación.','El presupuesto de TI se distribuye según prioridades estratégicas explícitas: operación, proyectos en curso e innovación tienen proporciones definidas y revisadas periódicamente.','Las decisiones de externalizar, contratar o desarrollar capacidades internamente responden a criterios estratégicos, no solo a costos inmediatos.'],
fail_intro:'Cuando los recursos no se optimizan formalmente, emergen patrones reconocibles:',
fail_bullets:['Proyectos estratégicos se detienen porque "no hay personas disponibles" mientras otras iniciativas de menor prioridad consumen los mismos recursos sin criterio claro.','El presupuesto de TI crece cada año pero la dirección no puede establecer con claridad qué capacidades adicionales está comprando con ese incremento.','La concentración de conocimiento crítico en pocas personas — o la dependencia excesiva de proveedores específicos — solo se descubre cuando ya generó un problema.'],
pracs:[
{code:'EDM04.01',name:'Evaluar la gestión de recursos',desc:'Examinar las necesidades actuales y futuras de recursos tecnológicos. Evaluar si las capacidades disponibles son suficientes y están bien distribuidas para soportar los objetivos estratégicos.'},
{code:'EDM04.02',name:'Dirigir la gestión de recursos',desc:'Orientar los principios para la adquisición, asignación y optimización de recursos tecnológicos. Establecer cómo se toman las decisiones de inversión en personas, procesos e infraestructura.'},
{code:'EDM04.03',name:'Monitorear la gestión de recursos',desc:'Supervisar la adquisición y uso de los recursos tecnológicos. Evaluar si los recursos están generando el valor esperado y si existen vulnerabilidades de dependencia o concentración.'}],
acts:['Evaluar si la distribución actual de recursos tecnológicos responde a las prioridades estratégicas','Orientar las decisiones sobre adquisición, desarrollo y externalización de capacidades tecnológicas','Supervisar que no existan concentraciones críticas de conocimiento o dependencias de riesgo elevado','Asegurar que los recursos se asignen según el valor que generan, no según la urgencia','Revisar periódicamente la sostenibilidad de los modelos de recursos tecnológicos adoptados'],
casc:{need:'La dirección necesita saber que los recursos tecnológicos están donde crean más valor, sin desperdicios ni vulnerabilidades',align:'TI necesita criterios claros sobre cómo priorizar la asignación de personas, presupuesto e infraestructura',obj:'EDM04 establece esa visibilidad y los principios que guían la distribución óptima de recursos'},
kw:['Gestión de recursos','Capacidad tecnológica','Optimización','Sostenibilidad operativa','Recursos estratégicos']},

{code:'EDM05',name:'Transparencia hacia las Partes Interesadas',
def:'Garantizar que la comunicación con las partes interesadas de la empresa sea efectiva y se base en información oportuna, correcta y completa sobre el desempeño de TI.',
did:'La confianza en la función tecnológica no se construye con buenos proyectos ni con tecnología avanzada: se construye con comunicación honesta y regular sobre lo que está pasando. Este objetivo garantiza que quienes necesitan información sobre tecnología para tomar decisiones — la junta, los reguladores, otras áreas del negocio — la reciban en el formato correcto y en el momento oportuno. No como respuesta a una crisis, sino como práctica sistemática.',
ex_intro:'Una comunicación transparente y efectiva se reconoce en la práctica:',
ex_bullets:['La junta directiva recibe periódicamente información sobre TI que puede entender y usar para decidir, sin necesidad de conocimiento técnico previo.','Cuando hay problemas o retrasos, la dirección se entera por los canales formales, no por rumores o por escalamiento de emergencia.','Los reguladores y auditores externos pueden acceder a evidencia de cumplimiento sin que eso genere una movilización de emergencia en el área de TI.'],
fail_intro:'La opacidad — aunque no sea intencional — erosiona la confianza de forma acumulativa:',
fail_bullets:['La dirección se entera de los problemas cuando ya son visibles para todos o cuando el daño está hecho. La sorpresa ante las malas noticias es el síntoma más claro de este déficit.','Los reportes que llegan a la alta dirección están llenos de métricas técnicas que no permiten evaluar si la tecnología está cumpliendo su función estratégica.','La relación entre TI y la dirección oscila entre la indiferencia y la crisis, sin un ritmo de comunicación regular que construya confianza gradualmente.'],
pracs:[
{code:'EDM05.01',name:'Evaluar los requerimientos de reporte',desc:'Examinar qué información necesitan las distintas partes interesadas sobre el desempeño y estado de la tecnología. Evaluar si los reportes actuales responden a esas necesidades o están diseñados para la comodidad del emisor.'},
{code:'EDM05.02',name:'Dirigir la comunicación con partes interesadas',desc:'Orientar el establecimiento de mecanismos de comunicación que aseguren transparencia y oportunidad. Definir los estándares de calidad de la información que se comparte con cada grupo de interés.'},
{code:'EDM05.03',name:'Monitorear la comunicación',desc:'Supervisar que los reportes y comunicaciones cumplan los estándares definidos. Evaluar si las partes interesadas tienen la información que necesitan para ejercer su responsabilidad.'}],
acts:['Identificar qué información necesita cada grupo de interés y en qué formato para tomar decisiones','Establecer los mecanismos y la periodicidad de los reportes de desempeño de TI','Asegurar que los reportes a la dirección estén en lenguaje de negocio, no en lenguaje técnico','Monitorear el cumplimiento de las obligaciones de reporte regulatorio y contractual','Revisar periódicamente que los canales de comunicación sigan siendo efectivos'],
casc:{need:'La junta directiva y los reguladores necesitan información confiable sobre la tecnología para ejercer su responsabilidad',align:'TI necesita mecanismos formales para comunicar resultados, riesgos y compromisos de forma comprensible',obj:'EDM05 institucionaliza esa comunicación como práctica regular, no como respuesta a crisis'},
kw:['Transparencia','Partes interesadas (Stakeholders)','Reporte de desempeño de TI','Rendición de cuentas','Comunicación ejecutiva']}
]},
{code:'APO',es:'Alinear, Planear y Organizar',en:'Align, Plan & Organize',color:'#0284C7',emoji:'📋',type:'GESTIÓN',
desc:'El dominio de la estrategia y la organización. Aquí se define cómo la tecnología apoya los objetivos del negocio, cómo se estructuran las personas y los recursos, y cómo se gestionan el riesgo, la seguridad y los datos. Es el puente entre la dirección que establece el gobierno y la ejecución que opera el día a día.',
objs:[
{code:'APO01',name:'Marco de Gestión de TI',
def:'Aclarar y mantener la misión y visión de TI. Implementar y mantener los mecanismos necesarios para gestionar información y tecnología en apoyo a los objetivos de gobierno.',
did:'Una organización puede tener políticas de TI excelentes en papel y no tener ninguna en la práctica, porque nadie las conoce, nadie las aplica de forma consistente y nadie verifica su cumplimiento. Este objetivo construye el orden interno del área tecnológica: define cómo se organiza, cómo opera y cómo documenta su conocimiento. Es la diferencia entre un área que depende de las personas que están y una que funciona bien independientemente de quién esté.',
ex_intro:'Un marco de gestión sólido se manifiesta en cosas cotidianas y concretas:',
ex_bullets:['Cuando alguien nuevo llega a cualquier área y necesita saber cómo relacionarse con TI, encuentra esa información disponible sin tener que preguntarle a alguien que lleva años.','Los procedimientos para las tareas críticas están documentados de manera que cualquier persona del equipo pueda ejecutarlos, no solo quien los diseñó originalmente.','Las políticas sobre uso de tecnología aplican de forma consistente en toda la organización — no dependen de qué área pregunta o de qué relación tiene con el área técnica.'],
fail_intro:'La falta de marco de gestión genera patrones de fragilidad organizacional:',
fail_bullets:['El conocimiento crítico sobre cómo operan los sistemas vive en la memoria de personas específicas. Cuando esas personas no están disponibles, la organización opera con incertidumbre.','Cada integrante del área tecnológica trabaja según su propio criterio. Los resultados varían según quién ejecuta, no según qué proceso se sigue.','Las inconsistencias entre áreas solo afloran en auditorías o cuando algo falla — nunca antes, porque no hay mecanismos preventivos de verificación.'],
pracs:[
{code:'APO01.01',name:'Definir la estructura organizativa',desc:'Establecer la estructura interna del área tecnológica: roles, responsabilidades, jerarquías y relaciones con el resto de la organización. Que cualquiera sepa a quién acudir para qué.'},
{code:'APO01.02',name:'Establecer roles y responsabilidades',desc:'Definir con precisión quién hace qué dentro de la función tecnológica. Incluye la separación de funciones en tareas críticas para minimizar riesgos de error o abuso.'},
{code:'APO01.03',name:'Mantener los habilitadores del sistema de gestión',desc:'Establecer y mantener las políticas, procedimientos, estándares y herramientas que permiten que el área tecnológica opere de forma consistente y verificable.'},
{code:'APO01.04',name:'Comunicar los objetivos y la dirección de gestión',desc:'Asegurar que toda la organización conozca las políticas y procedimientos de TI relevantes para su trabajo. La comunicación efectiva es parte del marco, no un complemento.'}],
acts:['Definir y documentar la estructura organizativa del área tecnológica con roles claros','Establecer y mantener las políticas y procedimientos que gobiernan la operación de TI','Asegurar que el conocimiento crítico esté documentado y accesible, no concentrado en personas','Comunicar el marco de gestión a toda la organización de forma comprensible','Revisar y actualizar el marco cuando cambian el contexto o los objetivos'],
casc:{need:'Las áreas del negocio necesitan saber cómo relacionarse con TI de forma predecible y consistente',align:'TI necesita un sistema interno que funcione independientemente de las personas específicas que lo operan',obj:'APO01 construye ese sistema: políticas, estructuras y procedimientos que convierten el conocimiento individual en capacidad institucional'},
kw:['Estructura organizativa','Políticas de TI','Roles y responsabilidades','Marco de gestión','Procedimientos operativos']},

{code:'APO02',name:'Estrategia',
def:'Proporcionar una visión holística del entorno de negocio y TI actuales, y proponer la dirección futura para apoyar la estrategia y los objetivos de la empresa.',
did:'Una organización sin plan estratégico de TI no está sin estrategia: está con la estrategia del día anterior, respondiendo a la última urgencia. El costo de esa reactividad no es solo operativo — es estratégico: mientras la organización resuelve lo que ya pasó, no está construyendo las capacidades que necesitará para lo que viene. Este objetivo conecta la tecnología con el futuro del negocio, asegurando que ambos apunten en la misma dirección al mismo tiempo.',
ex_intro:'Una estrategia tecnológica alineada se hace visible en momentos clave:',
ex_bullets:['Cuando la dirección aprueba un plan de expansión, crecimiento o transformación del negocio, el plan tecnológico correspondiente ya existe o puede construirse rápidamente porque hay una hoja de ruta de base.','Las áreas del negocio pueden anticipar qué capacidades tecnológicas tendrán disponibles en los próximos ciclos, y planear sus propias iniciativas sobre esa base.','Los recursos de TI se invierten principalmente en construir el futuro, no solo en mantener el presente.'],
fail_intro:'La ausencia de estrategia tecnológica genera un patrón reconocible de rezago permanente:',
fail_bullets:['TI siempre llega tarde a las iniciativas del negocio porque se entera de ellas cuando ya están aprobadas, no cuando están siendo diseñadas.','La inversión tecnológica se concentra en resolver problemas del pasado, dejando sin recursos las capacidades que el negocio necesitará en uno o dos años.','Las decisiones tecnológicas se toman de manera fragmentada, sin una visión de conjunto que asegure coherencia entre lo que se hace hoy y lo que se necesitará mañana.'],
pracs:[
{code:'APO02.01',name:'Comprender la dirección del negocio',desc:'Entender el contexto estratégico de la organización: sus objetivos, su modelo de negocio, su entorno competitivo y sus necesidades futuras de capacidad tecnológica.'},
{code:'APO02.02',name:'Evaluar el entorno actual',desc:'Analizar honestamente las capacidades tecnológicas actuales: qué funciona bien, qué está rezagado y qué brechas existen entre lo que hay y lo que el negocio necesitará.'},
{code:'APO02.03',name:'Definir las capacidades objetivo de TI',desc:'Establecer cuáles son las capacidades tecnológicas que la organización debe desarrollar para soportar su estrategia. Es la imagen del estado futuro deseado.'},
{code:'APO02.04',name:'Formular el plan estratégico de TI',desc:'Construir el plan que describe cómo pasar del estado actual al estado objetivo: qué iniciativas, en qué secuencia, con qué recursos y en qué plazos.'},
{code:'APO02.05',name:'Comunicar la estrategia de TI',desc:'Hacer que el plan estratégico sea conocido y comprensible para todas las partes relevantes de la organización, no solo para el área técnica.'}],
acts:['Analizar la estrategia del negocio y traducirla en necesidades tecnológicas concretas','Evaluar las capacidades actuales de TI e identificar las brechas con el estado deseado','Desarrollar el plan estratégico de TI con cronograma, recursos e indicadores','Comunicar la estrategia de TI de forma comprensible a todos los niveles de la organización','Revisar y actualizar el plan cuando cambian la estrategia o el entorno del negocio'],
casc:{need:'El negocio necesita que la tecnología esté lista cuando la estrategia la requiera, no dos años después',align:'TI necesita conocer los planes del negocio con anticipación suficiente para construir las capacidades que estos demandan',obj:'APO02 crea ese puente: un plan tecnológico que nace de la estrategia del negocio y la acompaña en el tiempo'},
kw:['Plan estratégico de TI','Alineación negocio-TI','Hoja de ruta tecnológica','Análisis situacional','Planificación estratégica']},

{code:'APO03',name:'Arquitectura Empresarial',
def:'Establecer una arquitectura común que integre los procesos, la información, los datos, las aplicaciones y los recursos tecnológicos de la empresa en respaldo de los objetivos estratégicos.',
did:'Cuando cada proyecto tecnológico se construye sin considerar el conjunto, la organización acumula silenciosamente un pasivo que solo se hace visible cuando algo necesita integrarse: los sistemas no hablan entre sí, los datos viven en múltiples lugares con versiones contradictorias, y cada integración nueva cuesta más que el sistema que la requiere. La arquitectura empresarial es el plano que evita ese escenario: no limita lo que se puede construir, sino que asegura que lo que se construye encaje con todo lo demás.',
ex_intro:'Una arquitectura empresarial bien gestionada se reconoce en la coherencia del ecosistema tecnológico:',
ex_bullets:['Cuando el negocio solicita un nuevo sistema, existe un proceso de evaluación que verifica su compatibilidad con lo que ya existe antes de comprometerse a comprarlo o desarrollarlo.','Los datos de clientes, proveedores o procesos tienen una sola fuente oficial reconocida por toda la organización, lo que elimina la necesidad de reconciliar cifras en cada reunión.','Las decisiones de inversión tecnológica consideran el impacto sobre el conjunto del ecosistema, no solo los beneficios del sistema específico que se está evaluando.'],
fail_intro:'La ausencia de arquitectura genera un costo que crece de forma compuesta con el tiempo:',
fail_bullets:['Cada área resuelve sus necesidades tecnológicas de forma independiente, creando islas de información que no se comunican y que eventualmente requieren integraciones costosas.','Los proyectos de integración entre sistemas existentes toman mucho más tiempo y recursos de lo esperado porque nadie documentó cómo funciona cada pieza del conjunto.','La deuda técnica acumulada convierte cada cambio en un riesgo: modificar una parte del sistema puede afectar otras partes de formas que nadie puede predecir con certeza.'],
pracs:[
{code:'APO03.01',name:'Desarrollar la visión de arquitectura empresarial',desc:'Definir el estado futuro deseado del ecosistema tecnológico de la organización. Establecer los principios que guiarán todas las decisiones de diseño tecnológico.'},
{code:'APO03.02',name:'Definir la arquitectura de referencia',desc:'Documentar la arquitectura actual de procesos, datos, aplicaciones e infraestructura. Identificar las brechas con el estado objetivo y las rutas para cerrarlas.'},
{code:'APO03.03',name:'Seleccionar oportunidades y soluciones',desc:'Evaluar las opciones tecnológicas disponibles en función de su compatibilidad con la arquitectura definida. Priorizar lo que avanza hacia el estado objetivo.'},
{code:'APO03.04',name:'Definir la implementación de la arquitectura',desc:'Planear cómo se irá construyendo y evolucionando la arquitectura en el tiempo, coordinando los proyectos individuales con la visión de conjunto.'}],
acts:['Desarrollar y mantener el mapa del ecosistema tecnológico de la organización','Definir los principios y estándares que guían las decisiones de diseño tecnológico','Evaluar la compatibilidad de nuevas iniciativas con la arquitectura existente','Identificar y gestionar la deuda técnica acumulada en el ecosistema actual','Coordinar la evolución del ecosistema tecnológico con los planes estratégicos del negocio'],
casc:{need:'El negocio necesita que sus sistemas se integren fluidamente y que los datos sean confiables y consistentes',align:'TI necesita un plano de conjunto que asegure que cada decisión individual contribuye a un ecosistema coherente',obj:'APO03 provee ese plano: los principios, estándares y mapa que hacen que cada pieza tecnológica encaje con las demás'},
kw:['Arquitectura tecnológica','Integración de sistemas','Estándares tecnológicos','Plano tecnológico','Interoperabilidad de sistemas']},

{code:'APO04',name:'Innovación',
def:'Mantener conocimiento de las tendencias tecnológicas; identificar oportunidades de innovación; planificar cómo beneficiarse de ellas en relación con las necesidades del negocio.',
did:'La innovación que no tiene proceso asignado, presupuesto y criterios de evaluación no ocurre, independientemente de cuántas personas la declaren como prioridad. Las organizaciones que se sorprenden con disrupciones tecnológicas no es que no tuvieran acceso a la información — es que no tenían un proceso para convertir esa información en decisiones antes de que fuera demasiado tarde. Este objetivo convierte la vigilancia tecnológica de actividad casual en capacidad sistemática.',
ex_intro:'Una función de innovación madura produce resultados verificables:',
ex_bullets:['La organización identifica las tecnologías relevantes para su sector con suficiente anticipación como para evaluar, pilotar y decidir antes de que sean urgentes.','Los pilotos tecnológicos tienen criterios de evaluación definidos de antemano: qué tiene que demostrar el experimento para que se escale, ajuste o descarte.','El conocimiento generado en cada exploración tecnológica se acumula y está disponible para futuras decisiones — los experimentos dejan aprendizaje institucional, no solo experiencias individuales.'],
fail_intro:'La ausencia de proceso formal de innovación tiene un costo que solo se mide en retrospectiva:',
fail_bullets:['La organización adopta tecnologías cuando ya son estándar en el mercado, perdiendo la ventaja de ser temprana en curvas de adopción que generaron valor a sus competidores.','Los proyectos de innovación se inician con entusiasmo y sin metodología, lo que produce ciclos de expectativa y decepción que erosionan el apoyo directivo a futuras iniciativas.','No hay claridad sobre en qué tecnologías emergentes vale la pena invertir atención — la agenda de innovación la marcan los proveedores que llegan con propuestas, no los objetivos del negocio.'],
pracs:[
{code:'APO04.01',name:'Crear un entorno propicio para la innovación',desc:'Establecer las condiciones organizacionales, culturales y presupuestales que permiten que la exploración tecnológica ocurra de forma sistemática y no solo cuando alguien tiene iniciativa personal.'},
{code:'APO04.02',name:'Mantener el entendimiento del entorno tecnológico',desc:'Monitorear activamente las tendencias tecnológicas relevantes para el sector y el modelo de negocio de la organización. Distinguir lo que es ruido de lo que tiene potencial real.'},
{code:'APO04.03',name:'Monitorear y explorar el entorno tecnológico',desc:'Evaluar en profundidad las tecnologías que superan el filtro inicial de relevancia. Diseñar y ejecutar experimentos controlados para generar evidencia antes de decisiones de escala.'},
{code:'APO04.04',name:'Recomendar iniciativas apropiadas',desc:'Traducir los aprendizajes de la vigilancia y exploración tecnológica en recomendaciones concretas de acción para la dirección. Conectar la oportunidad tecnológica con la necesidad del negocio.'}],
acts:['Establecer un proceso formal de vigilancia tecnológica con responsables y presupuesto','Evaluar el potencial de nuevas tecnologías con criterios de negocio explícitos','Diseñar y ejecutar pilotos con hipótesis y criterios de éxito definidos de antemano','Sistematizar el aprendizaje de cada exploración para que quede como activo institucional','Conectar los hallazgos de innovación con las decisiones de portafolio e inversión'],
casc:{need:'El negocio necesita anticipar las tecnologías que cambiarán su sector antes de que se conviertan en ventaja para la competencia',align:'TI necesita un proceso que convierta la vigilancia tecnológica en recomendaciones accionables para la dirección',obj:'APO04 institucionaliza ese proceso: de la observación del horizonte tecnológico a la decisión informada de qué explorar'},
kw:['Vigilancia tecnológica','Innovación digital','Experimentación controlada','Piloto tecnológico','Tendencias del sector']},

{code:'APO05',name:'Portafolio',
def:'Ejecutar las directivas estratégicas para las inversiones de TI; gestionar el portafolio de programas, proyectos y servicios considerando valor, riesgo y recursos disponibles.',
did:'Con recursos siempre limitados y más iniciativas que capacidad de ejecución — que es la condición permanente de cualquier organización — la pregunta más importante no es qué hacer sino qué hacer primero y qué dejar de hacer. Sin un proceso explícito para responder esa pregunta, la priorización ocurre de todas formas, pero por mecanismos que no son estratégicos: la urgencia del momento, la visibilidad del solicitante o la inercia de lo que ya empezó. Este objetivo reemplaza esos mecanismos con criterios.',
ex_intro:'Un portafolio bien gestionado se reconoce en la calidad de las decisiones:',
ex_bullets:['Las áreas del negocio entienden por qué su solicitud fue aprobada, aplazada o rechazada — no como una arbitrariedad sino como el resultado de criterios conocidos aplicados consistentemente.','El conjunto de proyectos activos cabe dentro de la capacidad real de ejecución. No hay veinte proyectos "en curso" de los cuales dieciséis están en realidad en pausa.','Cuando cambian las prioridades del negocio, el portafolio se ajusta de forma ordenada — hay iniciativas que se detienen o se aceleran sin que eso genere una crisis.'],
fail_intro:'La gestión de portafolio informal produce síntomas difíciles de ignorar:',
fail_bullets:['Cada proyecto compite por los mismos recursos sin que nadie tenga autoridad ni criterios para resolver ese conflicto de forma definitiva y consistente.','La organización invierte en proyectos que ya no están alineados con la estrategia actual porque nadie revisó formalmente si siguen vigentes sus justificaciones originales.','El equipo tecnológico trabaja en modo de saturación permanente: muchos proyectos avanzando lentamente en lugar de pocos proyectos terminando a tiempo.'],
pracs:[
{code:'APO05.01',name:'Establecer el portafolio objetivo',desc:'Definir la combinación de inversiones tecnológicas que mejor responde a la estrategia de la organización: cuánto en operación, cuánto en proyectos estratégicos, cuánto en innovación.'},
{code:'APO05.02',name:'Determinar la disponibilidad y las fuentes de fondos',desc:'Establecer con qué presupuesto cuenta el portafolio y de dónde proviene. Asegurar que el financiamiento disponible sea coherente con las ambiciones del portafolio.'},
{code:'APO05.03',name:'Evaluar y seleccionar programas para financiación',desc:'Aplicar los criterios de evaluación establecidos a cada iniciativa candidata. Tomar decisiones de aprobación, aplazamiento o rechazo con base en evidencia, no en presión.'},
{code:'APO05.04',name:'Monitorear, optimizar y reportar el desempeño del portafolio',desc:'Hacer seguimiento al conjunto del portafolio activo: si está generando el valor esperado, si los recursos están bien distribuidos y si hay iniciativas que deben ajustarse o cerrarse.'}],
acts:['Establecer los criterios con los que se evalúan y priorizan las inversiones tecnológicas','Mantener visibilidad completa del conjunto de iniciativas activas y su demanda de recursos','Tomar decisiones de continuar, pausar o cancelar iniciativas basándose en evidencia de desempeño','Asegurar que el portafolio activo cabe en la capacidad real de ejecución disponible','Comunicar el estado del portafolio a la dirección con periodicidad y claridad'],
casc:{need:'La dirección necesita que la inversión tecnológica esté distribuida según las prioridades estratégicas reales, no según quien presiona más',align:'TI necesita criterios claros para decir no — o para aplazar — sin que eso genere conflictos con las áreas del negocio',obj:'APO05 provee esos criterios y el proceso para aplicarlos de forma transparente y consistente'},
kw:['Portafolio de proyectos','Priorización estratégica','Gestión de inversiones','Criterios de aprobación','Optimización del portafolio']},

{code:'APO06',name:'Presupuesto y Costos',
def:'Gestionar las actividades financieras de TI, abarcando presupuesto, costos y beneficios de las inversiones y servicios tecnológicos.',
did:'El presupuesto de TI es frecuentemente uno de los más grandes y menos comprensibles para la dirección financiera de una organización. No porque sea inherentemente opaco, sino porque raramente se gestiona con el mismo rigor que cualquier otra área. Este objetivo hace que el gasto tecnológico sea tan transparente y justificable como el de cualquier otra función: qué cuesta cada servicio, qué genera cada inversión, y qué decisiones son posibles cuando hay que optimizar.',
ex_intro:'Una gestión financiera madura de TI produce claridad donde antes había opacidad:',
ex_bullets:['El área financiera puede entender el presupuesto de TI con el mismo nivel de detalle que cualquier otro presupuesto — no es una caja negra que se aprueba por inercia.','Cuando hay que hacer recortes presupuestales, la dirección puede tomar decisiones informadas sobre qué reducir sin afectar inadvertidamente servicios que son críticos para el negocio.','El costo real de cada servicio tecnológico es conocido y se compara regularmente con alternativas del mercado.'],
fail_intro:'La opacidad financiera en TI genera desconfianza que es difícil de revertir:',
fail_bullets:['El presupuesto de TI se aprueba año a año sin que nadie pueda demostrar qué valor adicional genera el incremento solicitado respecto al año anterior.','Cuando aparecen costos inesperados en proyectos tecnológicos, la dirección no tiene herramientas para evaluar si son razonables o evitables.','La percepción de que TI "siempre pide más" se instala sin que haya mecanismos para demostrar lo contrario con evidencia.'],
pracs:[
{code:'APO06.01',name:'Gestionar las finanzas y la contabilidad',desc:'Establecer la estructura de gestión financiera para el área tecnológica: cómo se registran, clasifican y reportan los costos de TI de forma comprensible.'},
{code:'APO06.02',name:'Priorizar la asignación de recursos',desc:'Distribuir el presupuesto disponible según las prioridades estratégicas del portafolio. Asegurar que la asignación financiera refleja las prioridades reales de la organización.'},
{code:'APO06.03',name:'Crear y mantener presupuestos',desc:'Desarrollar el presupuesto de TI de forma rigurosa y justificada. Incluir todos los costos reales: operación, proyectos, licencias, personas e infraestructura.'},
{code:'APO06.04',name:'Modelar y asignar costos',desc:'Establecer cómo se distribuyen los costos de TI entre las áreas del negocio que los consumen. Que cada área tenga visibilidad del costo de los servicios que usa.'},
{code:'APO06.05',name:'Gestionar costos',desc:'Monitorear el gasto real frente al presupuesto e identificar desviaciones oportunamente. Implementar correcciones cuando el gasto se desvía de lo planeado.'}],
acts:['Desarrollar el presupuesto de TI con desglose comprensible por servicio e iniciativa','Asignar costos de TI a las áreas del negocio que consumen cada servicio','Monitorear el gasto real frente al presupuesto con reportes periódicos a la dirección','Identificar oportunidades de optimización del costo sin comprometer el valor entregado','Asegurar que las decisiones de inversión tecnológica reflejen el Costo Total de Propiedad'],
casc:{need:'La dirección financiera necesita entender el gasto en tecnología con el mismo rigor con el que gestiona cualquier otro costo',align:'TI necesita herramientas para demostrar el valor de su presupuesto y tener conversaciones informadas sobre optimización',obj:'APO06 construye esa transparencia: costos visibles, asignados y comparables con el valor que generan'},
kw:['Presupuesto de TI','Gestión financiera de tecnología','Costo por servicio','Transparencia financiera','Costo total de propiedad (TCO)']},

{code:'APO07',name:'Recursos Humanos',
def:'Proveer un enfoque estructurado para asegurar la estructuración óptima, ubicación, habilidades y desarrollo de los recursos humanos de TI.',
did:'El talento tecnológico es el multiplicador de todo lo demás. La mejor infraestructura no compensa la falta de personas que sepan operarla; el mejor sistema no genera valor si nadie en la organización tiene las habilidades para aprovecharlo. Lo que hace crítico a este objetivo no es solo gestionar el talento actual, sino anticipar las brechas que aparecerán cuando la tecnología evolucione o cuando personas con conocimiento clave decidan moverse.',
ex_intro:'Una gestión sólida del talento tecnológico produce resiliencia organizacional:',
ex_bullets:['Las competencias críticas para operar y gobernar la tecnología están identificadas, distribuidas entre varias personas y documentadas — no concentradas en individuos irremplazables.','Cuando una persona con conocimiento clave deja la organización, hay un proceso de transferencia que asegura continuidad operativa sin meses de incertidumbre.','Los planes de desarrollo del equipo tecnológico anticipan las habilidades que el negocio necesitará en los próximos ciclos, no solo las que necesita hoy.'],
fail_intro:'La gestión reactiva del talento tecnológico produce vulnerabilidades que solo se descubren tarde:',
fail_bullets:['El conocimiento sobre cómo funcionan los sistemas críticos existe en la memoria de personas específicas. La organización lo descubre cuando esas personas no están disponibles.','Las brechas de competencia se identifican cuando ya están generando problemas — proyectos que no avanzan porque nadie sabe cómo, sistemas que nadie se atreve a modificar, riesgos que nadie puede evaluar.','La rotación de talento tecnológico sorprende a la organización con pérdidas de capacidad que toman meses recuperar.'],
pracs:[
{code:'APO07.01',name:'Mantener una dotación de personal suficiente y apropiada',desc:'Asegurar que el área tecnológica tiene las personas necesarias en número y perfil para cumplir sus responsabilidades actuales y las proyectadas.'},
{code:'APO07.02',name:'Identificar personal clave de TI',desc:'Determinar qué personas tienen conocimiento o habilidades críticas para la operación del negocio. Evaluar el riesgo de concentración y diseñar estrategias de mitigación.'},
{code:'APO07.03',name:'Mantener las habilidades y competencias del personal',desc:'Desarrollar los planes de formación y crecimiento que mantienen al equipo tecnológico a la altura de las necesidades actuales y futuras.'},
{code:'APO07.04',name:'Evaluar el desempeño laboral',desc:'Revisar regularmente el desempeño del equipo tecnológico frente a expectativas claras. Identificar fortalezas a potenciar y brechas a cerrar.'},
{code:'APO07.05',name:'Planear y realizar el seguimiento del uso del personal de TI',desc:'Gestionar la asignación del equipo tecnológico asegurando que las personas están donde más valor generan y que nadie está sistemáticamente sobrecargado o subutilizado.'}],
acts:['Identificar las competencias críticas para la operación tecnológica y evaluar su estado actual','Diseñar planes de desarrollo que anticipen las habilidades que el negocio necesitará','Gestionar activamente el riesgo de concentración de conocimiento en pocas personas','Establecer procesos de transferencia de conocimiento ante cambios en el equipo','Asegurar que la asignación de personas sigue las prioridades del portafolio de proyectos'],
casc:{need:'El negocio necesita que la tecnología cuente con las personas y competencias para soportar sus objetivos actuales y futuros',align:'TI necesita visibilidad sobre sus propias vulnerabilidades de talento antes de que se conviertan en problemas operativos',obj:'APO07 construye esa visibilidad y los mecanismos para gestionar el talento como el activo estratégico que es'},
kw:['Talento tecnológico','Gestión de competencias','Retención de talento','Planes de desarrollo','Riesgo de rotación de personal']},

{code:'APO08',name:'Relaciones',
def:'Gestionar las relaciones entre el negocio y TI de manera formal y transparente, enfocándose en lograr objetivos comunes y creación de valor.',
did:'Cuando la relación entre TI y el negocio se deteriora, el primer síntoma no es un conflicto abierto sino algo más silencioso: las áreas del negocio empiezan a resolver sus necesidades tecnológicas por su cuenta. Contratan desarrolladores propios, compran software sin avisar, usan herramientas en la nube sin control. Eso no es innovación descentralizada — es la señal de que la función tecnológica dejó de ser percibida como un aliado confiable. Este objetivo construye esa alianza antes de que su ausencia genere los costos de la fragmentación.',
ex_intro:'Una relación sana entre TI y el negocio se construye sobre prácticas concretas:',
ex_bullets:['Cada área de la organización tiene un punto de contacto designado en TI que entiende sus objetivos del año y lleva sus necesidades con contexto y prioridad correctos — no solo con especificaciones técnicas.','Cuando hay conflictos de prioridad entre áreas, existe un proceso conocido para resolverlos. No se resuelven según quién presiona más.','El negocio siente que TI trabaja para sus objetivos. TI entiende el negocio antes de proponer soluciones.'],
fail_intro:'El deterioro de la relación TI-negocio produce costos que se distribuyen por toda la organización:',
fail_bullets:['Las áreas del negocio sienten que TI habla en un idioma diferente y que sus propuestas no consideran las realidades operativas del negocio cotidiano.','La proliferación de tecnología no gestionada — sistemas contratados sin coordinación, herramientas en la nube sin control — crea riesgos de seguridad y costos de integración que nadie planificó.','La desconfianza acumulada hace que las iniciativas tecnológicas enfrenten resistencia interna antes de demostrar su valor.'],
pracs:[
{code:'APO08.01',name:'Entender las expectativas del negocio',desc:'Conocer en profundidad los objetivos, prioridades y desafíos de cada área del negocio. TI no puede ser un buen socio de lo que no comprende bien.'},
{code:'APO08.02',name:'Identificar oportunidades, riesgos e implicaciones del negocio',desc:'Llevar al negocio perspectivas tecnológicas relevantes para sus decisiones: qué tecnologías pueden crear oportunidades, qué riesgos tecnológicos afectan sus procesos.'},
{code:'APO08.03',name:'Gestionar las relaciones con el negocio',desc:'Mantener relaciones formales y personales con los líderes del negocio basadas en compromisos cumplidos y comunicación honesta. La confianza se construye en el tiempo.'},
{code:'APO08.04',name:'Coordinar y comunicar',desc:'Asegurar que la información fluye en ambas direcciones: el negocio entiende qué puede esperar de TI, y TI entiende qué necesita el negocio para planear en consecuencia.'},
{code:'APO08.05',name:'Proporcionar insumos al continuo mejoramiento de servicios',desc:'Recoger regularmente la perspectiva del negocio sobre la calidad y relevancia de los servicios tecnológicos. Usar esa retroalimentación para mejorar.'}],
acts:['Establecer roles formales de relación entre TI y cada área significativa del negocio','Crear mecanismos para que las áreas del negocio comuniquen sus necesidades con contexto','Identificar y resolver proactivamente los conflictos de expectativas o de prioridades','Medir regularmente la satisfacción del negocio con los servicios y la relación con TI','Asegurar que la tecnología no gestionada se integra en el modelo de gobernanza general'],
casc:{need:'El negocio necesita una función tecnológica que lo entienda y trabaje para sus objetivos, no que le imponga soluciones',align:'TI necesita que el negocio la vea como aliado estratégico para poder contribuir realmente a sus resultados',obj:'APO08 construye esa alianza con mecanismos formales de relación, comunicación y gestión de expectativas'},
kw:['Socio de negocio tecnológico','Relación TI-negocio','Alineación','Comunicación estratégica','Confianza institucional']},

{code:'APO09',name:'Acuerdos de Servicio',
def:'Alinear los servicios y niveles de servicio de TI con las necesidades del negocio, incluyendo la definición, acuerdo y monitoreo de los servicios y sus indicadores.',
did:'Sin acuerdos formales, la relación entre TI y el negocio opera sobre expectativas implícitas que inevitablemente divergen: TI cree que está haciendo un buen trabajo porque sus sistemas están funcionando; el negocio cree que podría ser mejor porque los tiempos de respuesta no satisfacen sus necesidades. Ambos tienen razón porque el contrato que los conectaría no existe. Este objetivo crea ese contrato: define qué se entrega, con qué calidad, en qué tiempos y qué ocurre cuando no se cumple.',
ex_intro:'Los acuerdos de servicio convierten expectativas implícitas en compromisos medibles:',
ex_bullets:['Cada área del negocio conoce exactamente qué servicios tecnológicos puede usar, con qué disponibilidad y en qué tiempos será atendida cuando algo falla.','El cumplimiento de los compromisos se mide y reporta mensualmente. Cuando hay incumplimientos, hay análisis formal y plan de mejora — no solo disculpas.','Los acuerdos se revisan periódicamente para asegurar que siguen siendo relevantes para las necesidades actuales del negocio.'],
fail_intro:'La informalidad en los compromisos de servicio genera fricciones que se vuelven crónicas:',
fail_bullets:['Los conflictos entre TI y el negocio sobre si el servicio es "bueno" o "malo" no se pueden resolver porque no hay criterio acordado sobre qué significa bueno.','Los sistemas críticos del negocio — nómina, facturación, producción — no tienen prioridad formal en la atención. Cuando fallan en el peor momento, la respuesta es la misma que para cualquier otro problema.','La insatisfacción del negocio con TI es difusa y difícil de abordar porque no hay indicadores que permitan identificar exactamente dónde está el problema.'],
pracs:[
{code:'APO09.01',name:'Identificar los servicios de TI',desc:'Catalogar todos los servicios tecnológicos disponibles para el negocio. Que cada área sepa qué puede pedir, cómo pedirlo y qué puede esperar.'},
{code:'APO09.02',name:'Catalogar los servicios de TI habilitados por TI',desc:'Mantener un catálogo de servicios actualizado y accesible. Documentar las características, condiciones y restricciones de cada servicio disponible.'},
{code:'APO09.03',name:'Definir y preparar acuerdos de servicio',desc:'Negociar y formalizar los compromisos de nivel de servicio con cada área del negocio. Los compromisos deben ser realistas para quien los provee y relevantes para quien los recibe.'},
{code:'APO09.04',name:'Monitorear e informar sobre los niveles de servicio',desc:'Medir el cumplimiento de los acuerdos establecidos y reportar regularmente los resultados. Los incumplimientos activan procesos de análisis y mejora.'},
{code:'APO09.05',name:'Revisar los acuerdos y contratos de servicio',desc:'Actualizar los acuerdos cuando cambian las necesidades del negocio o las capacidades de TI. Los compromisos que ya no son relevantes deben renegociarse, no ignorarse.'}],
acts:['Desarrollar y mantener el catálogo de servicios tecnológicos disponibles para el negocio','Negociar y formalizar compromisos de nivel de servicio con cada área relevante','Medir mensualmente el cumplimiento de los compromisos establecidos','Gestionar los incumplimientos con análisis de causa y plan de mejora formal','Revisar periódicamente que los acuerdos sigan siendo relevantes para las necesidades actuales'],
casc:{need:'El negocio necesita saber qué puede exigirle a la tecnología y tener certeza de que esos compromisos se cumplirán',align:'TI necesita compromisos realistas que pueda cumplir consistentemente para construir una reputación de confiabilidad',obj:'APO09 formaliza esos compromisos y crea el mecanismo para medirlos, reportarlos y mejorarlos'},
kw:['Acuerdo de Nivel de Servicio (ANS/SLA)','Catálogo de servicios de TI','Compromiso de servicio','Indicadores de servicio','Gestión de expectativas']},

{code:'APO10',name:'Proveedores',
def:'Gestionar todos los servicios de TI prestados por proveedores externos para satisfacer los requisitos del negocio con calidad y riesgo controlado.',
did:'La dependencia de proveedores tecnológicos externos crece a medida que las organizaciones adoptan más servicios en la nube, más plataformas especializadas y más capacidades que no desarrollan internamente. Esa dependencia no es en sí misma un problema — es una estrategia razonable. El problema aparece cuando no se gestiona: cuando un proveedor puede aumentar precios sin resistencia, cuando no hay alternativas evaluadas, cuando los contratos no protegen la salida. Este objetivo gestiona esa dependencia antes de que se convierta en vulnerabilidad.',
ex_intro:'Una gestión madura de proveedores produce capacidad de negociación e independencia estratégica:',
ex_bullets:['Las renovaciones de contratos con proveedores estratégicos se preparan con meses de anticipación, con evaluación de alternativas y con criterios claros de lo que se espera de la renovación.','Los riesgos de dependencia crítica con proveedores específicos están identificados y tienen planes de contingencia activos, aunque no sean urgentes.','El desempeño de los proveedores se evalúa regularmente frente a compromisos contractuales, no solo cuando hay un problema.'],
fail_intro:'La gestión informal de proveedores genera vulnerabilidades que el mercado eventualmente explota:',
fail_bullets:['La organización descubre su nivel de dependencia con un proveedor cuando ese proveedor anuncia un aumento de precios significativo — y no tiene alternativas ni plazos para reaccionar.','Los contratos de TI se firmaron sin cláusulas de salida favorables ni SLAs exigibles. La relación con el proveedor se gestiona con conversaciones informales, no con mecanismos contractuales.','Cuando un proveedor falla o cierra, el impacto en el negocio es mucho mayor de lo anticipado porque la dependencia real nunca se había evaluado formalmente.'],
pracs:[
{code:'APO10.01',name:'Identificar y evaluar las relaciones y contratos con proveedores',desc:'Mantener un inventario de todos los proveedores tecnológicos con evaluación de su criticidad, su desempeño y el nivel de dependencia que representan.'},
{code:'APO10.02',name:'Seleccionar proveedores',desc:'Elegir proveedores con un proceso formal que evalúa capacidades, solidez, referencias y compatibilidad con los requisitos estratégicos de la organización.'},
{code:'APO10.03',name:'Gestionar contratos con proveedores',desc:'Asegurar que los contratos reflejan adecuadamente las expectativas: niveles de servicio exigibles, cláusulas de salida razonables y protección de los datos e intereses de la organización.'},
{code:'APO10.04',name:'Gestionar el riesgo en el suministro de TI',desc:'Identificar y gestionar los riesgos asociados a la cadena de proveedores tecnológicos. Incluye dependencias de sub-proveedores y riesgos de concentración.'},
{code:'APO10.05',name:'Monitorear el desempeño y el cumplimiento de proveedores',desc:'Evaluar regularmente si los proveedores cumplen sus compromisos. Gestionar formalmente los incumplimientos antes de que escalen.'}],
acts:['Mantener un inventario actualizado de proveedores tecnológicos con evaluación de criticidad','Desarrollar y gestionar contratos que protejan adecuadamente los intereses de la organización','Evaluar periódicamente el desempeño de los proveedores frente a compromisos contractuales','Identificar y gestionar los riesgos de dependencia crítica con proveedores específicos','Asegurar que las salidas de proveedores puedan ejecutarse de forma ordenada cuando sea necesario'],
casc:{need:'El negocio necesita que sus proveedores tecnológicos sean confiables y que la organización no quede a merced de sus decisiones unilaterales',align:'TI necesita mecanismos contractuales y operativos que aseguren continuidad y calidad en los servicios de terceros',obj:'APO10 construye esa protección: desde la selección hasta el monitoreo y la gestión del riesgo de dependencia'},
kw:['Gestión de proveedores tecnológicos','Contratos de TI','Riesgo de terceros','Evaluación de proveedores','Dependencia tecnológica']},

{code:'APO11',name:'Calidad',
def:'Definir y comunicar los requerimientos de calidad en todos los procesos, procedimientos y resultados de TI de la empresa.',
did:'La calidad tecnológica sin estándares definidos es subjetiva: TI cree que lo que entregó está bien porque funciona técnicamente; el negocio cree que no está bien porque no resuelve lo que necesitaba. Este conflicto no se resuelve con buenas intenciones ni con más reuniones — se resuelve definiendo antes de empezar qué significa calidad para ese entregable específico, acordándolo con las áreas que lo usarán, y verificando su cumplimiento con criterios objetivos.',
ex_intro:'Un sistema de gestión de calidad efectivo produce entregables predecibles:',
ex_bullets:['Los criterios de aceptación de cada sistema o servicio se definen y acuerdan con el negocio antes de que el desarrollo o la adquisición comience, no al final.','Las pruebas con usuarios reales del negocio son parte del proceso estándar, no una cortesía ocasional. Sus hallazgos tienen un proceso de corrección antes del lanzamiento.','La tasa de problemas reportados en las primeras semanas de uso de nuevos sistemas es un indicador activamente monitoreado y gestionado.'],
fail_intro:'La ausencia de gestión de calidad produce fricciones que erosionan la confianza:',
fail_bullets:['Los sistemas se entregan "funcionando" técnicamente pero sin satisfacer las necesidades reales del negocio. El conflicto sobre si es un problema de calidad o de requisitos no se puede resolver porque ninguno se definió con precisión.','Los problemas que los usuarios reportan en las primeras semanas de uso revelan que el sistema nunca fue probado con los procesos reales del negocio.','La organización acumula deuda técnica en sus sistemas porque la calidad se sacrificó por velocidad de entrega y nunca se recuperó.'],
pracs:[
{code:'APO11.01',name:'Establecer un sistema de gestión de calidad (SGC)',desc:'Definir el marco, las políticas y los procedimientos que garantizan calidad consistente en los procesos y entregables tecnológicos.'},
{code:'APO11.02',name:'Definir y gestionar estándares, prácticas y procedimientos de calidad',desc:'Establecer los criterios concretos de calidad para cada tipo de entregable: sistemas, servicios, proyectos y procesos. Que todos sepan qué significa "bien hecho".'},
{code:'APO11.03',name:'Enfocarse en los clientes',desc:'Asegurar que los requisitos y la satisfacción de las áreas del negocio son el criterio principal de calidad. La calidad no la define quien entrega, sino quien recibe.'},
{code:'APO11.04',name:'Realizar monitoreo, control y revisiones de calidad',desc:'Verificar regularmente que los estándares de calidad se están cumpliendo en la práctica. Identificar desviaciones y corregirlas antes de que impacten al negocio.'},
{code:'APO11.05',name:'Integrar la gestión de calidad en las soluciones de TI',desc:'Incorporar los controles de calidad en los procesos de desarrollo, adquisición e implementación. La calidad se construye en el proceso, no se verifica solo al final.'}],
acts:['Definir y comunicar los estándares de calidad para los procesos y entregables de TI','Acordar con el negocio los criterios de aceptación antes de iniciar cada proyecto o adquisición','Incorporar pruebas con usuarios reales como paso estándar en todo proceso de entrega','Monitorear indicadores de calidad y gestionar las desviaciones con procesos formales','Promover la mejora continua basada en datos de calidad y retroalimentación del negocio'],
casc:{need:'El negocio necesita que lo que recibe de TI funcione como se necesita, no solo técnicamente sino en el contexto real de sus procesos',align:'TI necesita criterios objetivos de calidad que le permitan saber cuándo algo está realmente bien hecho',obj:'APO11 establece esos criterios, los acuerda con el negocio y crea el sistema para verificarlos consistentemente'},
kw:['Gestión de calidad','Estándares de calidad','Criterios de aceptación','Mejora continua','Indicadores de calidad']},

{code:'APO12',name:'Riesgo',
def:'Identificar, evaluar y gestionar continuamente los riesgos relacionados con TI dentro de los niveles de tolerancia establecidos por la dirección.',
did:'Los riesgos tecnológicos que nadie ha identificado formalmente no son riesgos menores: son los más peligrosos, porque cuando se materializan sorprenden a toda la organización. La diferencia entre una organización que gestiona el riesgo tecnológico con madurez y una que no lo hace no está en cuántos riesgos tiene — todas tienen — sino en si esos riesgos son conocidos, priorizados y gestionados activamente antes de convertirse en incidentes.',
ex_intro:'Una gestión de riesgo madura produce anticipación en lugar de reacción:',
ex_bullets:['Los riesgos tecnológicos más significativos son conocidos por la dirección y tienen responsable, plan de acción y fecha de revisión asignados — no solo están en una lista.','Cuando ocurre un incidente tecnológico, el proceso de análisis verifica si ese riesgo estaba identificado. Si lo estaba, se revisa por qué el plan de mitigación no fue suficiente. Si no lo estaba, se actualiza el proceso de identificación.','Los informes de riesgo tecnológico llegan a la dirección en lenguaje de impacto al negocio, no en lenguaje técnico.'],
fail_intro:'La gestión informal del riesgo produce un patrón predecible de sorpresas costosas:',
fail_bullets:['Los problemas graves aparecen sin haber sido anticipados aunque la información necesaria para identificarlos existía dispersa en la organización.','La respuesta a los incidentes consume los recursos que deberían estar gestionando los riesgos antes de que escalen. Se crea un ciclo donde la crisis perpetúa la crisis.','Las decisiones de inversión en controles y mitigaciones se toman sin una evaluación formal del riesgo que las justifique — o se posponen indefinidamente por falta de esa justificación.'],
pracs:[
{code:'APO12.01',name:'Recopilar datos',desc:'Identificar y recopilar información sobre el entorno tecnológico, las amenazas existentes y las vulnerabilidades de la organización. La gestión del riesgo empieza con información de calidad.'},
{code:'APO12.02',name:'Analizar el riesgo',desc:'Evaluar la probabilidad e impacto de los riesgos identificados. Priorizar cuáles merecen atención inmediata y cuáles pueden gestionarse en el tiempo.'},
{code:'APO12.03',name:'Mantener un perfil de riesgo',desc:'Consolidar y actualizar el inventario de riesgos activos con su estado de gestión. Que la organización tenga siempre una imagen actualizada de su exposición al riesgo tecnológico.'},
{code:'APO12.04',name:'Articular el riesgo',desc:'Comunicar los riesgos tecnológicos a la dirección y las partes interesadas de forma comprensible. El riesgo que no se comunica bien no se gestiona bien.'},
{code:'APO12.05',name:'Definir un portafolio de acciones para la gestión del riesgo',desc:'Establecer las respuestas a cada riesgo: mitigar, aceptar, transferir o evitar. Con responsables, plazos y presupuesto asignados.'},
{code:'APO12.06',name:'Responder al riesgo',desc:'Implementar las acciones definidas y monitorear su efectividad. Ajustar las respuestas cuando el contexto cambia o cuando los controles no producen el efecto esperado.'}],
