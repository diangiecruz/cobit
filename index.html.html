'Lecciones aprendidas':{d:'El conocimiento documentado al final de un proyecto sobre qué funcionó bien, qué falló y qué se haría diferente, disponible para proyectos futuros.',ex:'<strong>Ejemplo:</strong> Documentar que la falta de capacitación del área de logística fue la principal razón de baja adopción del nuevo sistema — para que el siguiente proyecto incluya esa etapa con tiempo y presupuesto suficientes.'},
'Operaciones tecnológicas':{d:'Las actividades diarias que mantienen los sistemas funcionando correctamente: monitoreo, mantenimiento preventivo, copias de seguridad y gestión de la infraestructura.',ex:'<strong>Ejemplo:</strong> La verificación matutina que el equipo de TI realiza cada día para confirmar que las copias de seguridad de la noche anterior se completaron correctamente — antes de que el negocio empiece a operar.'},
'Procedimientos operativos (SOP)':{d:'Las instrucciones documentadas paso a paso para ejecutar tareas operativas de forma consistente, correcta y repetible por cualquier persona del equipo.',ex:'<strong>Ejemplo:</strong> El procedimiento de reinicio del sistema de facturación: 12 pasos documentados que cualquier técnico puede seguir en una emergencia, sin necesitar llamar al experto.'},
'Copias de seguridad (Backup & Recovery)':{d:'El proceso de crear duplicados verificados de la información crítica y asegurarse de que pueden restaurarse correctamente cuando se necesiten.',ex:'<strong>Ejemplo:</strong> No basta con que las copias de seguridad se ejecuten todas las noches — hay que probar mensualmente que los datos pueden restaurarse en el tiempo comprometido con el negocio.'},
'Monitoreo de sistemas':{d:'La supervisión continua y automatizada del estado y desempeño de los sistemas, con alertas configuradas para detectar problemas antes de que impacten al negocio.',ex:'<strong>Ejemplo:</strong> Una alerta que notifica al equipo técnico cuando el espacio de almacenamiento del servidor supera el 80% de capacidad — con tiempo suficiente para actuar antes de que llegue al 100% y el sistema falle.'},
'Mantenimiento preventivo':{d:'Las actividades planificadas de cuidado y actualización de los sistemas para prevenir fallos antes de que ocurran.',ex:'<strong>Ejemplo:</strong> Aplicar actualizaciones de seguridad durante una ventana de mantenimiento programada los domingos a las 2 AM — antes de que esas vulnerabilidades sean explotadas, no después.'},
'Mesa de ayuda (Service Desk)':{d:'El punto de contacto centralizado donde los empleados reportan problemas con los sistemas y solicitan servicios tecnológicos.',ex:'<strong>Ejemplo:</strong> Un portal donde cualquier empleado puede reportar un problema, ver el estado de su ticket en tiempo real y saber cuándo será resuelto — sin necesitar llamar a alguien que conoce personalmente en TI.'},
'Gestión de incidentes':{d:'El proceso formal para restablecer el servicio normal lo más rápido posible después de una interrupción, minimizando el impacto en el negocio.',ex:'<strong>Ejemplo:</strong> Cuando el sistema de ventas cae, el proceso de gestión de incidentes define quién es notificado, en qué orden se actúa, qué comunicación reciben los usuarios afectados y cuándo se escala si no se resuelve.'},
'Tiempo de respuesta':{d:'El tiempo que transcurre entre que un usuario reporta un problema y que alguien del equipo tecnológico comienza a atenderlo activamente.',ex:'<strong>Ejemplo:</strong> Un tiempo de respuesta de 4 horas para un incidente crítico que paraliza la facturación es inaceptable — independientemente de que el problema se resuelva después en 30 minutos.'},
'Priorización de incidentes':{d:'El proceso de clasificar los incidentes según su impacto real en el negocio para atender primero los que afectan más a más personas o a procesos más críticos.',ex:'<strong>Ejemplo:</strong> El correo del gerente que no funciona tiene menor prioridad que el sistema de nómina que no procesa planillas el día de pago — aunque el gerente tenga más autoridad.'},
'Comunicación al usuario':{d:'El proceso de mantener informados a los usuarios afectados por un incidente sobre el estado, el impacto y el tiempo estimado de resolución.',ex:'<strong>Ejemplo:</strong> "El sistema de facturación está caído. El equipo técnico está trabajando en ello. Estimamos restauración en 90 minutos. Les informaremos cuando esté resuelto." — eso es comunicación al usuario durante un incidente.'},
'Gestión de problemas':{d:'El proceso de investigar las causas profundas de los incidentes recurrentes para eliminarlos definitivamente, en lugar de resolver sus síntomas repetidamente.',ex:'<strong>Ejemplo:</strong> Si el sistema de despachos cae todos los lunes a las 9 AM, resolver cada caída es gestión de incidentes. Investigar por qué ocurre todos los lunes y eliminarlo es gestión de problemas.'},
'Análisis de causa raíz (RCA)':{d:'La investigación metódica de un problema para identificar su causa fundamental — no sus síntomas — y poder implementar una solución que lo elimine definitivamente.',ex:'<strong>Ejemplo:</strong> El sistema de inventario falla repetidamente. El síntoma es que se queda sin memoria. La causa raíz es una consulta ineficiente que no libera memoria correctamente. Corregir la consulta elimina el problema de raíz.'},
'Incidentes recurrentes':{d:'Las interrupciones o problemas que ocurren repetidamente, causados por el mismo problema de fondo que nunca se ha investigado y resuelto definitivamente.',ex:'<strong>Ejemplo:</strong> Si el sistema de cotizaciones "se congela" cada vez que se agregan más de 10 ítems y eso lleva ocurriendo seis meses, es un problema no resuelto que genera incidentes recurrentes predecibles.'},
'Solución definitiva':{d:'La corrección que elimina permanentemente la causa raíz de un problema, de modo que el incidente asociado no vuelva a ocurrir.',ex:'<strong>Ejemplo:</strong> Reescribir la consulta ineficiente que causa que el sistema de inventario se quede sin memoria — en lugar de reiniciar el servidor cada vez que ocurre.'},
'Solución temporal (workaround)':{d:'El procedimiento alternativo que permite a los usuarios continuar trabajando mientras se desarrolla la solución definitiva para un problema conocido.',ex:'<strong>Ejemplo:</strong> Mientras se corrige el error del sistema de cotizaciones, el workaround es dividir los pedidos de más de 10 ítems en dos cotizaciones separadas — incómodo pero funcional.'},
'Plan de continuidad del negocio (BCP)':{d:'El plan documentado que define cómo la organización continuará operando sus procesos críticos durante y después de una interrupción grave, aunque sea en modalidad reducida.',ex:'<strong>Ejemplo:</strong> El BCP define que si el sistema de producción cae más de 4 horas, se activa el proceso manual de registro en papel con formularios pre-impresos disponibles en cada línea.'},
'Plan de recuperación ante desastres (DRP)':{d:'El plan específico para restaurar los sistemas tecnológicos después de una interrupción mayor, con procedimientos, responsables y tiempos máximos de recuperación definidos.',ex:'<strong>Ejemplo:</strong> El DRP establece que ante una falla total del centro de datos principal, en máximo 4 horas el sitio alterno debe estar operativo con los sistemas críticos procesando transacciones.'},
'Tiempo máximo de recuperación (RTO)':{d:'El tiempo máximo que la organización puede tolerar que un sistema esté fuera de servicio antes de que el impacto en el negocio sea inaceptable.',ex:'<strong>Ejemplo:</strong> El sistema de facturación tiene un RTO de 2 horas — si en 2 horas no está restaurado, el impacto financiero y operativo supera el umbral que la organización decidió como inaceptable.'},
'Pérdida máxima de datos aceptable (RPO)':{d:'La cantidad máxima de datos que la organización puede perder en un desastre, medida en tiempo. Determina la frecuencia mínima de las copias de seguridad.',ex:'<strong>Ejemplo:</strong> Un RPO de 1 hora para el sistema de pedidos significa que las copias de seguridad deben hacerse cada hora. Perder más de 1 hora de pedidos es inaceptable para el negocio.'},
'Análisis de impacto al negocio (BIA)':{d:'La evaluación sistemática del impacto que tendría la interrupción de cada proceso y sistema: pérdidas económicas, incumplimientos regulatorios y consecuencias operativas.',ex:'<strong>Ejemplo:</strong> El BIA revela que el sistema de nómina tiene el impacto más crítico en días de pago, seguido por el sistema de producción — y eso determina el orden de recuperación en el plan de continuidad.'},
'Control de acceso a sistemas':{d:'Los mecanismos que determinan quién puede acceder a qué sistemas y datos, con qué permisos y bajo qué condiciones.',ex:'<strong>Ejemplo:</strong> Un contador puede consultar el sistema de facturación pero no puede eliminiar registros, y solo puede ver las cuentas del departamento donde trabaja — eso es control de acceso granular.'},
'Gestión de identidades (IAM)':{d:'El proceso de administrar las identidades digitales de todos los usuarios: crear accesos cuando llegan, modificarlos cuando cambian de rol y revocarlos cuando se van.',ex:'<strong>Ejemplo:</strong> El día que alguien deja la organización, su proceso de salida incluye automáticamente la desactivación de todos sus accesos a sistemas — no esperar a que alguien lo recuerde dos semanas después.'},
'Monitoreo de seguridad':{d:'La supervisión continua de los sistemas para detectar actividades inusuales o sospechosas que podrían indicar un ataque o brecha activa.',ex:'<strong>Ejemplo:</strong> Una alerta que notifica al equipo de seguridad cuando una cuenta de usuario descarga más de 500 archivos en 10 minutos — un comportamiento inusual que puede indicar una cuenta comprometida.'},
'Vulnerabilidades de seguridad':{d:'Las debilidades en los sistemas que podrían ser explotadas para acceder o dañar la información de la organización.',ex:'<strong>Ejemplo:</strong> Un sistema que no ha sido actualizado en 18 meses tiene vulnerabilidades conocidas que están publicadas en internet — cualquier persona con las herramientas adecuadas puede explotarlas.'},
'Respuesta a incidentes de seguridad':{d:'El proceso documentado y probado para detectar, contener, investigar y recuperarse de un incidente de seguridad de la información.',ex:'<strong>Ejemplo:</strong> Cuando se detecta que una cuenta fue comprometida: se bloquea inmediatamente, se investiga qué accedió, se evalúa el daño, se comunica a los afectados y se corrige la vulnerabilidad que lo permitió.'},
'Controles internos en sistemas':{d:'Los mecanismos configurados en los sistemas que garantizan que los procesos de negocio producen resultados correctos, completos y autorizados.',ex:'<strong>Ejemplo:</strong> El sistema de compras que no permite completar una orden de compra sin la firma electrónica del autorizador correspondiente tiene un control interno que previene gastos no autorizados.'},
'Integridad de la información':{d:'La garantía de que los datos en los sistemas son precisos, completos y no han sido modificados sin autorización.',ex:'<strong>Ejemplo:</strong> Un registro contable que no puede modificarse después de ser aprobado — cualquier corrección debe hacerse con un asiento de ajuste con su propia aprobación — mantiene la integridad de la información.'},
'Separación de roles y funciones (SoD)':{d:'El principio que distribuye las tareas críticas de un proceso entre varias personas, de modo que ninguna tenga control completo de principio a fin.',ex:'<strong>Ejemplo:</strong> En el proceso de pago a proveedores: una persona crea el proveedor en el sistema, otra aprueba la factura y otra ejecuta la transferencia. Ninguna puede hacer las tres cosas — eso es separación de funciones.'},
'Controles de proceso de negocio':{d:'Los mecanismos integrados en los procesos del negocio que aseguran que cada paso se ejecuta con la autorización apropiada y deja trazabilidad completa.',ex:'<strong>Ejemplo:</strong> Un sistema de ventas que no permite dar un descuento mayor al 15% sin aprobación del gerente tiene un control de proceso que protege los márgenes de la empresa.'},
'Prevención de fraudes tecnológicos':{d:'Los controles y prácticas diseñados para impedir que los sistemas sean usados para cometer fraudes internos o externos.',ex:'<strong>Ejemplo:</strong> Configurar que todas las transferencias bancarias superiores a $5.000 requieran doble autorización y se notifiquen por correo a dos personas distintas — reduciendo el riesgo de transferencias no autorizadas.'},
'Indicadores de desempeño de TI (KPI)':{d:'Las métricas seleccionadas que miden objetivamente qué tan bien funciona la tecnología frente a sus compromisos.',ex:'<strong>Ejemplo:</strong> Disponibilidad de sistemas críticos (objetivo 99.5%), tiempo promedio de resolución de incidentes (objetivo 2 horas), proyectos en tiempo (objetivo 80%) — esos son KPIs de TI concretos y verificables.'},
'Indicadores de logro de metas (KGI)':{d:'Las métricas que miden si la tecnología está contribuyendo efectivamente al logro de los objetivos del negocio.',ex:'<strong>Ejemplo:</strong> Una organización puede tener excelentes KPIs de TI (alta disponibilidad, incidentes resueltos rápido) y aun así malos KGIs si los sistemas no están ayudando al negocio a crecer o a ser más eficiente.'},
'Tablero de gestión (Dashboard)':{d:'La visualización gráfica e interactiva de los indicadores clave de la función tecnológica, diseñada para que cualquier directivo vea el estado de TI de un vistazo.',ex:'<strong>Ejemplo:</strong> Un tablero que muestra en tiempo real la disponibilidad de los sistemas críticos, los incidentes activos y el estado de los proyectos principales — accesible para cualquier directivo desde su celular.'},
'Cuadro de mando integral (Balanced Scorecard)':{d:'El marco de gestión del desempeño que organiza los indicadores en cuatro perspectivas: financiera, de clientes, procesos internos, y aprendizaje y crecimiento.',ex:'<strong>Ejemplo:</strong> Aplicado a TI: perspectiva financiera (costo por servicio), de clientes (satisfacción del negocio), procesos (disponibilidad, tiempo de entrega de proyectos) y aprendizaje (competencias del equipo).'},
'Reporte ejecutivo de TI':{d:'El informe periódico para la alta dirección que presenta el estado de la función tecnológica en lenguaje de negocio, orientado a la toma de decisiones.',ex:'<strong>Ejemplo:</strong> Una página que muestra: estado de los proyectos estratégicos, principales riesgos activos, cumplimiento de compromisos de servicio y novedades relevantes — sin tecnicismos, con semáforos claros.'},
'Control interno':{d:'El sistema de políticas y mecanismos que protege los activos de la organización, garantiza la precisión de la información y asegura el cumplimiento normativo.',ex:'<strong>Ejemplo:</strong> La separación de funciones, las aprobaciones requeridas y los registros auditables en los sistemas financieros son todos controles internos que trabajan juntos para proteger a la organización.'},
'Evaluación de controles':{d:'La revisión sistemática de si los controles establecidos están correctamente diseñados y funcionando efectivamente en la práctica.',ex:'<strong>Ejemplo:</strong> Verificar que el control de doble autorización en pagos realmente requiere dos firmas distintas — y que no existe un procedimiento informal de "aprobación por teléfono" que lo evade.'},
'Marco COSO':{d:'El marco de referencia internacional para el diseño, implementación y evaluación de sistemas de control interno, complementario a COBIT.',ex:'<strong>Ejemplo:</strong> COBIT y COSO se usan juntos frecuentemente: COBIT para los controles específicos de TI, COSO para el sistema de control interno de toda la organización. Son complementarios, no rivales.'},
'Deficiencias de control':{d:'Las debilidades en el diseño o funcionamiento de un control que reducen su capacidad de prevenir o detectar problemas oportunamente.',ex:'<strong>Ejemplo:</strong> Un control de revisión de accesos que está definido en la política pero que nadie ejecuta en la práctica tiene una deficiencia de operación — el control existe en papel pero no en la realidad.'},
'Monitoreo continuo de controles':{d:'La supervisión automatizada y permanente del funcionamiento de los controles más importantes, con alertas cuando se detectan desviaciones.',ex:'<strong>Ejemplo:</strong> Un sistema que alerta automáticamente cuando se otorga acceso a un usuario a funciones que crean conflicto de interés — sin esperar a la revisión semestral para detectarlo.'},
'Cumplimiento normativo (Compliance)':{d:'El estado en que la organización cumple con todas las leyes, regulaciones y contratos aplicables a su operación tecnológica y al manejo de información.',ex:'<strong>Ejemplo:</strong> Una empresa del sector salud que almacena datos de pacientes debe cumplir regulaciones específicas de privacidad. El cumplimiento no es opcional y tiene consecuencias legales si falla.'},
'Obligaciones regulatorias de TI':{d:'Los requisitos legales y normativos específicos que aplican a cómo la organización gestiona sus sistemas y la información que procesa.',ex:'<strong>Ejemplo:</strong> La ley de protección de datos personales obliga a documentar el consentimiento de los clientes para usar sus datos, a tener un responsable de privacidad nombrado y a notificar brechas en plazos definidos.'},
'Riesgo legal tecnológico':{d:'La posibilidad de que decisiones o prácticas tecnológicas generen responsabilidades legales para la organización o sus directivos.',ex:'<strong>Ejemplo:</strong> Usar datos de clientes para un fin diferente al que consintieron, aunque sea accidentalmente, puede generar demandas, multas regulatorias y en algunos países responsabilidad personal de los directivos.'},
'Auditoría de cumplimiento':{d:'La revisión independiente del estado de cumplimiento de la organización con sus obligaciones legales y regulatorias en materia de tecnología.',ex:'<strong>Ejemplo:</strong> Una auditoría de cumplimiento de la regulación de protección de datos revisa si existen los registros de consentimiento, si los datos se almacenan correctamente y si hay procedimientos de respuesta a solicitudes de los titulares.'},
'Protección de datos personales':{d:'El conjunto de obligaciones legales y éticas para proteger la información personal de empleados, clientes y cualquier persona cuyos datos procese la organización.',ex:'<strong>Ejemplo:</strong> Los datos de salud de los empleados en el sistema de medicina laboral, los datos financieros de los clientes en el sistema bancario, y los datos de comportamiento en el e-commerce — todos requieren protección específica por ley.'},
'Auditoría de TI':{d:'La revisión independiente y objetiva de cómo funciona la tecnología de la organización — sus controles, sus procesos y su gobierno — para identificar problemas y recomendar mejoras.',ex:'<strong>Ejemplo:</strong> Un auditor externo que revisa los controles de acceso al sistema financiero, los procesos de gestión de cambios y la efectividad del gobierno de TI, y entrega un informe a la junta directiva.'},
'Aseguramiento independiente':{d:'La opinión objetiva sobre el gobierno y la gestión tecnológica emitida por personas sin relación con los resultados que evalúan.',ex:'<strong>Ejemplo:</strong> La diferencia entre TI diciendo "nuestros controles funcionan bien" y un auditor externo diciendo "los controles de TI funcionan bien basándome en estas evidencias" — la segunda declaración tiene credibilidad porque viene de alguien independiente.'},
'Auditoría interna':{d:'La función organizacional que evalúa de forma independiente los procesos, controles y gobierno tecnológico, reportando directamente a la alta dirección o a la junta directiva.',ex:'<strong>Ejemplo:</strong> El equipo de auditoría interna revisa trimestralmente si los controles de acceso al sistema financiero están funcionando, y reporta los hallazgos directamente al comité de auditoría de la junta.'},
'Recomendaciones de auditoría':{d:'Las sugerencias formales y concretas para corregir debilidades identificadas en la auditoría, con responsables y plazos definidos.',ex:'<strong>Ejemplo:</strong> "Implementar revisión trimestral de accesos al sistema financiero, responsable: gerente de TI, plazo: 60 días" — eso es una recomendación de auditoría accionable y verificable.'},
'Revisión de gobierno de TI':{d:'La evaluación periódica e independiente de qué tan efectivo es el sistema de gobierno tecnológico de la organización para lograr sus objetivos.',ex:'<strong>Ejemplo:</strong> Una revisión anual que evalúa si el comité de gobierno de TI está funcionando como se diseñó, si las decisiones que toma son estratégicas, y si el sistema produce los resultados de gobierno que la organización necesita.'}
};

const MARCO_HTML = `
<div class="marco-sec">
<div class="dom-hero" style="background:linear-gradient(135deg,#1A2440,#2C3E6B)" data-code="COBIT">

  <div class="dh-en">Control Objectives for Information and Related Technologies</div>
  <div class="dh-desc">Marco internacional para gobernar y gestionar la tecnología de la información. No está diseñado solo para el área técnica: está diseñado para toda organización que quiera que la tecnología trabaje para sus objetivos estratégicos con riesgo controlado y rendición de cuentas clara.</div>
</div>

<!-- ¿Qué es COBIT? -->
<div class="obj-card" style="--dc:#1A2440">
  <div class="obj-head" onclick="tog(this)"><span class="obj-code" style="color:#1A2440">01</span><span class="obj-title">¿Qué es COBIT y para quién es?</span><span class="obj-chev">▼</span></div>
  <div class="obj-body"><div class="obj-inner">
    <div class="did-block" style="--dc:#1A2440"><div class="did-label" style="color:#1A2440">💡 En la práctica</div>
    <p class="did-text">COBIT no es un manual técnico — es un marco de gobierno para organizaciones. Su punto de partida es una pregunta que toda dirección debería poder responder: ¿la tecnología de nuestra organización está trabajando para nuestros objetivos estratégicos? COBIT proporciona el sistema para que esa respuesta sea "sí" de forma verificable, no solo intuitiva.</p>
    </div>
    <div class="m-cards-grid">
      <div class="m-mini-card"><div class="m-mini-t">🏛️ Creador: ISACA</div><div class="m-mini-p">Organización global con más de 510.000 profesionales en seguridad, gobernanza, riesgo y auditoría de TI. Fundada en 1967, presente en más de 180 países.</div></div>
      <div class="m-mini-card"><div class="m-mini-t">🎯 Propósito central</div><div class="m-mini-p">Alinear la tecnología con la estrategia del negocio, asegurar que las inversiones en TI generen valor medible y que los riesgos estén dentro de límites aprobados conscientemente.</div></div>
      <div class="m-mini-card"><div class="m-mini-t">🏢 ¿Para quién?</div><div class="m-mini-p">Directivos, juntas directivas, gerentes de todas las áreas — no solo para TI. Toda persona que toma decisiones relacionadas con tecnología necesita entender COBIT.</div></div>
      <div class="m-mini-card"><div class="m-mini-t">🔗 Se complementa con</div><div class="m-mini-p">ITIL (gestión de servicios), ISO 27001 (seguridad), TOGAF (arquitectura empresarial), COSO (control interno). Son marcos complementarios, no rivales.</div></div>
    </div>
  </div></div>
</div>

<!-- Gobierno vs Gestión -->
<div class="obj-card" style="--dc:#1D4ED8">
  <div class="obj-head" onclick="tog(this)"><span class="obj-code" style="color:#1D4ED8">02</span><span class="obj-title">La distinción más importante de COBIT</span><span class="obj-chev">▼</span></div>
  <div class="obj-body"><div class="obj-inner">
    <div class="did-block"><div class="did-label">💡 En la práctica</div>
    <p class="did-text">COBIT distingue entre gobernar y gestionar la tecnología. No son grados de la misma cosa — son funciones con responsables distintos, propósitos distintos y mecanismos distintos. Confundirlas es uno de los errores más frecuentes y más costosos en el gobierno de TI.</p>
    </div>
    <div class="m-two-col">
      <div class="m-col-card" style="border-top:3px solid #1D4ED8">
        <div class="m-col-title" style="color:#1D4ED8">🏛️ Gobierno de TI</div>
        <p class="m-col-text">Responsabilidad de la <strong>junta directiva y la alta dirección</strong>. Evalúa las necesidades del negocio, dirige la tecnología hacia los objetivos estratégicos y monitorea que los resultados se cumplan. Es el dominio <strong>EDM</strong> en COBIT — 5 objetivos.</p>
      </div>
      <div class="m-col-card" style="border-top:3px solid #0284C7">
        <div class="m-col-title" style="color:#0284C7">⚙️ Gestión de TI</div>
        <p class="m-col-text">Responsabilidad de la <strong>gerencia media y los equipos operativos</strong>. Planea, construye, ejecuta y monitorea las actividades de TI según la dirección establecida por el gobierno. Son los dominios <strong>APO, BAI, DSS, MEA</strong> — 35 objetivos.</p>
      </div>
    </div>
    <div class="did-block" style="margin-top:10px"><div class="did-label">📌 Para recordarlo</div>
    <p class="did-text">El gobierno es la junta de una empresa: aprueba la dirección, el presupuesto y evalúa resultados. La gestión es la gerencia y los equipos: planean, ejecutan y operan. Los dos son esenciales y distintos. La confusión entre ellos produce tanto microgestión de la alta dirección como vacíos de responsabilidad.</p>
    </div>
  </div></div>
</div>

<!-- 6 Principios -->
<div class="obj-card" style="--dc:#0284C7">
  <div class="obj-head" onclick="tog(this)"><span class="obj-code" style="color:#0284C7">03</span><span class="obj-title">Los 6 principios del sistema de gobierno</span><span class="obj-chev">▼</span></div>
  <div class="obj-body"><div class="obj-inner">
    <div class="did-block"><div class="did-label">💡 En la práctica</div>
    <p class="did-text">Estos principios no son reglas para implementar COBIT — son los fundamentos filosóficos que explican por qué el sistema funciona como funciona. Aplican a toda la organización. Entenderlos permite usar COBIT con criterio, no como receta.</p>
    </div>
    <div class="princs-grid">
      <div class="princ-item"><div class="princ-n">1</div><div><div class="princ-t">Cada empresa necesita un sistema de gobierno</div><div class="princ-p">Las partes interesadas tienen necesidades que deben traducirse en metas concretas. Sin sistema, las decisiones tecnológicas son arbitrarias e impredecibles.</div></div></div>
      <div class="princ-item"><div class="princ-n">2</div><div><div class="princ-t">El sistema lo moldean factores de diseño</div><div class="princ-p">11 factores contextuales —estrategia, sector, riesgo, tamaño, regulación— determinan cómo diseñar el sistema. No hay receta universal válida para todas las organizaciones.</div></div></div>
      <div class="princ-item"><div class="princ-n">3</div><div><div class="princ-t">El sistema tiene componentes que interactúan</div><div class="princ-p">Procesos, estructuras, personas, cultura, políticas e infraestructura trabajan de forma integrada. Cambiar uno afecta a los demás.</div></div></div>
      <div class="princ-item"><div class="princ-n">4</div><div><div class="princ-t">Gobierno separado de la gestión</div><div class="princ-p">Quienes establecen la dirección y quienes la ejecutan tienen responsabilidades distintas y deben ser estructuras separadas con mecanismos de interacción formal.</div></div></div>
      <div class="princ-item"><div class="princ-n">5</div><div><div class="princ-t">Cubre toda la empresa de extremo a extremo</div><div class="princ-p">No solo el área de TI: todos los recursos de información y tecnología, independientemente de dónde se procesen o gestionen dentro de la organización.</div></div></div>
      <div class="princ-item"><div class="princ-n">6</div><div><div class="princ-t">El sistema de gobierno es dinámico</div><div class="princ-p">Cuando cambia un factor de diseño —nueva regulación, cambio estratégico, nueva tecnología— el sistema debe adaptarse. El gobierno que no evoluciona se vuelve obsoleto.</div></div></div>
    </div>
  </div></div>
</div>

<!-- Cascada de metas -->
<div class="obj-card" style="--dc:#6D28D9">
  <div class="obj-head" onclick="tog(this)"><span class="obj-code" style="color:#6D28D9">04</span><span class="obj-title">La cascada de metas</span><span class="obj-chev">▼</span></div>
  <div class="obj-body"><div class="obj-inner">
    <div class="did-block"><div class="did-label">💡 En la práctica</div>
    <p class="did-text">La cascada de metas es el mecanismo que conecta las necesidades de los accionistas y partes interesadas con los 40 objetivos concretos de COBIT. Responde la pregunta que nadie debería tener que hacerse: ¿por qué este objetivo importa para nuestro negocio? Cada objetivo COBIT tiene una razón de existir que se puede rastrear hasta una necesidad real del negocio.</p>
    </div>
    <div class="casc-panel">
      <div class="casc-row">
        <div class="casc-box"><div class="casc-box-l">Punto de partida</div><div class="casc-box-t">Necesidades de partes interesadas</div><div class="casc-box-s">Valor, riesgo controlado, uso óptimo de recursos</div></div>
        <div class="casc-arr">→</div>
        <div class="casc-box"><div class="casc-box-l">Paso 1</div><div class="casc-box-t">Metas empresariales</div><div class="casc-box-s">13 metas en 4 perspectivas del negocio</div></div>
        <div class="casc-arr">→</div>
        <div class="casc-box"><div class="casc-box-l">Paso 2</div><div class="casc-box-t">Metas de alineación</div><div class="casc-box-s">13 metas que traducen el negocio al lenguaje de TI</div></div>
        <div class="casc-arr">→</div>
        <div class="casc-box highlight"><div class="casc-box-l">Resultado</div><div class="casc-box-t">Objetivos COBIT</div><div class="casc-box-s">Los 40 objetivos priorizados según el contexto</div></div>
      </div>
    </div>
    <div class="did-block" style="margin-top:10px"><div class="did-label">📌 Por qué importa</div>
    <p class="did-text">La cascada evita que TI trabaje en el vacío. Cuando una organización no puede justificar por qué está ejecutando un objetivo de COBIT en términos de necesidades del negocio, es señal de que la cascada no se hizo correctamente o que el objetivo no es prioritario para ese contexto específico.</p>
    </div>
  </div></div>
</div>

<!-- 11 Factores de diseño -->
<div class="obj-card" style="--dc:#047857">
  <div class="obj-head" onclick="tog(this)"><span class="obj-code" style="color:#047857">05</span><span class="obj-title">Los 11 factores de diseño</span><span class="obj-chev">▼</span></div>
  <div class="obj-body"><div class="obj-inner">
    <div class="did-block"><div class="did-label">💡 En la práctica</div>
    <p class="did-text">La innovación central de COBIT 2019 es que el sistema no es una receta fija. Se adapta a cada organización según 11 factores contextuales que determinan qué objetivos priorizar y cómo configurar el sistema. Dos organizaciones del mismo sector pueden tener sistemas de gobierno de TI radicalmente distintos — y ambos ser correctos para su contexto.</p>
    </div>
    <div class="facts-grid">
      <div class="fact-i"><div class="fact-n">F01</div><div class="fact-t">Estrategia empresarial</div><div class="fact-s">Crecimiento, innovación, reducción de costos o excelencia en servicio</div></div>
      <div class="fact-i"><div class="fact-n">F02</div><div class="fact-t">Metas empresariales</div><div class="fact-s">Perspectivas del BSC: financiera, clientes, procesos, aprendizaje</div></div>
      <div class="fact-i"><div class="fact-n">F03</div><div class="fact-t">Perfil de riesgo</div><div class="fact-s">Apetito y tolerancia al riesgo tecnológico de la organización</div></div>
      <div class="fact-i"><div class="fact-n">F04</div><div class="fact-t">Problemas existentes</div><div class="fact-s">Incidentes frecuentes, hallazgos de auditorías anteriores</div></div>
      <div class="fact-i"><div class="fact-n">F05</div><div class="fact-t">Panorama de amenazas</div><div class="fact-s">Vulnerabilidades y riesgos cibernéticos propios del sector</div></div>
      <div class="fact-i"><div class="fact-n">F06</div><div class="fact-t">Requisitos de cumplimiento</div><div class="fact-s">Regulaciones, leyes y estándares normativos aplicables</div></div>
      <div class="fact-i"><div class="fact-n">F07</div><div class="fact-t">Rol de TI</div><div class="fact-s">Soporte, fábrica, activo estratégico o agente transformador</div></div>
      <div class="fact-i"><div class="fact-n">F08</div><div class="fact-t">Modelo de abastecimiento</div><div class="fact-s">Interno, outsourcing, nube pública, privada o modelo híbrido</div></div>
      <div class="fact-i"><div class="fact-n">F09</div><div class="fact-t">Métodos de implementación</div><div class="fact-s">Ágil, DevOps, waterfall o modelo de entrega híbrido</div></div>
      <div class="fact-i"><div class="fact-n">F10</div><div class="fact-t">Adopción tecnológica</div><div class="fact-s">Innovador temprano, seguidor rápido o adoptante tardío</div></div>
      <div class="fact-i" style="border-left-color:#047857"><div class="fact-n" style="color:#047857">F11</div><div class="fact-t">Tamaño y sector</div><div class="fact-s">Pyme, gran empresa, sector público o multinacional. La madurez esperada y los objetivos prioritarios varían radicalmente.</div></div>
    </div>
  </div></div>
</div>

<!-- Modelo de madurez -->
<div class="obj-card" style="--dc:#B91C1C">
  <div class="obj-head" onclick="tog(this)"><span class="obj-code" style="color:#B91C1C">06</span><span class="obj-title">Modelo de madurez — Niveles 0 a 5</span><span class="obj-chev">▼</span></div>
  <div class="obj-body"><div class="obj-inner">
    <div class="did-block"><div class="did-label">💡 En la práctica</div>
    <p class="did-text">El modelo de madurez mide qué tan desarrollado está cada proceso COBIT. No existe la expectativa de llegar al nivel 5 en todo: el objetivo es alcanzar el nivel apropiado para el contexto y la estrategia de cada organización. La mayoría de las organizaciones operan entre niveles 1 y 2. Alcanzar el nivel 3 de forma consistente es un logro estratégico real.</p>
    </div>
    <div id="matBars">
      <div class="mat-r"><div class="mat-l" style="--mlb:rgba(148,163,184,.1);--mlc:#94A3B8">Nivel 0</div><div class="mat-tr"><div class="mat-f" style="--mlc:#94A3B8" data-w="8%">Incompleto — el proceso no existe o no alcanza su propósito</div></div></div>
      <div class="mat-r"><div class="mat-l" style="--mlb:rgba(248,113,113,.1);--mlc:#F87171">Nivel 1</div><div class="mat-tr"><div class="mat-f" style="--mlc:#F87171" data-w="23%">Ejecutado — se hace, pero de forma informal y sin método</div></div></div>
      <div class="mat-r"><div class="mat-l" style="--mlb:rgba(251,146,60,.1);--mlc:#FB923C">Nivel 2</div><div class="mat-tr"><div class="mat-f" style="--mlc:#FB923C" data-w="40%">Gestionado — planeado, monitoreado y ajustado</div></div></div>
      <div class="mat-r"><div class="mat-l" style="--mlb:rgba(250,204,21,.1);--mlc:#CA8A04">Nivel 3</div><div class="mat-tr"><div class="mat-f" style="--mlc:#CA8A04" data-w="57%">Definido — estandarizado y documentado en toda la organización</div></div></div>
      <div class="mat-r"><div class="mat-l" style="--mlb:rgba(52,211,153,.1);--mlc:#059669">Nivel 4</div><div class="mat-tr"><div class="mat-f" style="--mlc:#059669" data-w="75%">Cuantitativo — medido y controlado con datos</div></div></div>
      <div class="mat-r"><div class="mat-l" style="--mlb:rgba(96,165,250,.1);--mlc:#2563EB">Nivel 5</div><div class="mat-tr"><div class="mat-f" style="--mlc:#2563EB" data-w="92%">Optimizado — mejora continua basada en datos y análisis</div></div></div>
    </div>
  </div></div>
</div>

<!-- Flujos entre dominios -->
<div class="obj-card" style="--dc:#1A2440">
  <div class="obj-head" onclick="tog(this)"><span class="obj-code" style="color:#1A2440">07</span><span class="obj-title">Cómo se conectan los 5 dominios</span><span class="obj-chev">▼</span></div>
  <div class="obj-body"><div class="obj-inner">
    <div class="did-block"><div class="did-label">💡 En la práctica</div>
    <p class="did-text">Los 5 dominios no son islas independientes: forman un ciclo donde cada uno alimenta al siguiente. Un fallo en cualquier punto del ciclo afecta a todos los demás. Entender ese flujo ayuda a diagnosticar dónde está el problema real cuando algo no funciona en el sistema de gobierno.</p>
    </div>
    <div class="flow-wrap">
      <div class="flow-row">
        <div class="flow-box"><div class="flow-code" style="--fc:#1D4ED8">EDM</div><div class="flow-t">Gobierno</div><div class="flow-s">Define dirección, aprueba inversiones, monitorea resultados</div></div>
        <span class="flow-arr">→</span>
        <div class="flow-box"><div class="flow-code" style="--fc:#0284C7">APO</div><div class="flow-t">Estrategia y plan</div><div class="flow-s">Traduce la dirección en planes, arquitectura y recursos</div></div>
        <span class="flow-arr">→</span>
        <div class="flow-box"><div class="flow-code" style="--fc:#6D28D9">BAI</div><div class="flow-t">Construcción</div><div class="flow-s">Desarrolla, adquiere e implementa las soluciones</div></div>
        <span class="flow-arr">→</span>
        <div class="flow-box"><div class="flow-code" style="--fc:#047857">DSS</div><div class="flow-t">Operación</div><div class="flow-s">Entrega y soporta los servicios en producción</div></div>
        <span class="flow-arr">→</span>
        <div class="flow-box"><div class="flow-code" style="--fc:#B91C1C">MEA</div><div class="flow-t">Medición</div><div class="flow-s">Evalúa el desempeño y retroalimenta a EDM y APO</div></div>
      </div>
    </div>
    <div class="did-block" style="margin-top:10px"><div class="did-label">📌 El ciclo MEA → EDM</div>
    <p class="did-text">MEA01 detecta desvíos en el desempeño real. Esa evidencia sube a EDM, que decide si ajustar la dirección, reasignar recursos o cancelar iniciativas. Sin este ciclo de retroalimentación, el gobierno opera sobre supuestos en lugar de sobre datos. El ciclo cerrado es lo que distingue el gobierno efectivo del gobierno nominal.</p>
    </div>
  </div></div>
</div>

<!-- Caso de negocio -->
<div class="obj-card" style="--dc:#0284C7">
  <div class="obj-head" onclick="tog(this)"><span class="obj-code" style="color:#0284C7">08</span><span class="obj-title">El caso de negocio en COBIT</span><span class="obj-chev">▼</span></div>
  <div class="obj-body"><div class="obj-inner">
    <div class="did-block"><div class="did-label">💡 En la práctica</div>
    <p class="did-text">El caso de negocio es el instrumento que conecta la decisión de invertir en tecnología con la evidencia de que esa inversión valió la pena. No es un trámite burocrático — es la herramienta que hace posible la rendición de cuentas sobre las inversiones tecnológicas. En COBIT vive principalmente en BAI01 y se mantiene vivo durante toda la ejecución del proyecto.</p>
    </div>
    <div class="did-label">Los 4 componentes que COBIT exige</div>
    <div class="bc-grid-m">
      <div class="bc-card-m" style="--bc:#1D4ED8"><div class="bc-t">1. Alineación estratégica</div><p>La iniciativa debe mostrar cómo apoya los objetivos del negocio, con indicadores concretos. Si no se puede demostrar la conexión, la inversión no debería aprobarse.</p></div>
      <div class="bc-card-m" style="--bc:#047857"><div class="bc-t">2. Valor y beneficios</div><p>Tangibles (ahorro, reducción de errores, nuevos ingresos) e intangibles (agilidad, satisfacción del cliente). Deben ser medibles con indicadores definidos antes de empezar.</p></div>
      <div class="bc-card-m" style="--bc:#D97706"><div class="bc-t">3. Recursos y costos</div><p>El Costo Total de Propiedad (TCO): no solo el costo de comprar o construir, sino mantener, capacitar y actualizar durante toda la vida útil del sistema.</p></div>
      <div class="bc-card-m" style="--bc:#B91C1C"><div class="bc-t">4. Riesgos</div><p>COBIT introduce el concepto de <strong>riesgo de no actuar</strong>: no hacer el proyecto también tiene un costo. El caso debe cuantificar ambos lados de la balanza.</p></div>
    </div>
    <div class="did-label" style="margin-top:14px">Ciclo de vida del caso de negocio</div>
    <div class="lc-wrap">
      <div class="lc-s" style="--lc:#1D4ED8"><div class="lc-t">Elaborar</div><p class="lc-p">El dueño del programa construye el documento con los 4 componentes en colaboración entre negocio y TI.</p></div>
      <div class="lc-s" style="--lc:#0284C7"><div class="lc-t">Aprobar</div><p class="lc-p">El comité de gobierno (EDM) evalúa y aprueba o rechaza. La aprobación libera recursos. El rechazo también es una decisión responsable.</p></div>
      <div class="lc-s" style="--lc:#047857"><div class="lc-t">Monitorear durante la ejecución</div><p class="lc-p">El caso de negocio no se archiva. Si los supuestos cambian, debe actualizarse. MEA01 mide el avance contra los beneficios prometidos.</p></div>
      <div class="lc-s" style="--lc:#D97706"><div class="lc-t">Revisar post-implementación</div><p class="lc-p">Al cierre, se compara lo prometido con lo logrado. Esta revisión alimenta BAI08 y mejora los futuros casos de negocio.</p></div>
    </div>
    <div class="did-block" style="--dc:#B91C1C;margin-top:10px"><div class="did-label" style="color:#B91C1C">⚠️ Principio clave</div>
    <p class="did-text">En COBIT, un caso de negocio que ya no justifica la inversión puede y debe llevar a cancelar el proyecto. Continuar cuando el valor no se materializa es, en sí mismo, una falla de gobierno — no una señal de compromiso con el proyecto.</p>
    </div>
  </div></div>
</div>

<!-- Acciones correctivas -->
<div class="obj-card" style="--dc:#B91C1C">
  <div class="obj-head" onclick="tog(this)"><span class="obj-code" style="color:#B91C1C">09</span><span class="obj-title">Cuando el caso de negocio falla: las 3 decisiones posibles</span><span class="obj-chev">▼</span></div>
  <div class="obj-body"><div class="obj-inner">
    <div class="did-block"><div class="did-label">💡 En la práctica</div>
    <p class="did-text">En COBIT, los desvíos no se gestionan improvisando. Hay un flujo formal: MEA01 detecta el desvío, BAI01 analiza las causas y EDM decide qué hacer. Las tres opciones disponibles son todas responsables si se toman con evidencia. Ninguna es la opción "del fracaso".</p>
    </div>
    <div class="did-label">Flujo de respuesta ante un desvío</div>
    <div class="flow-wrap" style="margin-bottom:14px">
      <div class="flow-row">
        <div class="flow-box"><div class="flow-code" style="--fc:#B91C1C">MEA01</div><div class="flow-t">Detección</div><div class="flow-s">KPIs, revisiones periódicas de desempeño</div></div>
        <span class="flow-arr">→</span>
        <div class="flow-box"><div class="flow-code" style="--fc:#D97706">BAI01</div><div class="flow-t">Análisis</div><div class="flow-s">Investigación de causas raíz del desvío</div></div>
        <span class="flow-arr">→</span>
        <div class="flow-box"><div class="flow-code" style="--fc:#1D4ED8">EDM</div><div class="flow-t">Escalamiento</div><div class="flow-s">Comité de gobierno, decisión ejecutiva</div></div>
        <span class="flow-arr">→</span>
        <div class="flow-box"><div class="flow-code" style="--fc:#047857">Decisión</div><div class="flow-t">¿Qué acción?</div><div class="flow-s">Según naturaleza y severidad del desvío</div></div>
      </div>
    </div>
    <div class="acts-3-grid">
      <div class="act3-card" style="--ac:#047857;--ab:rgba(4,120,87,.2);--abg:rgba(4,120,87,.04)">
        <div class="act3-t">✓ Corregir y continuar</div>
        <ul class="act-list"><li>Ajustar alcance o funcionalidades</li><li>Renegociar plazos con patrocinadores</li><li>Reasignar o ampliar recursos</li><li>Emitir solicitud de cambio (BAI06)</li><li>Actualizar el caso de negocio</li></ul>
      </div>
      <div class="act3-card" style="--ac:#D97706;--ab:rgba(217,119,6,.2);--abg:rgba(217,119,6,.04)">
        <div class="act3-t">⟳ Replantear el caso</div>
        <ul class="act-list"><li>Revisar los beneficios proyectados</li><li>Recalcular el TCO actualizado</li><li>Re-evaluar los riesgos actuales</li><li>Actualizar el documento formalmente</li><li>Someter a nueva aprobación EDM</li></ul>
      </div>
      <div class="act3-card" style="--ac:#B91C1C;--ab:rgba(185,28,28,.2);--abg:rgba(185,28,28,.04)">
        <div class="act3-t">✕ Cancelar el programa</div>
        <ul class="act-list"><li>Cierre ordenado y documentado</li><li>Liberación formal de recursos</li><li>Informe de cierre (BAI01)</li><li>Lecciones aprendidas (BAI08)</li><li>Retroalimentación a MEA y EDM</li></ul>
      </div>
    </div>
    <div class="did-block" style="--dc:#1D4ED8;margin-top:10px"><div class="did-label">📌 Principio fundamental</div>
    <p class="did-text">Los tres caminos convergen siempre en el mismo punto: las lecciones aprendidas (BAI08). Incluso un proyecto cancelado tiene valor si la organización extrae conocimiento útil para futuros procesos de gobierno. Cancelar no es fracasar — es una decisión de gobierno responsable basada en evidencia.</p>
    </div>
  </div></div>
</div>
</div>
`;

/* ══════════════════════════════════════
   RENDER ENGINE
══════════════════════════════════════ */
function build(){
  // Inject extra CSS
  const style=document.createElement('style');
  style.textContent=EXTRA_CSS;
  document.head.appendChild(style);

  const pillsEl=document.getElementById('domPills');
  const sectEl=document.getElementById('domSections');
  const bnavEl=document.getElementById('bnav');

  // ── MARCO tab ──
  const marcoPill=document.createElement('button');
  marcoPill.className='dpill active';
  marcoPill.textContent='Marco';
  marcoPill.style.cssText='color:#1A2440;border-color:#1A244040;background:transparent';
  marcoPill.onclick=()=>showDom('MARCO');
  pillsEl.appendChild(marcoPill);

  const marcoSec=document.createElement('div');
  marcoSec.className='dom-section active';
  marcoSec.id='sec-MARCO';
  marcoSec.innerHTML=MARCO_HTML;
  sectEl.appendChild(marcoSec);

  const marcoNb=document.createElement('button');
  marcoNb.className='nb active';
  marcoNb.id='nb-MARCO';
  marcoNb.style.setProperty('--nc','#1A2440');
  marcoNb.innerHTML='<div class="ni">📖</div><div class="nl">Marco</div>';
  marcoNb.onclick=()=>showDom('MARCO');
  bnavEl.appendChild(marcoNb);

  // Animar barras de madurez al cargar
  setTimeout(()=>{
    document.querySelectorAll('#matBars .mat-f').forEach(f=>{
      f.style.width=(f.dataset.w||'0%');
    });
  },400);

  // ── DOMINIOS ──
  DOMAINS.forEach(d=>{
    const p=document.createElement('button');
    p.className='dpill';
    p.textContent=d.code;
    p.style.cssText=`color:${d.color};border-color:${d.color}40`;
    p.onclick=()=>showDom(d.code);
    pillsEl.appendChild(p);

    const sec=document.createElement('div');
    sec.className='dom-section';
    sec.id='sec-'+d.code;
    sec.innerHTML=`<div class="dom-hero" style="background:linear-gradient(135deg,${d.color}E0,${d.color})" data-code="${d.code}">
      <div class="dh-badge">${d.emoji} ${d.type}</div>
      <div class="dh-title">${d.es}</div>
      <div class="dh-en">${d.en}</div>
      <div class="dh-desc">${d.desc}</div>
    </div>`;

    d.objs.forEach(o=>{
      const card=document.createElement('div');
      card.className='obj-card';
      card.style.setProperty('--dc',d.color);

      // Prácticas HTML
      const pracsHtml=o.pracs&&o.pracs.length?`
        <div class="pracs-label">📐 Prácticas COBIT — actividades de gestión que componen este objetivo</div>
        <div class="pracs">${o.pracs.map(pr=>`
          <div class="prac-item">
            <div class="prac-head" onclick="togP(this)">
              <span class="prac-code">${pr.code}</span>
              <span class="prac-name">${pr.name}</span>
              <span class="prac-chev">▼</span>
            </div>
            <div class="prac-body"><p class="prac-desc">${pr.desc}</p></div>
          </div>`).join('')}
        </div>`:'';

      // Cascada HTML
      const cascHtml=o.casc?`
        <div class="casc-label">🔗 ¿Por qué existe este objetivo?</div>
        <div class="casc-panel">
          <div class="casc-row">
            <div class="casc-box"><div class="casc-box-l">Necesidad del negocio</div><div class="casc-box-t">${o.casc.need}</div></div>
            <div class="casc-arr">→</div>
            <div class="casc-box"><div class="casc-box-l">Implicación para TI</div><div class="casc-box-t">${o.casc.align}</div></div>
            <div class="casc-arr">→</div>
            <div class="casc-box highlight"><div class="casc-box-l">Este objetivo</div><div class="casc-box-t">${o.casc.obj}</div></div>
          </div>
        </div>`:'';

      // Keywords
      const kwHtml=o.kw.map(k=>{
        const kd=KD[k];
        const bg=`${d.color}18`;const bd=`${d.color}35`;
        if(kd){
          const dat=JSON.stringify({t:k,d:kd.d,ex:kd.ex}).replace(/'/g,"&#39;");
          return`<span class="kw" style="--kbg:${bg};--kc:${d.color};--kb:${bd}" data-kw='${dat}' onclick="kwClick(this)">${k}</span>`;
        }
        return`<span class="kw" style="--kbg:${bg};--kc:${d.color};--kb:${bd}">${k}</span>`;
      }).join('');

      // Bullets helpers
      const bul=(arr,cls)=>arr&&arr.length?`<ul class="${cls}">${arr.map(a=>`<li>${a}</li>`).join('')}</ul>`:'';

      card.innerHTML=`
        <div class="obj-head" onclick="tog(this)">
          <span class="obj-code">${o.code}</span>
          <span class="obj-title">${o.name}</span>
          <span class="obj-chev">▼</span>
        </div>
        <div class="obj-body"><div class="obj-inner">
          <p class="def-oficial">${o.def}</p>
          ${o.decoder?`<div class="decoder">📌 ${o.decoder}</div>`:''}
          <div class="did-block">
            <div class="did-label">💡 En la práctica</div>
            <p class="did-text">${o.did}</p>
          </div>
          <div class="ex-block">
            <div class="ex-label">✅ Así se ve cuando funciona bien</div>
            <p class="ex-text">${o.ex_intro||''}</p>
            ${bul(o.ex_bullets,'ex-bullets')}
          </div>
          <div class="fail-block">
            <div class="fail-label">⚠️ Señal de que está fallando</div>
            <p class="fail-text">${o.fail_intro||''}</p>
            ${bul(o.fail_bullets,'fail-bullets')}
          </div>
          ${pracsHtml}
          <div class="acts-label">⚙️ Actividades principales</div>
          <ul class="acts">${o.acts.map(a=>`<li>${a}</li>`).join('')}</ul>
          ${cascHtml}
          <div class="kws-label">🏷 Términos clave — toca para ver definición y ejemplo</div>
          <div class="kws">${kwHtml}</div>
        </div></div>`;
      sec.appendChild(card);
    });
    sectEl.appendChild(sec);

    const nb=document.createElement('button');
    nb.className='nb';
    nb.id='nb-'+d.code;
    nb.style.setProperty('--nc',d.color);
    nb.innerHTML=`<div class="ni">${d.emoji}</div><div class="nl">${d.code}</div>`;
    nb.onclick=()=>showDom(d.code);
    bnavEl.appendChild(nb);
  });
}

function showDom(code){
  document.querySelectorAll('.dom-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.dpill').forEach(p=>p.classList.remove('active'));
  const sec=document.getElementById('sec-'+code);
  if(sec){sec.classList.add('active');window.scrollTo({top:0,behavior:'smooth'});}
  const nb=document.getElementById('nb-'+code);
  if(nb)nb.classList.add('active');
  document.querySelectorAll('.dpill').forEach(p=>{
    const t=p.textContent.trim();
    if(t===code||(code==='MARCO'&&t==='Marco'))p.classList.add('active');
  });
  if(code==='MARCO'){
    setTimeout(()=>{
      document.querySelectorAll('#matBars .mat-f').forEach(f=>{
        f.style.width=(f.dataset.w||'0%');
      });
    },100);
  }
}

function tog(h){
  h.classList.toggle('open');
  h.nextElementSibling.classList.toggle('open');
}
function togP(h){
  h.classList.toggle('open');
  h.nextElementSibling.classList.toggle('open');
}

/* ── BUSCADOR ── */
let searchIdx=[];
function buildSearchIndex(){
  DOMAINS.forEach(d=>{
    d.objs.forEach(o=>{
      searchIdx.push({
        code:o.code,name:o.name,dom:d.code,color:d.color,
        text:(o.did+' '+o.def+' '+(o.ex_bullets||[]).join(' ')).toLowerCase()
      });
    });
  });
  Object.keys(KD).forEach(k=>{
    searchIdx.push({code:'KW',name:k,dom:'KW',color:'#56688A',
      text:(KD[k].d+' '+(KD[k].ex||'')).toLowerCase()});
  });
}

function doSearch(q){
  const res=document.getElementById('searchResults');
  if(!q||q.length<2){res.classList.remove('open');return;}
  const ql=q.toLowerCase();
  const hits=searchIdx.filter(i=>
    i.code.toLowerCase().includes(ql)||
    i.name.toLowerCase().includes(ql)||
    i.text.includes(ql)
  ).slice(0,8);
  if(!hits.length){
    res.innerHTML='<div class="sr-empty">Sin resultados para "'+q+'"</div>';
  } else {
    res.innerHTML=hits.map(h=>`
      <div class="sr-item" onclick="jumpTo('${h.code}','${h.dom}')">
        <div class="sr-code" style="color:${h.color}">${h.code==='KW'?'Término clave':h.code} · ${h.dom}</div>
        <div class="sr-name">${h.name}</div>
      </div>`).join('');
  }
  res.classList.add('open');
}

function jumpTo(code,dom){
  document.getElementById('searchResults').classList.remove('open');
  document.getElementById('searchInput').value='';
  if(code==='KW') return;
  showDom(dom);
  setTimeout(()=>{
    const cards=document.querySelectorAll('#sec-'+dom+' .obj-card');
    cards.forEach(c=>{
      const cd=c.querySelector('.obj-code');
      if(cd&&cd.textContent===code){
        const h=c.querySelector('.obj-head');
        if(h&&!h.classList.contains('open'))tog(h);
        c.scrollIntoView({behavior:'smooth',block:'start'});
      }
    });
  },200);
}

function openSearch(){
  const v=document.getElementById('searchInput').value;
  if(v&&v.length>=2)doSearch(v);
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.search-wrap'))
    document.getElementById('searchResults').classList.remove('open');
});

/* ── TOOLTIP ── */
const tipEl=document.getElementById('tip');
let tipSrc=null;
function kwClick(el){
  try{
    const data=JSON.parse(el.getAttribute('data-kw'));
    if(tipSrc===el&&tipEl.classList.contains('on')){hideTip();return;}
    document.getElementById('tipT').textContent=data.t;
    document.getElementById('tipD').textContent=data.d;
    const tipX=document.getElementById('tipX');
    tipX.innerHTML=data.ex||'';
    tipX.style.display=data.ex?'block':'none';
    tipEl.classList.add('on');tipSrc=el;
    const r=el.getBoundingClientRect();
    const bh=tipEl.offsetHeight||200;const bw=tipEl.offsetWidth||290;
    let top=r.top-bh-10;if(top<8)top=r.bottom+10;
    let left=r.left;
    if(left+bw>window.innerWidth-8)left=window.innerWidth-bw-8;
    if(left<8)left=8;
    tipEl.style.top=top+'px';tipEl.style.left=left+'px';
  }catch(e){}
}
function hideTip(){tipEl.classList.remove('on');tipSrc=null;}
document.addEventListener('click',e=>{if(!e.target.classList.contains('kw'))hideTip();});
document.addEventListener('scroll',hideTip,true);
window.addEventListener('scroll',()=>document.getElementById('st').classList.toggle('on',scrollY>250));

/* ── INIT ── */
buildSearchIndex();
build();
</script>
